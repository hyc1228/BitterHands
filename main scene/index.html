          // SVG lash overlay takes over so it isn't squished too.
          eyeLEl.style.transform = closedAvatarL ? "" : `scaleY(${openR})`;
        }
        if (eyeREl) {
          eyeREl.style.animation = "none";
          eyeREl.classList.toggle("closed", closedAvatarR);
          eyeREl.style.transform = closedAvatarR ? "" : `scaleY(${openL})`;
        }

        // Mouth: beak (two triangles) gets translate; ellipse / triangle
        // gets scaleY.
        if (beakU && beakL) {
          const off = mouthOpen * LIVE2D_BEAK_MAX;
          beakU.style.animation = "none";
          beakL.style.animation = "none";
          beakU.style.transform = `translateY(${-off}px)`;
          beakL.style.transform = `translateY(${off}px)`;
          // Make sure the wrapper isn't animating either (it shouldn't be
          // for shape:beak, but defensive in case spec changed at runtime).
          if (mouthEl) mouthEl.style.animation = "none";
        } else if (mouthEl) {
          mouthEl.style.animation = "none";
          mouthEl.style.transform = `scaleY(${mouthScale})`;
        }

        // Head pose: rotate (shake) + translate Y (nod) on the inner .bob.
        // Order matters: rotate first (around bbox center), then translate.
        if (bobEl) {
          bobEl.style.transform =
            `translateY(${headDy}px) rotate(${headRot}deg)`;
        }
      }

      function processFace(lm, now) {
        // Feed the adaptive EAR baseline first so every downstream
        // consumer (avatar mapping + challenges) uses the latest value.
        const avgEar = (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2;
        recordEar(avgEar);

        // Tally face actions for the per-player end-of-game stats + Mario Party
        // awards. Only counts during a live round; pauses while dead/spectating.
        if (state.roomStarted && !state.me.dead && !state.spectator) {
          tallyFaceActions(lm, now);
        }

        driveLive2D(lm);
        if (challenge.active && !challenge.completed)                   processMonitorChallenge(lm, now);
        if (universalChallenge.active && !universalChallenge.completed) processUniversalChallenge(lm, now);
      }

      // ---- Face-action tally (mouth opens / head shakes / blinks) ----
      // Edge-triggered counters on the raw FaceMesh stream so we don't double-count
      // a single sustained action. Reported to the parent shell (and on through
      // PartyKit) every FACE_COUNT_REPORT_MS so the server can rank players for
      // the end-of-game awards. We also snapshot the webcam at action-edge time —
      // these tiny stills are the "highlight reel" frames the end-game ceremony
      // collages together when it announces each award.
      const FACE_COUNT_REPORT_MS = 3000;
      const FACE_MOUTH_OPEN_MAR = 0.45;       // hysteresis: open above this …
      const FACE_MOUTH_CLOSE_MAR = 0.30;      // … close back below this
      const FACE_SHAKE_NX_THRESH = 0.10;      // |nose_x - center| / face_w
      // Don't spam the server with highlight bursts — at most one per kind per
      // HIGHLIGHT_COOLDOWN_MS. Server caps at 3 stored per kind regardless.
      // Each highlight is a tiny "GIF" — a short burst of frames captured around
      // the action-edge moment that the end-game ceremony replays in a loop.
      const HIGHLIGHT_COOLDOWN_MS = 3500;
      // Sharper frames: collage tiles render up to ~150 px on OB (112-px min
      // grid + auto-fit), so 96² q0.42 was visibly blocky/fuzzy. 144² q0.7
      // roughly triples per-frame bytes; we drop 4→3 frames to keep total
      // bandwidth ~= 2x baseline (still well under the per-message limit).
      const HIGHLIGHT_SIZE = 144;
      const HIGHLIGHT_QUALITY = 0.7;
      const HIGHLIGHT_FRAMES = 3;             // total frames per highlight burst
      const HIGHLIGHT_FRAME_INTERVAL_MS = 90;
      state.faceTracker = {
        mouthOpen: false,
        nxDir: 0, // -1 left, 0 center, +1 right
        eyeClosed: false,
        lastReportAt: 0,
        lastHighlight: { mouth: 0, shake: 0, blink: 0 },
      };
      state.faceCounts = { mouthOpens: 0, headShakes: 0, blinks: 0 };
      const _hlCanvas = document.createElement("canvas");
      _hlCanvas.width = HIGHLIGHT_SIZE;
      _hlCanvas.height = HIGHLIGHT_SIZE;
      const _hlCtx = _hlCanvas.getContext("2d", { alpha: false });

      function grabHighlightFrame() {
        if (!_hlCtx || !webcamVideo) return null;
        const vw = webcamVideo.videoWidth;
        const vh = webcamVideo.videoHeight;
        if (!vw || !vh) return null;
        // Center-crop to a square so the face stays in frame; mirror the X axis
        // because the player has been seeing the mirrored selfie all round.
        const side = Math.min(vw, vh);
        const sx = (vw - side) / 2;
        const sy = (vh - side) / 2;
        try {
          _hlCtx.save();
          _hlCtx.translate(HIGHLIGHT_SIZE, 0);
          _hlCtx.scale(-1, 1);
          _hlCtx.drawImage(webcamVideo, sx, sy, side, side, 0, 0, HIGHLIGHT_SIZE, HIGHLIGHT_SIZE);
          _hlCtx.restore();
          return _hlCanvas.toDataURL("image/jpeg", HIGHLIGHT_QUALITY);
        } catch (e) {
          return null;
        }
      }

      function maybeSendHighlight(kind, now) {
        const ft = state.faceTracker;
        if (now - (ft.lastHighlight[kind] || 0) < HIGHLIGHT_COOLDOWN_MS) return;
        if (!webcamVideo) return;
        ft.lastHighlight[kind] = now;
        // Capture a short burst (acts as a tiny GIF the ceremony loops). Each
        // frame is grabbed on its own setTimeout so the FaceMesh loop stays on
        // schedule. The very first frame is the action-edge moment itself.
        const frames = [];
        const first = grabHighlightFrame();
        if (first) frames.push(first);
        let i = 1;
        function snap() {
          if (i >= HIGHLIGHT_FRAMES) {
            if (frames.length === 0) return;
            if (window !== window.top) {
              try {
                window.parent.postMessage(
                  {
                    type: "NZ_OUT_HIGHLIGHT",
                    source: "nocturne-zoo",
                    payload: { kind, frames, ts: Date.now() },
                  },
                  "*"
                );
              } catch (e) { /* ignore */ }
            }
            return;
          }
          const f = grabHighlightFrame();
          if (f) frames.push(f);
          i += 1;
          setTimeout(snap, HIGHLIGHT_FRAME_INTERVAL_MS);
        }
        setTimeout(snap, HIGHLIGHT_FRAME_INTERVAL_MS);
      }

      function tallyFaceActions(lm, now) {
        const ft = state.faceTracker;
        const fc = state.faceCounts;
        // Mouth: hysteresis edge — count one per open-then-close cycle.
        const mar = lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
        if (!ft.mouthOpen && mar > FACE_MOUTH_OPEN_MAR) {
          ft.mouthOpen = true;
          fc.mouthOpens += 1;
          maybeSendHighlight("mouth", now);
        } else if (ft.mouthOpen && mar < FACE_MOUTH_CLOSE_MAR) {
          ft.mouthOpen = false;
        }
        // Head shake: count direction flips of nose_x relative to face center.
        const nose = lm[4], lb = lm[234], rb = lm[454];
        if (nose && lb && rb) {
          const cx = (lb.x + rb.x) / 2;
          const fw = Math.abs(rb.x - lb.x) + 1e-6;
          const nx = (nose.x - cx) / fw;
          const dir = nx > FACE_SHAKE_NX_THRESH ? 1 : nx < -FACE_SHAKE_NX_THRESH ? -1 : 0;
          if (dir !== 0 && dir !== ft.nxDir) {
            if (ft.nxDir !== 0) {
              fc.headShakes += 1; // count only true flips
              maybeSendHighlight("shake", now);
            }
            ft.nxDir = dir;
          } else if (dir === 0) {
            // pass — keep last direction so consecutive same-side reads don't add
          }
        }
        // Blink: count rising edge of eye-closure (open → closed).
        const ear = decisionEar(
          (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2
        );
        const closedNow = isEyeClosed(ear);
        if (!ft.eyeClosed && closedNow) {
          ft.eyeClosed = true;
          fc.blinks += 1;
          maybeSendHighlight("blink", now);
        } else if (ft.eyeClosed && !closedNow) {
          ft.eyeClosed = false;
        }
        // Periodic upstream report (cumulative totals — server takes max).
        if (now - ft.lastReportAt >= FACE_COUNT_REPORT_MS) {
          ft.lastReportAt = now;
          if (window !== window.top) {
            try {
              window.parent.postMessage(
                {
                  type: "NZ_OUT_FACE_COUNTS",
                  source: "nocturne-zoo",
                  payload: { ...fc },
                },
                "*"
              );
            } catch (e) { /* ignore */ }
          }
        }
      }

      function processMonitorChallenge(lm, now) {
        const act = challenge.action;

        if (act === "blink") {
          const ear = decisionEar(
            (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2
          );
          if (isEyeClosed(ear)) {
            challenge.blink.since  = null;
            chalStatus.textContent = t("statusBlinked");
          } else {
            if (!challenge.blink.since) challenge.blink.since = now;
            const elapsed = now - challenge.blink.since;
            chalStatus.textContent = t(
              "statusKeepEyesOpenS",
              Math.max(0, 3 - elapsed / 1000).toFixed(1)
            );
            if (elapsed >= BLINK_MS) {
              challenge.completed = true;
              endChallenge(true);
            }
          }
        } else if (act === "mouth") {
          const mar =
            lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
          if (mar > MAR_OPEN) {
            challenge.mouth.openFrames++;
            chalStatus.textContent = t("statusMouthHolding");
            if (challenge.mouth.openFrames >= 8) {
              challenge.completed = true;
              endChallenge(true);
            }
          } else {
            challenge.mouth.openFrames = Math.max(
              0,
              challenge.mouth.openFrames - 1
            );
            chalStatus.textContent = t("statusMouthOpenCmd");
          }
        } else if (act === "shake") {
          const nose = lm[4], lb = lm[234], rb = lm[454];
          const cx   = (lb.x + rb.x) / 2;
          const fw   = Math.abs(rb.x - lb.x) + 1e-6;
          const nx   = (nose.x - cx) / fw;
          const cur  = nx > SHAKE_THRESH ? 1 : nx < -SHAKE_THRESH ? -1 : 0;
          if (cur !== 0 && cur !== challenge.shake.dir) {
            challenge.shake.dir = cur;
            challenge.shake.changes++;
          }
          chalStatus.textContent = t(
            "statusShakeProgress",
            Math.floor(challenge.shake.changes / 2)
          );
          if (challenge.shake.changes >= 4) {
            challenge.completed = true;
            endChallenge(true);
          }
        }
      }

      // =================================================================
      // Universal Rule Challenge System
      // =================================================================

      const uChalOverlay = document.getElementById("universalOverlay");
      const uChalIcon    = document.getElementById("uchal-icon");
      const uChalLabel   = document.getElementById("uchal-label");
      const uChalStatus  = document.getElementById("uchal-status");
      const uChalBarFill = document.getElementById("uchal-bar-fill");

      const universalChallenge = {
        active: false,
        action: null,
        completed: false,
        timeLeft: 0,
        MAX_TIME: 5,
        blink:    { frames: 0 },
        mouth:    { frames: 0 },
        headmove: { hDir: 0, hChanges: 0, vDir: 0, vChanges: 0 },
      };

      function startUniversalChallenge(rule) {
        if (state.spectator) return;
        universalChallenge.active    = true;
        universalChallenge.completed = false;
        universalChallenge.action    = rule.id;
        universalChallenge.timeLeft  = universalChallenge.MAX_TIME;
        universalChallenge.blink     = { frames: 0 };
        universalChallenge.noblink   = { since: null, closedStreak: 0 };
        universalChallenge.mouth     = { frames: 0 };
        universalChallenge.headmove  = { hDir: 0, hChanges: 0, vDir: 0, vChanges: 0 };
        uChalIcon.textContent    = rule.icon;
        uChalLabel.textContent   = t(rule.labelKey);
        uChalStatus.textContent  = t("statusUniGo");
        uChalBarFill.style.width = "100%";
        uChalOverlay.className   = "action-bar action-bar-bottom active";
      }

      function endUniversalChallenge(success) {
        if (!universalChallenge.active) return;
        universalChallenge.active = false;
        if (success) {
          uChalStatus.textContent = t("statusSuccess");
          uChalBarFill.style.width = "100%";
          uChalOverlay.className  = "action-bar action-bar-bottom active success";
          flashOverlay("successFlash", 420);
          nzHaptic("ruleSuccess");
          addLog(t("logUniDone"));
        } else {
          uChalStatus.textContent = t("statusFail");
          uChalOverlay.className  = "action-bar action-bar-bottom active fail";
          reportViolation();
          state.me.lives = Math.max(0, state.me.lives - 1);
          renderLives();
          playSound("healthLoss");
          flashOverlay("hpFlash", 360);
          pulseLives("hp-shake", 420);
          shakePhone("impact-shake", 320);
          nzHaptic("hpLoss");
          addLog(t("logUniFail"), null, { rule: true });
          if (state.me.lives <= 0) { setTimeout(handleDeath, 1200); }
        }
        setTimeout(() => {
          uChalOverlay.className = "action-bar action-bar-bottom";
        }, 1200);
      }

      function updateUniversalChallenge(dt) {
        if (!universalChallenge.active) return;
        universalChallenge.timeLeft -= dt;
        uChalBarFill.style.width =
          Math.max(0, (universalChallenge.timeLeft / universalChallenge.MAX_TIME) * 100) + "%";
        if (universalChallenge.timeLeft <= 0) endUniversalChallenge(false);
      }

      function processUniversalChallenge(lm) {
        const act = universalChallenge.action;

        if (act === "u_noblink") {
          // "Don't blink for 2s" — wall-clock hold so the rule reads as
          // a true 2 s regardless of FPS (was 60 frames = ~4 s @ 15 fps
          // on mobile). Use SMOOTHED EAR so single-frame jitter doesn't
          // false-reset the timer; resetFrames=1 means a real blink
          // (which lasts multiple smoothed frames anyway) immediately
          // resets `since`.
          const earL = earVal(lm, L_EYE_IDX);
          const earR = earVal(lm, R_EYE_IDX);
          const ear = decisionEar((earL + earR) / 2);
          const closed = isEyeClosed(ear);
          if (!universalChallenge.noblink) {
            universalChallenge.noblink = { since: null, closedStreak: 0 };
          }
          const nb = universalChallenge.noblink;
          const now = (typeof performance !== "undefined" ? performance.now() : Date.now());
          if (closed) {
            nb.closedStreak++;
            if (nb.closedStreak >= BLINK_TUNING.uNoBlinkResetFrames) {
              nb.since = null;
              uChalStatus.textContent = t("statusNoBlinkPlease");
            }
          } else {
            nb.closedStreak = 0;
            if (nb.since == null) nb.since = now;
            const elapsed = now - nb.since;
            const left = Math.max(0, (BLINK_TUNING.uNoBlinkHoldMs - elapsed) / 1000);
            uChalStatus.textContent = t("statusNoBlinkHold", left.toFixed(1));
            if (elapsed >= BLINK_TUNING.uNoBlinkHoldMs) {
              universalChallenge.completed = true;
              endUniversalChallenge(true);
            }
          }
        } else if (act === "u_mouth") {
          const mar = lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
          if (mar > MAR_OPEN) {
            universalChallenge.mouth.frames++;
            uChalStatus.textContent = t("statusMouthHolding");
            if (universalChallenge.mouth.frames >= 8) {
              universalChallenge.completed = true;
              endUniversalChallenge(true);
            }
          } else {
            universalChallenge.mouth.frames = Math.max(0, universalChallenge.mouth.frames - 1);
            uChalStatus.textContent = t("statusMouthOpenCmd");
          }
        } else if (act === "u_headmove") {
          const nose = lm[4], lb = lm[234], rb = lm[454];
          // Lateral shake
          const faceCX = (lb.x + rb.x) / 2;
          const faceW  = Math.abs(rb.x - lb.x) + 1e-6;
          const nx     = (nose.x - faceCX) / faceW;
          const hCur   = nx > SHAKE_THRESH ? 1 : nx < -SHAKE_THRESH ? -1 : 0;
          if (hCur !== 0 && hCur !== universalChallenge.headmove.hDir) {
            universalChallenge.headmove.hDir = hCur;
            universalChallenge.headmove.hChanges++;
          }
          // Vertical nod
          const faceCY = (lm[10].y + lm[152].y) / 2;
          const faceH  = Math.abs(lm[10].y - lm[152].y) + 1e-6;
          const ny     = (nose.y - faceCY) / faceH;
          const vCur   = ny > 0.08 ? 1 : ny < -0.08 ? -1 : 0;
          if (vCur !== 0 && vCur !== universalChallenge.headmove.vDir) {
            universalChallenge.headmove.vDir = vCur;
            universalChallenge.headmove.vChanges++;
          }
          const total = universalChallenge.headmove.hChanges + universalChallenge.headmove.vChanges;
          uChalStatus.textContent = total > 0 ? t("statusHeadKeep") : t("statusHeadDo");
          if (total >= 2) {
            universalChallenge.completed = true;
            endUniversalChallenge(true);
          }
        }
      }

      // ---------- FaceMesh + Camera setup ----------
      try {
        const faceMesh = new FaceMesh({
          locateFile: (f) =>
            "https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/" + f,
        });
        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        faceMesh.onResults((results) => {
          if (
            results.multiFaceLandmarks &&
            results.multiFaceLandmarks.length > 0
          ) {
            processFace(results.multiFaceLandmarks[0], performance.now());
          }
        });

        const camStream = new Camera(webcamVideo, {
          onFrame: async () => {
            await faceMesh.send({ image: webcamVideo });
          },
          width: 320,
          height: 240,
        });
        camStream.start().catch(() => {
          addLog(t("camInitFailed"));
        });
      } catch (e) {
        addLog(t("camDetectError", e.message));
      }

      // =================================================================
      // Boot
      // =================================================================
      buildScene();
      seedLog();
      renderLives();
      renderTimer();
      // Initial render of localized static UI.
      const _initialHint = document.getElementById("moveHint");
      if (_initialHint) _initialHint.textContent = t("hint");
      requestAnimationFrame(frame);

      // -----------------------------------------------------------------
      // MainSync: parent React shell (onboarding) sends role + rules here.
      // -----------------------------------------------------------------
      function applyMainSync(p) {
        if (!p || typeof p !== "object") return;
        // Adopt the parent app's UI language as soon as it tells us.
        if (typeof p.lang === "string") setLang(p.lang);
        if (state.spectator) {
          if (p.ruleText) addLog(t("logRulePrefix") + String(p.ruleText), null, { rule: true });
          if (p.winText) addLog(t("logWinPrefix") + String(p.winText), null, {});
          return;
        }
        var a = p.sceneAnimal;
        if (a !== "lion" && a !== "owl" && a !== "giraffe") a = "owl";
        state.me.animal = a;
        state.lastMainSyncName =
          typeof p.playerName === "string" ? p.playerName : "";
        if (typeof p.lives === "number") {
          state.me.lives = Math.max(0, Math.min(3, Math.floor(p.lives)));
        }
        // Server-authoritative death: if the snapshot says we're out (lives 0
        // or alive=false), enter spectator mode even if the local rule-fail
        // path didn't fire (e.g. rejoin, snapshot-driven death, or any future
        // server-side mechanism).
        const serverDead =
          (typeof p.alive === "boolean" && p.alive === false) ||
          state.me.lives <= 0;
        if (serverDead && !state.me.dead) {
          handleDeath();
          if (p.ruleText) addLog(t("logRulePrefix") + String(p.ruleText), null, { rule: true });
          if (p.winText) addLog(t("logWinPrefix") + String(p.winText), null, {});
          return;
        }
        const nm = typeof p.playerName === "string" ? p.playerName : "";
        if (state.nodes.me && state.nodes.me.parentNode) {
          state.nodes.me.parentNode.removeChild(state.nodes.me);
        }
        const newMe = makeAnimalAvatar({ animal: a, isMe: true, name: nm });
        // Already-dead players (e.g. snapshot fired handleDeath in a previous
        // pass) must not have their avatar reappear when the snapshot churns.
        if (state.me.dead) newMe.setAttribute("visibility", "hidden");
        layers.me.appendChild(newMe);
        state.nodes.me = newMe;
        renderLives();
        if (p.ruleText) addLog(t("logRulePrefix") + String(p.ruleText), null, { rule: true });
        if (p.winText) addLog(t("logWinPrefix") + String(p.winText), null, {});
      }
      function hash01(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++)
          h = ((h << 5) - h + s.charCodeAt(i)) | 0;
        return (Math.abs(h) % 1000) / 1000;
      }
      function applyMSView(p) {
        if (!p || typeof p !== "object") return;
        state.spectator = Boolean(p.spectator);
        if (state.spectator && state.nodes.me) {
          state.nodes.me.setAttribute("visibility", "hidden");
        } else if (state.nodes.me) {
          state.nodes.me.setAttribute("visibility", "visible");
        }
        // One body class to drive ALL the OB-only / spectator-only CSS rules. Easier than
        // chasing every UI element individually (hearts, joystick, cam preview, alert flash,
        // challenge bars, hint…). Also clears any leftover challenge bar state that was
        // active right before the role flipped.
        if (typeof document !== "undefined" && document.body) {
          document.body.classList.toggle("is-spectator", state.spectator);
        }
        if (state.spectator) {
          challenge.active = false;
          challenge.completed = false;
          if (typeof chalOverlay !== "undefined" && chalOverlay) {
            chalOverlay.className = "action-bar action-bar-top";
          }
          universalChallenge.active = false;
          universalChallenge.completed = false;
          if (typeof uChalOverlay !== "undefined" && uChalOverlay) {
            uChalOverlay.className = "action-bar action-bar-bottom";
          }
          if (alertOverlay) alertOverlay.classList.remove("active");
          // Hearts container should be empty for OB so it doesn't read as "OB has 3 lives".
          renderLives();
        }
      }
      function applyObCamera(p) {
        if (!p || typeof p !== "object" || !state.spectator) return;
        if (p.initFromCurrent) {
          var c = getSpectatorTargetXY();
          state.obFreeTarget.x = c.x;
          state.obFreeTarget.y = c.y;
        }
        if (p.mode === "centroid" || p.mode === "follow" || p.mode === "free") {
          state.obCamMode = p.mode;
        }
        if (p.followPlayerId !== undefined) {
          state.obFollowId = p.followPlayerId ? String(p.followPlayerId) : null;
        }
        if (
          p.freeCenter &&
          typeof p.freeCenter.x === "number" &&
          Number.isFinite(p.freeCenter.x) &&
          typeof p.freeCenter.y === "number" &&
          Number.isFinite(p.freeCenter.y)
        ) {
          state.obFreeTarget.x = clamp(p.freeCenter.x, BORDER, MAP_W - BORDER);
          state.obFreeTarget.y = clamp(p.freeCenter.y, BORDER, MAP_H - BORDER);
        }
      }
      function applyNetPeers(raw) {
        if (!raw || typeof raw !== "object") return;
        var peers = raw.peers;
        if (!peers || typeof peers !== "object") return;
        var selfId = String(raw.selfId != null ? raw.selfId : state.netSelfId || "");
        var spec = state.spectator;
        for (var pid in peers) {
          if (!spec && pid === selfId) continue;
          var pr = peers[pid];
          if (!pr || typeof pr !== "object") continue;
          var row = state.others.find(function (o) { return o.id === pid; });
          if (!row) continue;
          if (pr.x != null && Number.isFinite(pr.x)) row.x = clamp(pr.x, BORDER, MAP_W - BORDER);
          if (pr.y != null && Number.isFinite(pr.y)) row.y = clamp(pr.y, BORDER, MAP_H - BORDER);
          if (pr.moving != null) row.moving = !!pr.moving;
          if (pr.animKey != null) row.animKey = String(pr.animKey).slice(0, 64);
          if (pr.facing != null) row.facing = +pr.facing;
        }
      }
      function applyRoomPlayers(raw) {
        if (!raw || typeof raw !== "object") return;
        var pl = raw.players;
        if (!Array.isArray(pl)) return;
        var selfId = raw.selfId || "";
        var selfName = String(raw.selfName || "");
        state.netSelfId = selfId;
        var wasStarted = state.roomStarted;
        state.roomStarted = Boolean(raw.roomStarted);
        // Server-authoritative round timing. `state.timer` stays in seconds
        // (mirrors the existing renderTimer code path).
        var serverDurationMs = Number(raw.durationMs);
        if (Number.isFinite(serverDurationMs) && serverDurationMs > 0) {
          state.roundDurationSec = Math.round(serverDurationMs / 1000);
        }
        if (state.roomStarted) {
          var startedAt = Number(raw.startedAt);
          var totalSec = (typeof state.roundDurationSec === "number" && state.roundDurationSec > 0)
            ? state.roundDurationSec
            : 120;
          if (Number.isFinite(startedAt) && startedAt > 0) {
            var remainingMs = (startedAt + (totalSec * 1000)) - Date.now();
            state.timer = Math.max(0, Math.round(remainingMs / 1000));
          } else if (!wasStarted) {
            state.timer = totalSec;
          }
          renderTimer();
        } else {
          // Lobby / pre-round: hold the HUD at the configured round length.
          state.timer = (typeof state.roundDurationSec === "number" && state.roundDurationSec > 0)
            ? state.roundDurationSec
            : 120;
          renderTimer();
        }
        // BGM kicks in the moment the room flips to "started" (player has just entered the
        // live scene). Looping handled by the audio element; stops on timer-end below.
        // Plus a brief amber flash + haptic so the round transition lands.
        if (state.roomStarted && !wasStarted) {
          startBgm();
          if (!state.spectator) {
            flashOverlay("startFlash", 360);
            nzHaptic("gameStart");
          }
        }
        // Round reset → clear leftover rabbit Monitors so they don't linger
        // between games. The next MONITOR_STATE from the server will re-add
        // them based on the new round's player count.
        if (!state.roomStarted && wasStarted && state.extraMonitors.length) {
          for (const ex of state.extraMonitors) {
            if (ex.bodyNode && ex.bodyNode.parentNode) ex.bodyNode.parentNode.removeChild(ex.bodyNode);
            if (ex.coneNode && ex.coneNode.parentNode) ex.coneNode.parentNode.removeChild(ex.coneNode);
          }
          state.extraMonitors.length = 0;
        }
        if (raw.spectator != null) state.spectator = Boolean(raw.spectator);
        var toRem = raw.itemsRemoved;
        if (Array.isArray(toRem) && toRem.length) {
          for (var rii = 0; rii < toRem.length; rii++) {
            removeItemByIdNoEffects(toRem[rii]);
          }
        }
        var others = pl.filter(function (q) {
          if (!q || !q.id) return false;
          if (selfId) return q.id !== selfId;
          if (selfName && q.name === selfName) return false;
          if (!selfId && !selfName && state.lastMainSyncName && q.name === state.lastMainSyncName)
            return false;
          return true;
        });
        for (var oi = 0; oi < state.others.length; oi++) {
          var op = state.others[oi];
          var onode = state.nodes.others.get(op.id);
          if (onode && onode.parentNode) onode.parentNode.removeChild(onode);
          state.nodes.others.delete(op.id);
        }
        state.others = [];
        var n = others.length;
        var wcx = MAP_W / 2;
        var wcy = MAP_H / 2;
        for (var j = 0; j < n; j++) {
          var q = others[j];
          var an = q.sceneAnimal;
          if (an !== "lion" && an !== "owl" && an !== "giraffe") an = "owl";
          var t = (2 * Math.PI * j) / Math.max(n, 1) + hash01(String(q.id)) * 0.4;
          var r = 220 + 50 * (j % 2);
          var x = wcx + Math.cos(t) * r;
          var y = wcy + Math.sin(t) * r;
          x = clamp(x, BORDER, MAP_W - BORDER);
          y = clamp(y, BORDER, MAP_H - BORDER);
          var row = {
            id: q.id,
            name: String(q.name || "…"),
            animal: an,
            x: x,
            y: y,
            vx: 0,
            vy: 0,
            moving: false,
            animKey: "idle",
            facing: 0,
            netRemote: true,
            // Server-authoritative liveness. The Monitor AI uses this to skip
            // corpses so it doesn't lock onto a dead body and freeze in place.
            alive: q.alive !== false,
          };
          state.others.push(row);
          // Dead remote players render as a floating ghost (matches the local death visual).
          // Without this, other clients keep showing the dead player's animal sprite frozen
          // at their last position — the "ghost没触发" symptom.
          var g = row.alive
            ? makeAnimalAvatar({ animal: an, isMe: false, name: row.name })
            : makeGhost({ name: row.name });
          layers.others.appendChild(g);
          state.nodes.others.set(q.id, g);
        }
        if (n > 0) addLog(t("logRosterSync", n), null, {});
        if (
          raw.roomStarted &&
          state.items.length === 0 &&
          (!toRem || toRem.length === 0)
        ) {
          reseedMapItems();
        }
      }
      window.addEventListener("message", function (ev) {
        var d = ev.data;
        if (!d || d.source !== "nocturne-zoo" || d.payload == null) return;
        if (d.type === "NZ_MS_VIEW") {
          applyMSView(d.payload);
        } else if (d.type === "NZ_PLAYER_SYNC") {
          applyMainSync(d.payload);
        } else if (d.type === "NZ_ROOM_PLAYERS") {
          applyRoomPlayers(d.payload);
        } else if (d.type === "NZ_MAIN_SCENE_NET") {
          applyNetPeers(d.payload);
        } else if (d.type === "NZ_MS_ITEM") {
          if (d.payload && d.payload.events) applyItemInbox(d.payload.events);
        } else if (d.type === "NZ_OB_CAMERA") {
          applyObCamera(d.payload);
        } else if (d.type === "NZ_MONITOR_STATE") {
          applyServerMonitorList(d.payload);
        }
      });
    </script>
  </body>
</html>

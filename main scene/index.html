          lockTimer: 0,
          retargetIn: 0,
          lured: null,
          patrolTarget: null,
          patrolTimer: 0,
          moving: false,
        };
        state.monitors.set(id, m);
        return m;
      }
      function ensureMonitorNodes(id) {
        let nodes = state.nodes.monitors.get(id);
        if (nodes) return nodes;
        const body  = makeMonitor();
        const cone  = makeCone();
        const torch = makeTorch();
        layers.monitor.appendChild(body);
        layers.cone.appendChild(cone);
        layers.torch.appendChild(torch);
        nodes = { body, cone, torch };
        state.nodes.monitors.set(id, nodes);
        return nodes;
      }
      function dropMonitorEntry(id) {
        const nodes = state.nodes.monitors.get(id);
        if (nodes) {
          for (const n of [nodes.body, nodes.cone, nodes.torch]) {
            if (n && n.parentNode) n.parentNode.removeChild(n);
          }
          state.nodes.monitors.delete(id);
        }
        state.monitors.delete(id);
      }
      // Used by alarm pickup (solo path) and as a generic helper. Picks the
      // monitor whose current pose is closest to (x, y) and switches it into
      // a 4-second lure; returns true if a monitor was nudged.
      function lureNearestMonitor(x, y) {
        let nearest = null;
        let bestD = Infinity;
        for (const m of state.monitors.values()) {
          const d = Math.hypot(m.x - x, m.y - y);
          if (d < bestD) { bestD = d; nearest = m; }
        }
        if (!nearest) return false;
        nearest.mode = "sweep";
        nearest.targetId = null;
        nearest.lured = { x, y };
        nearest.retargetIn = 4;
        return true;
      }
      // Death / challenge-end paths call this so any monitor that was locked
      // onto the local player releases simultaneously — otherwise the freed
      // flashlight keeps chasing a corpse / ghost.
      function releaseAllLockOnMe() {
        for (const m of state.monitors.values()) {
          if (m.targetId === "me") {
            m.mode = "sweep";
            m.targetId = null;
            m.sweepTimer = 1;
          }
        }
      }
      // True when ANY monitor currently has the local player as its lock
      // target — used to decide if we should keep the challenge bar up.
      function anyMonitorLockingMe() {
        for (const m of state.monitors.values()) {
          if (m.targetId === "me") return true;
        }
        return false;
      }

      function defaultItemsLayout() {
        const cxi = MAP_W / 2;
        const cyi = MAP_H / 2;
        return [
          { id: "h1", type: "heart", x: cxi - 80, y: cyi - 340 },
          { id: "h2", type: "heart", x: cxi - 320, y: cyi - 60 },
          { id: "h3", type: "heart", x: cxi + 270, y: cyi + 380 },
          { id: "a1", type: "alarm", x: cxi + 140, y: cyi + 40 },
          { id: "a2", type: "alarm", x: cxi - 200, y: cyi + 220 },
          { id: "a3", type: "alarm", x: cxi + 320, y: cyi - 260 },
          { id: "a4", type: "alarm", x: cxi - 360, y: cyi - 280 },
          { id: "a5", type: "alarm", x: cxi + 400, y: cyi + 180 },
          { id: "a6", type: "alarm", x: cxi - 80,  y: cyi + 320 },
          { id: "a7", type: "alarm", x: cxi + 200, y: cyi - 80  },
        ];
      }
      function reseedMapItems() {
        state.items = defaultItemsLayout();
        state.nodes.items.clear();
        if (state._pickupReq) state._pickupReq.clear();
        while (layers.items.firstChild) {
          layers.items.removeChild(layers.items.firstChild);
        }
        for (const it of state.items) {
          const node = it.type === "heart" ? makeHeart() : makeAlarm();
          node.dataset.id = it.id;
          layers.items.appendChild(node);
          state.nodes.items.set(it.id, node);
        }
      }

      // =================================================================
      // Build initial scene
      // =================================================================
      function buildScene() {
        // ---- Fence around the perimeter --------------------------------
        // Individual <image> tiles referencing fenceTile.svg.
        //
        // History note: an earlier version of fenceTile.svg was a PNG with
        // an .svg extension, which iOS Safari mis-parsed (showed as
        // garbled "?" / letter tiles). It's now a real SVG, so this works
        // everywhere. We tile manually rather than via <pattern> because
        // a few iOS versions still glitch on PNG-via-pattern fills, and
        // raw <image> tiles render identically across every browser.
        //
        // The fenceTile SVG carries a baked-in feTurbulence/displacement
        // filter for the doodle "rough wood" look. That filter runs once
        // when the browser rasterizes the SVG at the displayed size — the
        // resulting bitmap is cached and reused every frame, so the noise
        // is locked in and does NOT recompute per frame. will-change on
        // .fence-layer (CSS) further nails the layer to GPU memory.
        const FH = 92;
        const FW = 140;
        // Tiles overlap by this much so the tiny transparent margin in
        // each fenceTile.svg doesn't leave a visible seam between adjacent
        // tiles. STEP is the spacing between successive tile origins.
        const TILE_OVERLAP = 18;
        const STEP = FW - TILE_OVERLAP;

        function placeFenceRow(parent, startX, endX, y) {
          for (let x = startX; x < endX; x += STEP) {
            parent.appendChild(
              el("image", {
                href: "fenceTile.svg",
                x,
                y,
                width: FW,
                height: FH,
                preserveAspectRatio: "none",
              })
            );
          }
        }

        // Top + bottom edges SKIP the FH × FH corner squares, so we don't
        // double up horizontal+vertical tiles at the corners. The vertical
        // sides own the corners.
        placeFenceRow(layers.fence, FH, MAP_W - FH, 0);
        placeFenceRow(layers.fence, FH, MAP_W - FH, MAP_H - FH);

        // Left + right sides cover full height including corners. Drawn
        // AFTER the horizontals so they sit on top at any seam.
        const leftG = el("g", { transform: `translate(${FH} 0) rotate(90)` });
        placeFenceRow(leftG, 0, MAP_H, 0);
        layers.fence.appendChild(leftG);
        const rightG = el("g", { transform: `translate(${MAP_W} 0) rotate(90)` });
        placeFenceRow(rightG, 0, MAP_H, 0);
        layers.fence.appendChild(rightG);

        // ---- Items -----------------------------------------------------
        for (const it of state.items) {
          const node = it.type === "heart" ? makeHeart() : makeAlarm();
          node.dataset.id = it.id;
          layers.items.appendChild(node);
          state.nodes.items.set(it.id, node);
        }

        // ---- Other players --------------------------------------------
        for (const p of state.others) {
          const node = makeAnimalAvatar({
            animal: p.animal,
            isMe: false,
            name: p.name,
          });
          layers.others.appendChild(node);
          state.nodes.others.set(p.id, node);
        }

        // ---- Monitor(s) ------------------------------------------------
        // Standalone-no-server bootstrap: seed a single "local0" supervisor
        // so the local AI fallback has something to drive when this file is
        // opened directly (no PartyKit room).  Once NZ_MONITOR_STATE starts
        // flowing, `applyServerMonitorList` replaces it with the server's
        // m0..mN-1 roster.
        ensureMonitorEntry("local0", { x: MAP_W / 2, y: MAP_H / 2 - 200, aimAngle: 0 });
        ensureMonitorNodes("local0");

        // ---- Me --------------------------------------------------------
        const me = makeAnimalAvatar({
          animal: state.me.animal,
          isMe: true,
        });
        layers.me.appendChild(me);
        state.nodes.me = me;
      }

      // =================================================================
      // Render (set transforms each frame)
      // =================================================================
      function getSpectatorTargetXY() {
        const oth = state.others;
        if (state.obCamMode === "free") {
          return { x: state.obFreeTarget.x, y: state.obFreeTarget.y };
        }
        if (state.obCamMode === "follow" && state.obFollowId) {
          const row = oth.find(function (o) {
            return o.id === state.obFollowId;
          });
          if (row) return { x: row.x, y: row.y };
        }
        if (oth.length === 0) {
          return { x: MAP_W / 2, y: MAP_H / 2 };
        }
        var sx = 0,
          sy = 0;
        for (var i = 0; i < oth.length; i++) {
          sx += oth[i].x;
          sy += oth[i].y;
        }
        return { x: sx / oth.length, y: sy / oth.length };
      }

      function updateCamera() {
        let camX, camY;
        if (state.spectator) {
          const t = getSpectatorTargetXY();
          camX = t.x - VIEW_W / 2;
          camY = t.y - VIEW_H / 2;
        } else {
          camX = state.me.x - VIEW_W / 2;
          camY = state.me.y - VIEW_H / 2;
        }
        camX = clamp(camX, 0, Math.max(0, MAP_W - VIEW_W));
        camY = clamp(camY, 0, Math.max(0, MAP_H - VIEW_H));
        state.cam.x = camX;
        state.cam.y = camY;
        cameraGroup.setAttribute("transform", `translate(${-camX} ${-camY})`);
      }

      const alertOverlay = document.getElementById("alertOverlay");

      // ---- Sound manager -------------------------------------------------
      // One Audio object per effect, replayed by resetting currentTime to 0.
      // Browsers may block autoplay before any user interaction, but every
      // SFX trigger here happens after the player has moved / clicked, so
      // by then audio is unlocked. We swallow the play() promise rejection
      // silently to avoid console noise.
      const SOUND_FILES = {
        alarm:      "../resource/microsammy-clock-alarm-8761.mp3",
        healthGain: "../resource/addHealth.wav",
        healthLoss: "../resource/minusHealth.wav",
      };
      const sounds = {};
      for (const [name, src] of Object.entries(SOUND_FILES)) {
        const a = new Audio(src);
        a.preload = "auto";
        a.volume = 0.7;
        a.setAttribute("playsinline", "");
        a.setAttribute("webkit-playsinline", "");
        sounds[name] = a;
      }
      function playSound(name) {
        const s = sounds[name];
        if (!s) return;
        try {
          s.currentTime = 0;
          const p = s.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        } catch (_) {}
      }
      // SFX autoplay unlock — the iframe needs its own user gesture for the
      // browser to grant <Audio> autoplay permission, otherwise sounds
      // triggered by network events (alarm broadcast, heart pickup) silently
      // drop. Prime each SFX element on the first iframe-side gesture by
      // running a muted play+pause; subsequent .play() calls are unblocked.
      let sfxUnlocked = false;
      function unlockSfxOnce() {
        if (sfxUnlocked) return;
        sfxUnlocked = true;
        for (const a of Object.values(sounds)) {
          try {
            const wasMuted = a.muted;
            a.muted = true;
            const p = a.play();
            if (p && typeof p.then === "function") {
              p.then(() => { try { a.pause(); } catch (_) {} a.currentTime = 0; a.muted = wasMuted; })
               .catch(() => { a.muted = wasMuted; });
            } else {
              try { a.pause(); } catch (_) {}
              a.currentTime = 0;
              a.muted = wasMuted;
            }
          } catch (_) { /* ignore */ }
        }
      }
      (function bindSfxUnlock() {
        const evts = ["pointerdown", "touchstart", "click", "keydown"];
        const fire = () => {
          for (const e of evts) window.removeEventListener(e, fire);
          unlockSfxOnce();
        };
        for (const e of evts) window.addEventListener(e, fire, { passive: true, once: true });
      })();

      // ---- Haptic + visual impact cues -------------------------------
      // Mobile haptic patterns. iOS Safari ignores navigator.vibrate, but
      // the call doesn't throw — Android Chrome/Edge/Firefox honour it,
      // and that's where most playtest devices land. Reduced-motion users
      // also get the silent treatment (no flashes, no pulses).
      const REDUCED_MOTION = (() => {
        try { return matchMedia("(prefers-reduced-motion: reduce)").matches; }
        catch { return false; }
      })();
      const HAPTIC = {
        hpLoss:      [22, 60, 30],
        hpGain:      [14],
        alarm:       [25, 50, 25, 50, 60],
        monitorLock: [40, 80, 40],
        eliminated:  [60, 80, 80, 80, 200],
        gameStart:   [30],
        gameEnd:     [40, 60, 40],
        // Short up-tick on rule completion. Light enough that a player
        // who clears 3-4 challenges in a row doesn't feel buzz-spammed,
        // strong enough to register a win.
        ruleSuccess: [12, 22, 18],
        // Single short tick fired once when the round drops below 15s
        // (one-shot warning, NOT looping — see lowTimeWarned guard).
        lowTime:     [18, 40, 18]
      };
      function nzHaptic(name) {
        if (REDUCED_MOTION) return;
        const pattern = HAPTIC[name];
        if (!pattern) return;
        try {
          if (typeof navigator !== "undefined" && typeof navigator.vibrate === "function") {
            navigator.vibrate(pattern);
          }
        } catch (_) { /* feature absent / blocked — ignore */ }
      }
      // One-shot flash helper. Removes the .active class after the CSS
      // animation finishes so the next trigger restarts cleanly.
      function flashOverlay(id, durationMs) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.remove("active");
        // force reflow to restart animation
        void el.offsetWidth;
        el.classList.add("active");
        setTimeout(() => el.classList.remove("active"), durationMs);
      }
      // Quick CSS-class one-shot on the lives container (shake/bump).
      function pulseLives(cls, durationMs) {
        if (REDUCED_MOTION) return;
        const root = document.getElementById("lives");
        if (!root) return;
        root.classList.remove(cls);
        void root.offsetWidth;
        root.classList.add(cls);
        setTimeout(() => root.classList.remove(cls), durationMs);
      }
      // One-shot shake on the outer phone-frame. Used for hard-impact moments
      // (HP loss, eliminated) so iOS users — who don't get the haptic — still
      // physically register the hit through the screen wobble.
      function shakePhone(cls, durationMs) {
        if (REDUCED_MOTION) return;
        const root = document.querySelector(".phone-frame");
        if (!root) return;
        root.classList.remove(cls);
        void root.offsetWidth;
        root.classList.add(cls);
        setTimeout(() => root.classList.remove(cls), durationMs);
      }

      // ---- Background music (loop) -----------------------------------
      // Starts when the room transitions to `started` (player has just been
      // brought into the live scene). Loops until the game ends or the
      // page unloads. Volume kept low so SFX + Monitor PA stay readable.
      const bgm = new Audio("../resource/midnight-gate-rules.mp3");
      bgm.loop = true;
      bgm.preload = "auto";
      bgm.volume = 0.35;
      bgm.setAttribute("playsinline", "");
      bgm.setAttribute("webkit-playsinline", "");
      let bgmStarted = false;
      let bgmGestureBound = false;
      function startBgm() {
        if (bgmStarted) return;
        try {
          const p = bgm.play();
          if (p && typeof p.then === "function") {
            p.then(() => {
              bgmStarted = true;
            }).catch(() => {
              // Mobile autoplay can reject the first attempt — retry on the next
              // user gesture inside the iframe (any tap/key counts).
              bindBgmUnlockOnce();
            });
          } else {
            bgmStarted = true;
          }
        } catch (_) {
          bindBgmUnlockOnce();
        }
      }
      function bindBgmUnlockOnce() {
        if (bgmGestureBound) return;
        bgmGestureBound = true;
        const evts = ["pointerdown", "touchstart", "click", "keydown"];
        const fire = () => {
          for (const e of evts) window.removeEventListener(e, fire);
          bgmGestureBound = false;
          startBgm();
        };
        for (const e of evts) window.addEventListener(e, fire, { passive: true, once: true });
      }
      function stopBgm() {
        try { bgm.pause(); } catch (_) { /* ignore */ }
        bgmStarted = false;
      }

      // Alarm: play a short window of the file (it's longer than we need)
      // and ease the volume to 0 in the final stretch so it doesn't just
      // cut off abruptly.
      function playAlarmSound() {
        const s = sounds.alarm;
        if (!s) return;
        // Cancel any fade timer left over from a previous trigger so the
        // new playback isn't immediately silenced.
        if (s._fadeTimer) {
          clearInterval(s._fadeTimer);
          s._fadeTimer = null;
        }
        const startVol = 0.7;
        try {
          s.currentTime = 0;
          s.volume = startVol;
          const p = s.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        } catch (_) {
          return;
        }
        const TOTAL_MS = 1400;   // overall ring duration
        const FADE_MS  = 700;    // last N ms fade volume linearly to 0
        const TICK_MS  = 40;
        const FADE_START = TOTAL_MS - FADE_MS;
        let elapsed = 0;
        s._fadeTimer = setInterval(() => {
          elapsed += TICK_MS;
          if (elapsed >= TOTAL_MS) {
            clearInterval(s._fadeTimer);
            s._fadeTimer = null;
            try { s.pause(); s.currentTime = 0; } catch (_) {}
            s.volume = startVol; // restore for next trigger
            return;
          }
          if (elapsed >= FADE_START) {
            const t = (elapsed - FADE_START) / FADE_MS;
            s.volume = startVol * Math.max(0, 1 - t);
          }
        }, TICK_MS);
      }

      function render() {
        updateCamera();

        // Red alert vignette: pulses while ANY rule challenge is in progress.
        if (alertOverlay) {
          const inAlert =
            (challenge.active && !challenge.completed) ||
            (universalChallenge.active && !universalChallenge.completed);
          alertOverlay.classList.toggle("active", inAlert);
        }

        // items
        for (const it of state.items) {
          const node = state.nodes.items.get(it.id);
          if (!node) continue;
          node.setAttribute("transform", `translate(${it.x} ${it.y})`);
        }
        // others
        for (const p of state.others) {
          const node = state.nodes.others.get(p.id);
          if (!node) continue;
          node.setAttribute("transform", `translate(${p.x} ${p.y})`);
          const ak =
            p.animKey != null && p.animKey !== ""
              ? p.animKey
              : p.moving
                ? "walk"
                : "idle";
          node.setAttribute("data-anim", ak);
          node.classList.toggle("walking", p.moving || ak === "walk");
        }
        // Position state.nodes.me every frame regardless of spectator —
        // a dead player's ghost still needs a transform so it renders at
        // the death location instead of (0, 0). Only the walking anim is
        // skipped when not actively playing (OB / dead).
        if (state.nodes.me) {
          state.nodes.me.setAttribute(
            "transform",
            `translate(${state.me.x} ${state.me.y})`
          );
          if (!state.spectator) {
            const mak = state.me.moving ? "walk" : "idle";
            state.nodes.me.setAttribute("data-anim", mak);
            state.nodes.me.classList.toggle("walking", state.me.moving);
          }
        }

        // ---- Per-supervisor render -----------------------------------
        // monitor body stays upright (no rotation) — only flashlight rotates.
        // Cone + torch share the same world transform: they rotate around
        // the monitor's center and always point along the aim angle.
        // Pupils: shift inside each eye toward the current aim. Update BOTH
        // the sweep pupils (red on white) and the locked pupils (white on
        // red) so when the monitor flips between modes the visible pupil is
        // already in the right spot.
        const PUPIL_OFFSET = 2.6;
        for (const mon of state.monitors.values()) {
          const nodes = state.nodes.monitors.get(mon.id);
          if (!nodes) continue;
          nodes.body.setAttribute("transform", `translate(${mon.x} ${mon.y})`);
          nodes.body.classList.toggle("walking", mon.moving);
          const angDeg = (mon.aimAngle * 180) / Math.PI;
          const tf = `translate(${mon.x} ${mon.y}) rotate(${angDeg})`;
          nodes.cone.setAttribute("transform", tf);
          nodes.torch.setAttribute("transform", tf);
          const ux = Math.cos(mon.aimAngle);
          const uy = Math.sin(mon.aimAngle);
          const b = nodes.body;
          const lcx = -b._eyeX + ux * PUPIL_OFFSET;
          const rcx =  b._eyeX + ux * PUPIL_OFFSET;
          const ey  =  b._eyeY + uy * PUPIL_OFFSET;
          for (const p of [b._sweepPupilL, b._lockedPupilL]) {
            if (p) { p.setAttribute("cx", lcx); p.setAttribute("cy", ey); }
          }
          for (const p of [b._sweepPupilR, b._lockedPupilR]) {
            if (p) { p.setAttribute("cx", rcx); p.setAttribute("cy", ey); }
          }
          // Toggle "locked" appearance (red glowing eyes + body shake)
          // per-monitor based on its own AI mode.
          b.classList.toggle("locked", mon.mode === "locked");
        }
      }

      // =================================================================
      // Update (movement / monitor AI)
      // =================================================================
      const SPEED = 110; // units per second
      const MON_SPEED = 110;
      // Fence thickness — entities must stay inside this border.
      const BORDER = 110;

      function updatePlayer(dt) {
        if (state.spectator) {
          // dead spectator: WASD / joystick pans the free camera
          if (state.me.dead && state.obCamMode === "free") {
            let dx = 0, dy = 0;
            const joyMag = Math.hypot(state.joyX, state.joyY);
            if (joyMag > 0.05) { dx = state.joyX; dy = state.joyY; }
            else {
              if (state.keys.up)    dy -= 1;
              if (state.keys.down)  dy += 1;
              if (state.keys.left)  dx -= 1;
              if (state.keys.right) dx += 1;
              const len = Math.hypot(dx, dy);
              if (len > 1) { dx /= len; dy /= len; }
            }
            if (dx || dy) {
              state.obFreeTarget.x = clamp(state.obFreeTarget.x + dx * SPEED * dt, BORDER, MAP_W - BORDER);
              state.obFreeTarget.y = clamp(state.obFreeTarget.y + dy * SPEED * dt, BORDER, MAP_H - BORDER);
            }
          }
          return;
        }
        const me = state.me;
        let dx = 0,
          dy = 0;

        // 1) Virtual joystick (touch). Analog input — magnitude controls
        //    how fast we move, so a small push = slow walk.
        const joyMag = Math.hypot(state.joyX, state.joyY);
        if (joyMag > 0.05) {
          dx = state.joyX;
          dy = state.joyY;
          state.tap = null;
        } else {
          // 2) Keyboard (desktop)
          if (state.keys.up) dy -= 1;
          if (state.keys.down) dy += 1;
          if (state.keys.left) dx -= 1;
          if (state.keys.right) dx += 1;

          // 3) Tap-to-move (fallback for desktop click)
          if (!dx && !dy && state.tap) {
            const ddx = state.tap.x - me.x;
            const ddy = state.tap.y - me.y;
            const d = Math.hypot(ddx, ddy);
            if (d < 4) {
              state.tap = null;
            } else {
              dx = ddx / d;
              dy = ddy / d;
            }
          } else if (dx || dy) {
            state.tap = null;
          }
        }

        // Normalize to unit length so diagonal isn't faster than cardinal.
        // Joystick analog already gives <=1, so we only normalize when
        // magnitude exceeds 1.
        const len = Math.hypot(dx, dy);
        if (len > 1) {
          dx /= len;
          dy /= len;
        }
        me.moving = dx !== 0 || dy !== 0;
        if (me.moving) {
          me.x = clamp(me.x + dx * SPEED * dt, BORDER, MAP_W - BORDER);
          me.y = clamp(me.y + dy * SPEED * dt, BORDER, MAP_H - BORDER);
        }

        // Pickup: solo / pre-start = local; after room started = server authority
        for (let i = state.items.length - 1; i >= 0; i--) {
          const it = state.items[i];
          if (Math.hypot(it.x - me.x, it.y - me.y) < 32) {
            if (state.roomStarted) {
              tryRequestItemPickup(it);
            } else {
              pickupLocal(it, i);
            }
          }
        }
      }

      function stripItemNode(it, idx) {
        const node = state.nodes.items.get(it.id);
        if (node) {
          const inner = node.firstElementChild;
          if (inner) {
            inner.classList.remove("heart-pulse", "alarm-shake");
            inner.classList.add("item-fade");
          }
          setTimeout(() => node.remove(), 460);
        }
        state.nodes.items.delete(it.id);
        state.items.splice(idx, 1);
        if (state._pickupReq) state._pickupReq.delete(it.id);
      }

      function tryRequestItemPickup(it) {
        if (!state._pickupReq) return;
        if (state._pickupReq.has(it.id)) return;
        if (it.type === "heart" && state.me.lives >= 3) return;
        state._pickupReq.add(it.id);
        try {
          if (window !== window.top) {
            window.parent.postMessage(
              {
                type: "NZ_OUT_ITEM_PICKUP",
                source: "nocturne-zoo",
                payload: { itemId: it.id },
              },
              "*"
            );
          } else {
            state._pickupReq.delete(it.id);
          }
        } catch (err) {
          state._pickupReq.delete(it.id);
        }
      }

      function pickupLocal(it, idx) {
        if (it.type === "heart") {
          if (state.me.lives >= 3) return;
          state.me.lives += 1;
          renderLives();
          flashHeartGain();
          pulseLives("hp-bump", 340);
          playSound("healthGain");
          nzHaptic("hpGain");
        } else if (it.type === "alarm") {
          addLog(t("logAlarmRing"));
          playAlarmSound();
          nzHaptic("alarm");
          if (challenge.active) endChallenge(false);
          // Solo path: no server, lure the closest local supervisor.  In a
          // real room the server's NZ_MONITOR_STATE will carry the lure on
          // whichever supervisor it picked, and this local nudge just keeps
          // the visual snappy until the next server frame arrives (~100ms).
          lureNearestMonitor(it.x, it.y);
        }
        stripItemNode(it, idx);
      }

      function applyItemTakenEvent(e) {
        if (!e || !e.itemId) return;
        const idx = state.items.findIndex((x) => x.id === e.itemId);
        if (idx < 0) return;
        const it = state.items[idx];
        if (e.itemType === "heart" && e.byPlayerId === state.netSelfId) {
          if (state.me.lives < 3) {
            state.me.lives += 1;
            renderLives();
            flashHeartGain();
            pulseLives("hp-bump", 340);
            playSound("healthGain");
            nzHaptic("hpGain");
          }
        } else if (e.itemType === "alarm") {
          addLog(t("logAlarmRing"));
          playAlarmSound();
          // Only trigger haptic for the local player who picked it up; other
          // clients don't need their phones buzzing for someone else's pickup.
          if (e.byPlayerId === state.netSelfId) nzHaptic("alarm");
          if (challenge.active) endChallenge(false);
          // Mirror the server's "nearest supervisor gets lured" pick on the
          // client — the next NZ_MONITOR_STATE frame (~100ms away) will
          // overwrite this with the authoritative lure target, but we set it
          // optimistically so the local visual doesn't sit idle for a tick.
          const lx = e.alarmLured ? e.alarmLured.x : it.x;
          const ly = e.alarmLured ? e.alarmLured.y : it.y;
          lureNearestMonitor(lx, ly);
        }
        stripItemNode(it, idx);
      }

      function removeItemByIdNoEffects(id) {
        const idx = state.items.findIndex((x) => x.id === id);
        if (idx < 0) return;
        stripItemNode(state.items[idx], idx);
      }

      function applyItemInbox(evts) {
        if (!Array.isArray(evts)) return;
        for (var ii = 0; ii < evts.length; ii++) {
          var ev = evts[ii];
          if (!ev || !ev.kind) continue;
          if (ev.kind === "taken") {
            applyItemTakenEvent(ev.data);
          } else if (ev.kind === "respawn" && ev.data) {
            applyItemRespawnEvent(ev.data);
          } else if (ev.kind === "resync" && ev.removedItemIds) {
            for (var j = 0; j < ev.removedItemIds.length; j++) {
              removeItemByIdNoEffects(ev.removedItemIds[j]);
            }
          }
        }
      }

      // Server respawned an item that had been picked up. Re-spawn its SVG node
      // so all clients see it pop back at its original spot. Idempotent — if
      // the item is somehow already in `state.items`, do nothing.
      function applyItemRespawnEvent(d) {
        if (!d || !d.itemId || !d.itemType) return;
        if (state.items.some((it) => it.id === d.itemId)) return;
        const it = { id: d.itemId, type: d.itemType, x: Number(d.x), y: Number(d.y) };
        state.items.push(it);
        const node = it.type === "heart" ? makeHeart() : makeAlarm();
        node.setAttribute("transform", "translate(" + it.x + " " + it.y + ")");
        layers.items.appendChild(node);
        state.nodes.items.set(it.id, node);
        if (state._pickupReq) state._pickupReq.delete(it.id);
      }

      function flashHeartGain() {
        const root = document.getElementById("lives");
        // Flash the rightmost filled heart
        const filled = [...root.children].filter(
          (c) => !c.classList.contains("heart-off")
        );
        const target = filled[filled.length - 1];
        if (!target) return;
        target.classList.remove("heart-gain");
        // force reflow to restart animation
        void target.offsetWidth;
        target.classList.add("heart-gain");
      }

      function updateOthers(dt) {
        // gentle wandering for visual life (within map bounds)
        for (const p of state.others) {
          if (p.netRemote) continue;
          if (Math.random() < 0.012) {
            p.vx = (Math.random() - 0.5) * 1.6;
            p.vy = (Math.random() - 0.5) * 1.6;
            p.moveTimer = 0.6 + Math.random() * 1.4;
          }
          if (p.moveTimer && p.moveTimer > 0) {
            p.x = clamp(p.x + p.vx * 36 * dt, BORDER, MAP_W - BORDER);
            p.y = clamp(p.y + p.vy * 36 * dt, BORDER, MAP_H - BORDER);
            p.moveTimer -= dt;
            p.moving = true;
          } else {
            p.moving = false;
          }
        }
      }

      // Returns true if (playerX, playerY) falls inside the flashlight cone,
      // OR if the player is within close-range proximity (NEAR_RADIUS) of
      // the keeper — mirrors server-side detection so the local fallback
      // sim and the OB view light up the same target the server is locking
      // onto. Cone half-angle ~35°, max reach 330 units, near radius 95.
      function isInCone(monX, monY, aimAngle, playerX, playerY) {
        const dx   = playerX - monX;
        const dy   = playerY - monY;
        const dist = Math.hypot(dx, dy);
        if (dist < 0.5) return false;
        if (dist <= 95) return true;
        if (dist > 330) return false;
        return Math.abs(wrapAngle(Math.atan2(dy, dx) - aimAngle)) < 0.62;
      }

      // Reconcile the rabbit Monitor list (kind !== "main") with the
      // server-authoritative array. Creates fresh body+cone nodes for new
      // entries, removes nodes for departed rabbits, and updates the
      // remaining ones' state in-place so render() can transform them.
      // The PRIMARY Monitor (kind === "main") is handled by the existing
      // single-monitor pipeline at the top of applyServerMonitorState
      // and is intentionally excluded from this list.
      function syncExtraMonitorsFromServer(monitors) {
        const rabbits = monitors.filter(function (m) {
          return m && m.kind !== "main" && m.id;
        });
        // Drop nodes for rabbits that vanished (e.g. game ended, room reset).
        const liveIds = new Set(rabbits.map(function (m) { return m.id; }));
        for (let i = state.extraMonitors.length - 1; i >= 0; i--) {
          const ex = state.extraMonitors[i];
          if (!liveIds.has(ex.id)) {
            if (ex.bodyNode && ex.bodyNode.parentNode) ex.bodyNode.parentNode.removeChild(ex.bodyNode);
            if (ex.coneNode && ex.coneNode.parentNode) ex.coneNode.parentNode.removeChild(ex.coneNode);
            state.extraMonitors.splice(i, 1);
          }
        }
        // Add / update.
        for (const m of rabbits) {
          let cur = state.extraMonitors.find(function (e) { return e.id === m.id; });
          if (!cur) {
            const body = makeMonitor();
            // Tag rabbit nodes so CSS can give them a distinct tint
            // (keeps the primary ZooKeeper visually special).
            body.classList.add("zk-rabbit");
            const cone = makeCone();
            cone.classList.add("flashlight-cone--rabbit");
            layers.monitor.appendChild(body);
            layers.cone.appendChild(cone);
            cur = {
              id: m.id,
              kind: m.kind,
              x: m.x, y: m.y,
              aimAngle: m.aimAngle,
              mode: m.mode,
              moving: !!m.moving,
              targetId: m.targetId || null,
              lured: m.lured ? { x: m.lured.x, y: m.lured.y } : null,
              bodyNode: body,
              coneNode: cone
            };
            state.extraMonitors.push(cur);
          } else {
            if (typeof m.x === "number") cur.x = m.x;
            if (typeof m.y === "number") cur.y = m.y;
            if (typeof m.aimAngle === "number") cur.aimAngle = m.aimAngle;
            if (m.mode === "sweep" || m.mode === "locked") cur.mode = m.mode;
            if (typeof m.moving === "boolean") cur.moving = m.moving;
            cur.targetId = m.targetId || null;
            cur.lured = m.lured ? { x: m.lured.x, y: m.lured.y } : null;
          }
        }
      }

      // When the server is broadcasting authoritative Monitor state via
      // NZ_MONITOR_STATE, skip the local AI sim — every client must see the
      // same flashlights / lock targets. Local sim is preserved for solo /
      // pre-network playtest (no server frame yet).
      //
      // Payload shape: { monitors: [{id, x, y, aimAngle, mode, moving, targetId, lured}], ts }.
      // Number of supervisors scales with humans (server enforces 1 per 5,
      // capped at 6); this function upserts each entry by id and removes any
      // local monitor whose id is no longer in the broadcast — that's how the
      // bootstrap "local0" gets replaced on the first server frame, and how
      // mid-round join/leave shrinks/grows the visible roster.
      function applyServerMonitorList(p) {
        if (!p || typeof p !== "object" || !Array.isArray(p.monitors)) return;
        const seen = new Set();
        let anyTargetMe = false;
        for (const sm of p.monitors) {
          if (!sm || typeof sm.id !== "string") continue;
          seen.add(sm.id);
          const m = ensureMonitorEntry(sm.id, { x: sm.x, y: sm.y, aimAngle: sm.aimAngle });
          ensureMonitorNodes(sm.id);
          if (typeof sm.x === "number") m.x = sm.x;
          if (typeof sm.y === "number") m.y = sm.y;
          if (typeof sm.aimAngle === "number") m.aimAngle = sm.aimAngle;
          if (sm.mode === "sweep" || sm.mode === "locked") m.mode = sm.mode;
          if (typeof sm.moving === "boolean") m.moving = sm.moving;
          if (sm.lured && typeof sm.lured.x === "number") {
            m.lured = { x: sm.lured.x, y: sm.lured.y };
          } else if (sm.lured === null) {
            m.lured = null;
          }
          const targetIsMe = sm.targetId === state.netSelfId;
          m.targetId = targetIsMe ? "me" : (sm.targetId || null);
          if (targetIsMe && sm.mode === "locked") anyTargetMe = true;
        }
        // Drop any local monitor not in the server list (including the
        // bootstrap "local0" on the first server frame, or supervisors
        // despawned mid-round when humans leave).
        for (const id of Array.from(state.monitors.keys())) {
          if (!seen.has(id)) dropMonitorEntry(id);
        }
        state._serverMonitorAt = (typeof performance !== "undefined" ? performance.now() : Date.now());
        // Reset the "fell back to local" warning so it can fire again on the
        // next stutter rather than only the first time per session.
        state._localMonitorWarned = false;
        // Lock-on-me edge: any single supervisor locked on us means we get
        // the challenge bar.  Track the prior frame so we only fire start /
        // end once per transition (the underlying state lives on each
        // monitor's targetId, but that's per-entry — this flag is the
        // collective "is at least one of them on me?" snapshot).
        const wasTargetMe = state._lockedOnMe === true;
        if (anyTargetMe && !wasTargetMe) {
          if (!challenge.active && !state.spectator && !state.me.dead) {
            startChallenge();
          }
        } else if (!anyTargetMe && wasTargetMe && challenge.active) {
          endChallenge(false);
        }
        state._lockedOnMe = anyTargetMe;
      }

      function updateMonitor(dt) {
        // If the authoritative server frame arrived recently, defer entirely
        // to it. Tightened to 600ms (server ticks every 100ms, so this gives
        // a ~6-frame buffer) — was 1500ms which let local sim drift visibly
        // when packets stuttered. Two clients running their own RNG diverge
        // instantly, so we want the local fallback to almost never fire.
        const _nowMs = (typeof performance !== "undefined" ? performance.now() : Date.now());
        if (state._serverMonitorAt && _nowMs - state._serverMonitorAt < 600) return;
        // Multiplayer mode: the server is authoritative, full stop. Two tabs
        // running their own RNG diverge instantly (this was the symptom of
        // "OB and player see a different monitor"). Freeze the monitor at
        // its last known pose until the next server frame resyncs us — a
        // brief pause is far better than visibly desynced flashlights.
        // The local sim below is only kept for standalone (no-server)
        // playtest of `main scene/index.html` opened directly.
        if (state.roomStarted) return;
        if (state.roomStarted && !state._localMonitorWarned) {
          state._localMonitorWarned = true;
          if (typeof console !== "undefined") {
            console.warn("[nz] Monitor: server frame stale; falling back to local sim",
              { lastServerAt: state._serverMonitorAt, age: _nowMs - (state._serverMonitorAt || 0) });
          }
        }
        for (const m of state.monitors.values()) {
          tickLocalMonitor(dt, m);
        }
      }

      // Per-supervisor local AI tick.  Used only when the server frame is
      // stale (>600ms) or this file is opened standalone — every authoritative
      // path overwrites these fields from `applyServerMonitorList`.
      function tickLocalMonitor(dt, m) {
        // --- Alarm lure: point toward lure position, then resume sweep ---
        // Mirror server-side turn rate — keep the keeper's "noticing" pace
        // identical between authoritative and local-fallback paths.
        if (m.lured) {
          const desired = Math.atan2(m.lured.y - m.y, m.lured.x - m.x);
          m.aimAngle += clamp(wrapAngle(desired - m.aimAngle), -1.2 * dt, 1.2 * dt);
          m.retargetIn -= dt;
          if (m.retargetIn <= 0) {
            m.lured = null;
            m.mode  = "sweep";
            m.sweepTimer = 1;
          }
          return;
        }

        if (m.mode === "sweep") {
          // Rotate flashlight back and forth
          m.aimAngle  += m.sweepDir * 1.0 * dt;
          m.sweepTimer -= dt;
          if (m.sweepTimer <= 0) {
            m.sweepTimer = 2 + Math.random() * 3;
            if (Math.random() < 0.6) m.sweepDir *= -1;
          }
          // Patrol: walk toward a random waypoint, pick a new one when close
          if (!m.patrolTarget || m.patrolTimer <= 0 ||
              Math.hypot(m.patrolTarget.x - m.x, m.patrolTarget.y - m.y) < 60) {
            m.patrolTimer = 3 + Math.random() * 5;
            m.patrolTarget = {
              x: BORDER + Math.random() * (MAP_W - 2 * BORDER),
              y: BORDER + Math.random() * (MAP_H - 2 * BORDER),
            };
          }
          m.patrolTimer -= dt;
          const pdx = m.patrolTarget.x - m.x;
          const pdy = m.patrolTarget.y - m.y;
          const pd  = Math.hypot(pdx, pdy);
          m.moving  = pd > 10;
          if (m.moving) {
            m.x = clamp(m.x + (pdx / pd) * MON_SPEED * 0.55 * dt, BORDER, MAP_W - BORDER);
            m.y = clamp(m.y + (pdy / pd) * MON_SPEED * 0.55 * dt, BORDER, MAP_H - BORDER);
          }

          // Check which players are inside the cone
          // Build candidate list, marking each with its alive status so the Monitor
          // can ignore corpses (server-authoritative `alive` from NZ_ROOM_PLAYERS).
          const allPlayers = [
            { id: "me", x: state.me.x, y: state.me.y, alive: !state.me.dead },
            ...state.others.map((p) => ({
              id: p.id,
              x: p.x,
              y: p.y,
              alive: p.alive !== false,
            })),
          ];
          const inCone = allPlayers.filter((p) =>
            isInCone(m.x, m.y, m.aimAngle, p.x, p.y)
          );
          // Skip:
          //  - any dead player (locking a corpse used to freeze the Monitor in place)
          //  - "me" while challenge is on cooldown or already locked by another monitor
          const eligible = inCone.filter((p) => {
            if (!p.alive) return false;
            if (p.id === "me" && (challenge.cooldown > 0 || state.me.dead)) return false;
            return true;
          });
          if (eligible.length > 0) {
            const pick = eligible[Math.floor(Math.random() * eligible.length)];
            m.targetId  = pick.id;
            m.mode      = "locked";
            m.lockTimer = challenge.MAX_TIME; // lock lasts as long as the challenge window
            if (pick.id === "me") {
              if (!challenge.active) startChallenge();
            } else {
              const name = state.others.find((p) => p.id === pick.id)?.name ?? pick.id;
              addLog(t("logSpotLight", name));
            }
          }
        } else if (m.mode === "locked") {
          // Count down lock duration; release when expired
          m.lockTimer -= dt;
          if (m.lockTimer <= 0) {
            const wasOnMe = m.targetId === "me";
            m.mode       = "sweep";
            m.targetId   = null;
            m.sweepTimer = 1;
            if (wasOnMe && challenge.active && !anyMonitorLockingMe()) {
              endChallenge(false);
            }
            return;
          }
          // Track locked target until challenge resolves
          const target =
            m.targetId === "me"
              ? state.me
              : state.others.find((p) => p.id === m.targetId);
          // Release immediately if the target vanished OR died — otherwise the
          // Monitor camps the corpse forever, which from other clients looks like
          // it's "stuck" and from the dying player breaks the challenge bar.
          const targetAlive =
            m.targetId === "me"
              ? !state.me.dead
              : !!(target && target.alive !== false);
          if (!target || !targetAlive) {
            const wasOnMe = m.targetId === "me";
            m.mode = "sweep";
            m.targetId = null;
            m.sweepTimer = 1;
            if (wasOnMe && challenge.active && !anyMonitorLockingMe()) {
              endChallenge(false);
            }
            return;
          }

          const desired = Math.atan2(target.y - m.y, target.x - m.x);
          m.aimAngle += clamp(wrapAngle(desired - m.aimAngle), -8 * dt, 8 * dt);

          // Stalker behaviour: keep a comfortable gap. Full speed when
          // far, smoothly slow down as we approach the comfort distance
          // so we don't bump into the player, then hold position. The
          // flashlight cone reaches ~260 px so 150 still lights them up.
          const dx   = target.x - m.x;
          const dy   = target.y - m.y;
          const dist = Math.hypot(dx, dy);
          const COMFORT  = 150;  // closest the monitor will get
          const RAMP     = 70;   // ease-in band above COMFORT
          m.moving = dist > COMFORT;
          if (m.moving) {
            const speedFactor = Math.min(1, (dist - COMFORT) / RAMP);
            m.x += (dx / dist) * MON_SPEED * speedFactor * dt;
            m.y += (dy / dist) * MON_SPEED * speedFactor * dt;
          }
          m.x = clamp(m.x, BORDER, MAP_W - BORDER);
          m.y = clamp(m.y, BORDER, MAP_H - BORDER);
        }
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }
      function wrapAngle(a) {
        while (a > Math.PI) a -= 2 * Math.PI;
        while (a < -Math.PI) a += 2 * Math.PI;
        return a;
      }

      // =================================================================
      // HUD
      // =================================================================
      function renderLives() {
        const root = document.getElementById("lives");
        // OB / spectator: the player has no character → no hearts. Same for dead players.
        if (state.spectator || state.me.dead) { root.innerHTML = ""; return; }
        root.innerHTML = "";
        for (let i = 0; i < 3; i++) {
          const sp = document.createElement("span");
          // U+FE0E forces text (monochrome) presentation on iOS / mobile browsers
          // that would otherwise show the color heart emoji (❤️). The CSS color +
          // glow then applies as expected.
          sp.textContent = "\u2665\uFE0E";
          if (i >= state.me.lives) sp.className = "heart-off";
          root.appendChild(sp);
        }
      }

      function handleDeath() {
        if (state.me.dead) return;
        state.me.dead = true;
        // NB: state.spectator stays FALSE until the player confirms the death
        // panel by pressing "Enter observer mode". They're dead (no avatar, no
        // hearts, no challenges) but still see the world from where they fell.
        // Replace the animal avatar with a ghost. The ghost stays at the
        // death position (render() keeps writing translate(me.x, me.y)),
        // floats gently via CSS, and is invisible to the rule system —
        // driveLive2D / startChallenge / triggerUniversalRule all bail
        // out on state.me.dead so nothing tries to drive its (missing)
        // eyes / mouth, and the monitor never targets it.
        if (state.nodes.me && state.nodes.me.parentNode) {
          state.nodes.me.parentNode.removeChild(state.nodes.me);
        }
        const ghost = makeGhost({ name: state.lastMainSyncName || "" });
        layers.me.appendChild(ghost);
        state.nodes.me = ghost;
        // Freeze movement so the ghost just hovers in place.
        state.me.moving = false;
        // If any supervisor was already locked onto us, release them all
        // immediately so no flashlight keeps chasing a corpse / ghost.
        releaseAllLockOnMe();
        // Hide hearts / challenge bars / etc. (player has nothing to do anymore).
        if (typeof document !== "undefined" && document.body) {
          document.body.classList.add("is-spectator");
        }
        challenge.active = false;
        challenge.completed = false;
        chalOverlay.className = "action-bar action-bar-top";
        universalChallenge.active = false;
        universalChallenge.completed = false;
        uChalOverlay.className = "action-bar action-bar-bottom";
        renderLives();
        addLog(t("logDeath"));
        // Hard impact: red wash + screen shake + long vibration so the player
        // physically registers being out, even on iOS where vibration is a
        // no-op. The shake on .phone-frame doesn't fight the persistent CRT
        // wobble inside .screen.
        if (typeof flashOverlay === "function") flashOverlay("deathFlash", 700);
        if (typeof shakePhone === "function") shakePhone("death-shake", 620);
        if (typeof nzHaptic === "function") nzHaptic("eliminated");
        // Show the death dialog. It stays open until the user clicks the CTA;
        // only then do we flip into spectator (free-pan) mode. Strings localized
        // each time it opens so a mid-round language switch picks up new copy.
        const overlay = document.getElementById("deathOverlay");
        const titleEl = document.getElementById("deathTitle");
        const subEl   = overlay ? overlay.querySelector(".death-sub") : null;
        const ctaEl   = document.getElementById("deathCta");
        if (titleEl) titleEl.textContent = t("deathTitle");
        if (subEl)   subEl.textContent   = t("deathSub");
        if (ctaEl)   ctaEl.textContent   = t("deathCta");
        if (overlay) overlay.className = "active";
      }

      // Confirmed by the user clicking the deathOverlay CTA. Transitions from
      // "you're dead, panel open" to "spectator with free-pan camera + corner badge".
      function enterObserverMode() {
        if (!state.me.dead) return;
        if (state.spectator) return;
        state.spectator = true;
        state.obCamMode = "free";
        state.obFreeTarget.x = state.me.x;
        state.obFreeTarget.y = state.me.y;
        const overlay = document.getElementById("deathOverlay");
        const badge   = document.getElementById("spectatorBadge");
        if (overlay) {
          overlay.classList.add("fading");
          overlay.addEventListener(
            "transitionend",
            () => {
              overlay.className = "";
              if (badge) badge.className = "active";
            },
            { once: true }
          );
        } else if (badge) {
          badge.className = "active";
        }
      }
      // Wire the CTA once at module scope (the button is in static markup).
      (function bindDeathCta() {
        const btn = document.getElementById("deathCta");
        if (btn) btn.addEventListener("click", enterObserverMode);
      })();

      function renderTimer() {
        const m = Math.floor(state.timer / 60);
        const s = state.timer % 60;
        document.getElementById("timer").textContent =
          String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");

        // --- Last-15s urgency cue (vignette + timer pulse + 1-shot haptic).
        // Gated on `state.roomStarted` so the pre-game lobby timer (still 02:00)
        // doesn't pulse red. Spectators (state.spectator/.dead) skip the haptic
        // since they're not playing — but the visual warning still runs so they
        // can sync with the action they're watching.
        const timerEl = document.querySelector(".timer");
        const vignetteEl = document.getElementById("lowTimeVignette");
        const isLow = !!state.roomStarted && state.timer <= 15 && state.timer > 0;
        if (timerEl) timerEl.classList.toggle("low-time", isLow);
        if (vignetteEl) vignetteEl.classList.toggle("active", isLow);
        if (isLow && !state._lowTimeWarned && !state.spectator && !state.me.dead) {
          state._lowTimeWarned = true;
          nzHaptic("lowTime");
        }
        if (!isLow && state.timer > 15) {
          // Reset so a new round (or a server-side timer reset) re-arms the cue.
          state._lowTimeWarned = false;
        }
      }

      // =================================================================
      // Zoo keeper log
      // =================================================================
      // Seed log entries pulled from STRINGS so they switch language.
      const logList = document.getElementById("logList");
      const logBox = document.querySelector(".log");
      function fmtNow() {
        const total = (typeof state.roundDurationSec === "number" && state.roundDurationSec > 0)
          ? state.roundDurationSec
          : 120;
        const elapsed = total - state.timer;
        const m = Math.floor(Math.max(0, elapsed) / 60);
        const s = Math.max(0, elapsed) % 60;
        return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
      }
      function addLog(message, ts, opts = {}) {
        const li = document.createElement("li");
        li.className = "fade-in";
        if (opts.rule) li.classList.add("rule");
        const t = document.createElement("span");
        t.className = "ts";
        t.textContent = ts || fmtNow();
        const m = document.createElement("span");
        m.className = "msg";
        m.textContent = message;
        li.append(t, m);
        logList.prepend(li);
        // Auto-scroll to top so newest is visible
        if (logBox) logBox.scrollTop = 0;
      }
      function seedLog() {
        const seeds = tArr("seedLogs");
        // Append in reverse so the freshest sits on top.
        for (let i = seeds.length - 1; i >= 0; i--) {
          const e = seeds[i];
          addLog(e.m, e.t, { rule: e.rule });
        }
      }

      // Random AI commentary (placeholder for Claude output) — pulled from
      // the localized flavor[] each tick so language flips immediately.
      function tickFlavor() {
        if (Math.random() < 0.55) {
          const lines = tArr("flavor");
          if (lines.length > 0) {
            addLog(lines[Math.floor(Math.random() * lines.length)]);
          }
        }
      }
      setInterval(tickFlavor, 6500);

      // Periodic new-rule announcements (red, distinct from flavor)
      const UNIVERSAL_RULES = [
        // u_noblink: keep BOTH eyes open continuously for ~2 s. The earlier
        // wink-the-left-eye variant was hard to detect on mobile (one-eye
        // EAR is jittery) and easy to misread. Open-eye hold matches the
        // ExpressionGate task and is much more reliable.
        { id: "u_noblink",  icon: "👀", labelKey: "universalNoBlinkLabel", logKey: "logUniNoBlinkAnnounce" },
        { id: "u_mouth",    icon: "😮", labelKey: "universalMouthLabel", logKey: "logUniMouthAnnounce" },
        { id: "u_headmove", icon: "🙂", labelKey: "universalHeadLabel",  logKey: "logUniHeadAnnounce"  },
      ];
      function triggerUniversalRule() {
        if (universalChallenge.active || state.me.dead) return;
        const rule = UNIVERSAL_RULES[Math.floor(Math.random() * UNIVERSAL_RULES.length)];
        addLog(t(rule.logKey), null, { rule: true });
        startUniversalChallenge(rule);
      }
      setInterval(triggerUniversalRule, 15000);

      // =================================================================
      // Input
      // =================================================================
      const KEYMAP = {
        w: "up",
        ArrowUp: "up",
        s: "down",
        ArrowDown: "down",
        a: "left",
        ArrowLeft: "left",
        d: "right",
        ArrowRight: "right",
      };
      window.addEventListener("keydown", (e) => {
        const k = KEYMAP[e.key];
        if (k) {
          state.keys[k] = true;
          e.preventDefault();
        }
      });
      window.addEventListener("keyup", (e) => {
        const k = KEYMAP[e.key];
        if (k) state.keys[k] = false;
      });

      // ---------- Virtual joystick (touch) ----------
      // Drag the inner handle within the outer ring; magnitude maps to
      // analog walk speed (0..1). Releases zero out velocity instantly.
      const joystickEl = document.getElementById("joystick");
      const joystickHandleEl = document.getElementById("joystickHandle");
      const JOY_LIMIT = 35; // max handle offset in px
      let joyPointerId = null;
      function joyMove(ev) {
        if (ev.pointerId !== joyPointerId) return;
        const r = joystickEl.getBoundingClientRect();
        const cxp = r.left + r.width / 2;
        const cyp = r.top + r.height / 2;
        let hx = ev.clientX - cxp;
        let hy = ev.clientY - cyp;
        const d = Math.hypot(hx, hy);
        if (d > JOY_LIMIT) {
          hx = (hx / d) * JOY_LIMIT;
          hy = (hy / d) * JOY_LIMIT;
        }
        joystickHandleEl.style.transform = `translate(${hx}px, ${hy}px)`;
        state.joyX = hx / JOY_LIMIT;
        state.joyY = hy / JOY_LIMIT;
      }
      function joyEnd(ev) {
        if (ev.pointerId !== joyPointerId) return;
        try {
          joystickEl.releasePointerCapture(ev.pointerId);
        } catch (e) {}
        joyPointerId = null;
        joystickEl.classList.remove("active");
        joystickHandleEl.style.transform = "translate(0px, 0px)";
        state.joyX = 0;
        state.joyY = 0;
      }
      if (joystickEl && joystickHandleEl) {
        joystickEl.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          joyPointerId = ev.pointerId;
          joystickEl.setPointerCapture(ev.pointerId);
          joystickEl.classList.add("active");
          joyMove(ev);
        });
        joystickEl.addEventListener("pointermove", joyMove);
        joystickEl.addEventListener("pointerup", joyEnd);
        joystickEl.addEventListener("pointercancel", joyEnd);
      }

      // Tap-to-move: convert pointer position → SVG viewport → world coords
      // (world = viewport + camera offset).
      function svgPointFromEvent(ev) {
        const rect = SVG.getBoundingClientRect();
        const cx =
          ev.clientX != null
            ? ev.clientX
            : ev.touches && ev.touches[0]
            ? ev.touches[0].clientX
            : 0;
        const cy =
          ev.clientY != null
            ? ev.clientY
            : ev.touches && ev.touches[0]
            ? ev.touches[0].clientY
            : 0;
        // preserveAspectRatio="xMidYMid meet" — replicate that mapping.
        const sx = rect.width / VIEW_W;
        const sy = rect.height / VIEW_H;
        const scale = Math.min(sx, sy);
        const offX = (rect.width - VIEW_W * scale) / 2;
        const offY = (rect.height - VIEW_H * scale) / 2;
        return {
          x: (cx - rect.left - offX) / scale,
          y: (cy - rect.top - offY) / scale,
        };
      }
      var obDrag = null;
      function svgClientScale() {
        const rect = SVG.getBoundingClientRect();
        const sx = rect.width / VIEW_W;
        const sy = rect.height / VIEW_H;
        return Math.min(sx, sy);
      }
      function obPointerDown(ev) {
        if (!state.spectator || state.obCamMode !== "free") return false;
        const p = svgPointFromEvent(ev);
        if (p.x < 0 || p.x > VIEW_W || p.y < 0 || p.y > VIEW_H) return false;
        obDrag = {
          lastX: ev.clientX,
          lastY: ev.clientY,
          scale: svgClientScale(),
        };
        try {
          SVG.setPointerCapture(ev.pointerId);
        } catch (e) {}
        ev.preventDefault();
        return true;
      }
      function obPointerMove(ev) {
        if (!obDrag) return;
        const dcx = ev.clientX - obDrag.lastX;
        const dcy = ev.clientY - obDrag.lastY;
        const sc = obDrag.scale || svgClientScale();
        state.obFreeTarget.x = clamp(
          state.obFreeTarget.x - dcx / sc,
          BORDER,
          MAP_W - BORDER
        );
        state.obFreeTarget.y = clamp(
          state.obFreeTarget.y - dcy / sc,
          BORDER,
          MAP_H - BORDER
        );
        obDrag.lastX = ev.clientX;
        obDrag.lastY = ev.clientY;
      }
      function obPointerUp(ev) {
        if (obDrag) {
          obDrag = null;
          try {
            SVG.releasePointerCapture(ev.pointerId);
          } catch (e) {}
        }
      }
      SVG.addEventListener("pointerdown", (ev) => {
        if (obPointerDown(ev)) return;
        if (state.spectator) return;
        const p = svgPointFromEvent(ev);
        if (p.x < 0 || p.x > VIEW_W || p.y < 0 || p.y > VIEW_H) return;
        // Translate viewport -> world by adding the current camera offset.
        state.tap = {
          x: p.x + state.cam.x,
          y: p.y + state.cam.y,
        };
      });
      SVG.addEventListener("pointermove", obPointerMove);
      SVG.addEventListener("pointerup", obPointerUp);
      SVG.addEventListener("pointercancel", obPointerUp);

      // =================================================================
      // Main loop
      // =================================================================
      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        updatePlayer(dt);
        updateOthers(dt);
        updateMonitor(dt);
        updateChallenge(dt);
        updateUniversalChallenge(dt);
        render();
        flushOutMainScene();
        requestAnimationFrame(frame);
      }
      var outFrameTick = 0;
      function flushOutMainScene() {
        if (window === window.top) return;
        if (state.spectator || !state.roomStarted) return;
        outFrameTick += 1;
        if (outFrameTick % 2) return;
        if (!state.nodes.me) return;
        const me = state.me;
        try {
          window.parent.postMessage(
            {
              type: "NZ_OUT_MAIN_SCENE",
              source: "nocturne-zoo",
              payload: {
                x: me.x,
                y: me.y,
                vx: 0,
                vy: 0,
                moving: !!me.moving,
                animKey: me.moving ? "walk" : "idle",
                facing: 0,
                fx: null
              }
            },
            "*"
          );
        } catch (e) {}
      }

      // Timer ticking — only runs while the room is actually started, so the
      // HUD doesn't drain time during the lobby / waiting room.
      setInterval(() => {
        if (!state.roomStarted) return;
        if (state.timer > 0) {
          state.timer -= 1;
          renderTimer();
          if (state.timer === 0) {
            // Game just ended — stop the looping BGM. Per-event Monitor PA + SFX
            // can still play (they're separate audio elements).
            stopBgm();
            nzHaptic("gameEnd");
          }
        }
      }, 1000);

      // Random VHS glitch — fires every 4–9s, briefly flashes a horizontal slice.
      function scheduleGlitch() {
        const next = 4000 + Math.random() * 5000;
        setTimeout(() => {
          const band = document.getElementById("glitchBand");
          if (band) {
            band.classList.remove("on");
            void band.offsetWidth; // restart animation
            band.classList.add("on");
            setTimeout(() => band.classList.remove("on"), 240);
          }
          scheduleGlitch();
        }, next);
      }
      scheduleGlitch();

      // =================================================================
      // Action Challenge System + FaceMesh Detection
      // =================================================================

      const chalOverlay  = document.getElementById("challengeOverlay");
      const chalIcon     = document.getElementById("chal-icon");
      const chalLabel    = document.getElementById("chal-label");
      const chalStatus   = document.getElementById("chal-status");
      const chalBarFill  = document.getElementById("chal-bar-fill");
      const webcamVideo  = document.getElementById("webcamVideo");
      const webcamCanvas = document.getElementById("webcam-canvas");

      // Challenge state
      const challenge = {
        active: false,
        action: null,       // 'blink' | 'mouth' | 'shake'
        completed: false,
        timeLeft: 0,
        cooldown: 0,
        MAX_TIME: 8,
        shake: { dir: 0, changes: 0 },
        mouth: { openFrames: 0 },
        blink: { since: null },
      };

      // Animal → action map. Labels resolved via t() at startChallenge time
      // so a mid-game language switch picks up the new copy.
      const ACTION_INFO = {
        blink: { icon: "👁️", labelKey: "actionBlinkLabel" },
        mouth: { icon: "😮", labelKey: "actionMouthLabel" },
        shake: { icon: "🙂", labelKey: "actionShakeLabel" },
      };

      function animalToAction(animal) {
        if (animal === "owl")     return "blink";
        if (animal === "lion")    return "mouth";
        if (animal === "giraffe") return "shake";
        return "shake";
      }

      function startChallenge() {
        // OB / pure spectator has no avatar — the challenge bar is meaningless and confusing.
        if (state.spectator) return;
        if (challenge.cooldown > 0 || state.me.dead) return;
        challenge.active    = true;
        challenge.completed = false;
        challenge.action    = animalToAction(state.me.animal);
        challenge.timeLeft  = challenge.MAX_TIME;
        challenge.shake     = { dir: 0, changes: 0 };
        challenge.mouth     = { openFrames: 0 };
        challenge.blink     = { since: null };
        const info = ACTION_INFO[challenge.action];
        chalIcon.textContent   = info.icon;
        chalLabel.textContent  = t(info.labelKey);
        chalStatus.textContent = t("statusGoNow");
        chalBarFill.style.width = "100%";
        chalOverlay.className  = "action-bar action-bar-top active";
        addLog(t("logMonitorAlert"), null, { rule: true });
        // One-shot lock-on cue. Yellow → red ring punches through the
        // persistent alert vignette so iOS players (no haptic) still get a
        // clear "you've been seen" moment.
        flashOverlay("lockWarnRing", 550);
        nzHaptic("monitorLock");
      }

      function reportViolation() {
        try {
          if (window !== window.top) {
            window.parent.postMessage(
              { type: "NZ_OUT_VIOLATION", source: "nocturne-zoo", payload: {} },
              "*"
            );
          }
        } catch (e) {}
      }

      function endChallenge(success) {
        if (!challenge.active) return;
        challenge.active   = false;
        challenge.cooldown = 3;
        // Release every supervisor that was locked on us back to sweep
        // (with multi-supervisor rooms two flashlights can pile onto the
        // same player; both should drop together when the challenge ends).
        releaseAllLockOnMe();
        if (success) {
          chalStatus.textContent = t("statusSuccess");
          chalBarFill.style.width = "100%"; // green snaps full
          chalOverlay.className  = "action-bar action-bar-top active success";
          flashOverlay("successFlash", 420);
          nzHaptic("ruleSuccess");
          addLog(t("logRuleDone"));
        } else {
          chalStatus.textContent = t("statusFail");
          chalOverlay.className  = "action-bar action-bar-top active fail";
          reportViolation();
          state.me.lives = Math.max(0, state.me.lives - 1);
          renderLives();
          playSound("healthLoss");
          flashOverlay("hpFlash", 360);
          pulseLives("hp-shake", 420);
          shakePhone("impact-shake", 320);
          nzHaptic("hpLoss");
          addLog(t("logRuleFail"), null, { rule: true });
          if (state.me.lives <= 0) { setTimeout(handleDeath, 1400); }
        }
        setTimeout(() => {
          chalOverlay.className = "action-bar action-bar-top";
        }, 1400);
      }

      function updateChallenge(dt) {
        if (challenge.cooldown > 0) challenge.cooldown -= dt;
        if (!challenge.active) return;
        challenge.timeLeft -= dt;
        chalBarFill.style.width =
          Math.max(0, (challenge.timeLeft / challenge.MAX_TIME) * 100) + "%";
        if (challenge.timeLeft <= 0) endChallenge(false);
      }

      // ---------- FaceMesh landmark helpers ----------
      const L_EYE_IDX    = [33, 160, 158, 133, 153, 144];
      const R_EYE_IDX    = [362, 385, 387, 263, 373, 380];
      const EAR_CLOSED   = 0.25;
      const MAR_OPEN     = 0.40;
      const SHAKE_THRESH = 0.08;
      const BLINK_MS     = 3000;

      function lmDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

      function earVal(lm, idx) {
        const [p1, p2, p3, p4, p5, p6] = idx.map((i) => lm[i]);
        return (lmDist(p2, p6) + lmDist(p3, p5)) / (2 * lmDist(p1, p4));
      }

      // ============================================================
      // BLINK / EYE-OPEN DETECTION TUNING
      // ============================================================
      // All knobs in one place. If detection feels wrong, change a number
      // here, refresh, retest. Each knob's effect is described inline.
      //
      // The system has 4 stages:
      //   1. Each frame compute raw EAR (eye aspect ratio) for L and R.
      //   2. Smooth (moving avg) to kill MediaPipe single-frame jitter.
      //   3. Feed the smoothed avg into a per-user "open eye" baseline
      //      (rolling 80th percentile).
      //   4. Eye is "closed" when smoothed EAR < baseline × closedRatio.
      const BLINK_TUNING = {
        // --- Closed-eye decision window -------------------------------
        // We check the MINIMUM EAR over the last `decisionWindow` frames
        // (NOT the average). Why: on mobile a real blink may only register
        // for a single MediaPipe frame at the rising/falling edge with EAR
        // ~0.10. Averaging dilutes that dip back above the closed-eye
        // threshold ("ghost-blink" → "don't blink for 2s" passes even
        // though the user blinked). Using the min preserves single-frame
        // dips while still ignoring upward jitter (face turning, etc.).
        // 2 frames @ 15 fps mobile ≈ 130 ms — covers any real blink edge.
        decisionWindow: 2,

        // --- Baseline ("what does this user's open eye look like") ---
        // Rolling buffer of recent EAR samples used to learn the user's
        // own open-eye reference. ~30 fps × 1.5 s ≈ 45 samples.
        baselineMaxSamples: 45,
        // Samples below this are discarded so real blinks don't drag the
        // baseline down. Mobile narrow-eye users baseline ~0.16; allow
        // them in.
        baselineFilterFloor: 0.10,
        // Use the 80th percentile of recent samples as the "open" EAR.
        // Higher (e.g. 0.9) = more conservative open reference, makes
        // blink threshold higher (easier to trigger).
        baselinePercentile: 0.80,
        // Min samples needed before the baseline kicks in. While below
        // this we use `fallbackThreshold` instead. Lower for mobile —
        // 15 fps × 8 samples = ~0.55 s of mis-classified frames before
        // the user's own baseline kicks in. Drop to 4 (~0.27 s).
        baselineMinSamples: 4,

        // --- Closed-eye decision (the main sensitivity knob) ---------
        // Eye is "closed" when SMOOTHED ear < baseline × this ratio.
        //   0.85 = very sensitive (catches half-blinks + squints)
        //   0.75 = old default — reliably catches mobile blinks but
        //          misses fast partial blinks at 15 fps
        //   0.65 = strict (misses real blinks on phone cams)
        // Bumped to 0.82 so a brief 1-frame mobile blink registers
        // (real blink dips ~50 %, partial squint ~80 %; we want both).
        closedRatio: 0.82,
        // Used only before the baseline calibrates. Lowered from 0.19
        // to 0.15 because mobile users with narrow open-eye EAR (~0.18)
        // would otherwise spend the first 0.3 s falsely flagged as
        // "closed" and have the noBlink timer never start.
        fallbackThreshold: 0.15,

        // --- Avatar eye visual mapping (Live2D-style scaleY) ---------
        // Where on the EAR scale the avatar's eye is "fully closed" /
        // "fully open" for animation purposes. Independent from the
        // challenge detection above.
        avatarClosedRatio: 0.40,   // ear < baseline*0.40 → eye flat
        avatarOpenRatio:   1.00,   // ear ≥ baseline      → eye round

        // --- u_noblink (universal "don't blink for 2s") -------------
        // Time-based hold: from the first eyes-OPEN frame, wait `holdMs`
        // of wall-clock time without any closed-eye frame. At 15 fps
        // mobile, the previous 60-frame target took ~4 s; this fixes
        // that to a true 2 s on every device.
        uNoBlinkHoldMs: 2000,
        // Reset on ANY single closed frame — the previous 2-frame debounce
        // let very fast blinks slip through, so the rule "did not blink"
        // could pass even right after a real blink. Phones running
        // MediaPipe at 15 fps may capture a real blink in just one frame.
        uNoBlinkResetFrames: 1,
      };

      // ---------- Implementation ----------
      // 1) Min-over-window (preserves single-frame blink dips while
      //    rejecting one-frame upward jitter). Replaces the previous
      //    moving-average smoother which would mask brief partial blinks.
      const earDecisionBuf = [];
      function decisionEar(rawEar) {
        if (!Number.isFinite(rawEar)) return rawEar;
        earDecisionBuf.push(rawEar);
        if (earDecisionBuf.length > BLINK_TUNING.decisionWindow) {
          earDecisionBuf.shift();
        }
        let m = Infinity;
        for (const v of earDecisionBuf) if (v < m) m = v;
        return m;
      }

      // 2) Adaptive baseline
      const earBaseline = { samples: [], value: null };
      function recordEar(ear) {
        if (!Number.isFinite(ear) || ear < BLINK_TUNING.baselineFilterFloor) return;
        earBaseline.samples.push(ear);
        if (earBaseline.samples.length > BLINK_TUNING.baselineMaxSamples) {
          earBaseline.samples.shift();
        }
        if (earBaseline.samples.length >= BLINK_TUNING.baselineMinSamples) {
          const sorted = earBaseline.samples.slice().sort((a, b) => a - b);
          const idx = Math.floor(sorted.length * BLINK_TUNING.baselinePercentile);
          earBaseline.value = sorted[idx];
        }
      }

      // 3) Decisions
      function isEyeClosed(ear) {
        if (!earBaseline.value) return ear < BLINK_TUNING.fallbackThreshold;
        return ear < earBaseline.value * BLINK_TUNING.closedRatio;
      }
      function eyeOpenness(ear) {
        const baseline = earBaseline.value || 0.25;
        const closedAt = baseline * BLINK_TUNING.avatarClosedRatio;
        const openAt   = baseline * BLINK_TUNING.avatarOpenRatio;
        return Math.max(
          0.05,
          Math.min(1, (ear - closedAt) / (openAt - closedAt))
        );
      }

      // Live2D mapping. Translates EAR / MAR / head pose into transforms on
      // my avatar's SVG groups, so the animal blinks, opens its mouth, and
      // shakes / nods in sync with the player's face.
      //
      //   EAR    ~0.10 (closed) → ~0.30 (wide open)        → eye scaleY 0..1
      //   MAR    ~0.05 (closed) → ~0.60 (jaw dropped)      → mouth scaleY 1..3
      //   nx     -0.5 (head turned left)  → +0.5 (right)   → body rotate ±deg
      //   ny     -0.5 (chin up)           → +0.5 (chin down) → body translateY ±px
      const LIVE2D_EAR_CLOSED = 0.10;
      const LIVE2D_EAR_OPEN   = 0.30;
      const LIVE2D_MAR_CLOSED = 0.05;
      const LIVE2D_MAR_OPEN   = 0.60;
      const LIVE2D_MOUTH_MAX  = 3.0;
      const LIVE2D_BEAK_MAX   = 4;     // px each half travels apart when wide open
      const LIVE2D_SHAKE_GAIN = 70;    // nx → degrees of rotation
      const LIVE2D_SHAKE_MAX  = 25;    // clamp ±deg
      const LIVE2D_NOD_GAIN   = 36;    // ny → px translateY
      const LIVE2D_NOD_MAX    = 12;    // clamp ±px

      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const clampSym = (v, lim) => Math.max(-lim, Math.min(lim, v));

      function driveLive2D(lm) {
        const me = state.nodes.me;
        if (!me) return;

        // 1) Eye openness 0..1 from EAR (per eye), normalised against the
        //    user's own baseline so phone-camera EAR variations don't
        //    leave the avatar's eyes always half-shut.
        const earL = earVal(lm, L_EYE_IDX);
        const earR = earVal(lm, R_EYE_IDX);
        const openL = eyeOpenness(earL);
        const openR = eyeOpenness(earR);

        // 2) Mouth openness 0..1 from MAR
        const mar = lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
        const mouthOpen = clamp01(
          (mar - LIVE2D_MAR_CLOSED) / (LIVE2D_MAR_OPEN - LIVE2D_MAR_CLOSED)
        );
        const mouthScale = 1 + mouthOpen * (LIVE2D_MOUTH_MAX - 1);

        // 3) Head pose. Nose offset / face span gives a normalized
        //    -0.5..0.5 reading per axis.
        const nose = lm[4];
        const lb   = lm[234];
        const rb   = lm[454];
        const fcx  = (lb.x + rb.x) / 2;
        const fw   = Math.abs(rb.x - lb.x) + 1e-6;
        const nx   = (nose.x - fcx) / fw;

        const top = lm[10];
        const bot = lm[152];
        const fcy = (top.y + bot.y) / 2;
        const fh  = Math.abs(top.y - bot.y) + 1e-6;
        const ny  = (nose.y - fcy) / fh;

        // Cam preview is mirrored (CSS scaleX(-1)), but MediaPipe sees the
        // RAW camera frame. Negate both axes so the avatar mirrors the
        // user the way they SEE themselves on screen — tilt left → tilt
        // left, chin down → head down.
        const headRot = clampSym(-nx * LIVE2D_SHAKE_GAIN, LIVE2D_SHAKE_MAX);
        const headDy  = clampSym(-ny * LIVE2D_NOD_GAIN,  LIVE2D_NOD_MAX);

        // 4) Apply. Webcam is mirrored: MediaPipe L_EYE = user's physical
        //    right, R_EYE = user's physical left, so we swap the eye
        //    targets to keep the avatar matching the player.
        const eyeLEl  = me.querySelector(".eye-l");
        const eyeREl  = me.querySelector(".eye-r");
        const mouthEl = me.querySelector(".mouth");
        const beakU   = me.querySelector(".beak-upper");
        const beakL   = me.querySelector(".beak-lower");
        const bobEl   = me.querySelector(".bob");

        // Mirror swap: avatar's eye-l shows what the user SEES on the
        // left side of their (mirrored) cam preview, which is anatomically
        // their right eye = MediaPipe's earR.
        const closedAvatarL = isEyeClosed(earR);
        const closedAvatarR = isEyeClosed(earL);
        if (eyeLEl) {
          eyeLEl.style.animation = "none";
          eyeLEl.classList.toggle("closed", closedAvatarL);
          // Partial scaleY for not-fully-closed states; cleared when the

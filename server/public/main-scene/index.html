        if (Math.random() < 0.55) {
          addLog(flavorLines[Math.floor(Math.random() * flavorLines.length)]);
        }
      }
      setInterval(tickFlavor, 6500);

      // Periodic new-rule announcements (red, distinct from flavor)
      const UNIVERSAL_RULES = [
        { id: "u_blink",    icon: "👁️", label: "眨一下眼！",  log: "通用规则：请眨眼。" },
        { id: "u_mouth",    icon: "😮", label: "张开嘴巴！",  log: "通用规则：请张嘴。" },
        { id: "u_headmove", icon: "🙂", label: "摇头或点头！", log: "通用规则：摇头或点头。" },
      ];
      function triggerUniversalRule() {
        if (universalChallenge.active) return;
        const rule = UNIVERSAL_RULES[Math.floor(Math.random() * UNIVERSAL_RULES.length)];
        addLog(rule.log, null, { rule: true });
        startUniversalChallenge(rule);
      }
      setInterval(triggerUniversalRule, 15000);

      // =================================================================
      // Input
      // =================================================================
      const KEYMAP = {
        w: "up",
        ArrowUp: "up",
        s: "down",
        ArrowDown: "down",
        a: "left",
        ArrowLeft: "left",
        d: "right",
        ArrowRight: "right",
      };
      window.addEventListener("keydown", (e) => {
        const k = KEYMAP[e.key];
        if (k) {
          state.keys[k] = true;
          e.preventDefault();
        }
      });
      window.addEventListener("keyup", (e) => {
        const k = KEYMAP[e.key];
        if (k) state.keys[k] = false;
      });

      // Tap-to-move: convert pointer position → SVG viewport → world coords
      // (world = viewport + camera offset).
      function svgPointFromEvent(ev) {
        const rect = SVG.getBoundingClientRect();
        const cx =
          ev.clientX != null
            ? ev.clientX
            : ev.touches && ev.touches[0]
            ? ev.touches[0].clientX
            : 0;
        const cy =
          ev.clientY != null
            ? ev.clientY
            : ev.touches && ev.touches[0]
            ? ev.touches[0].clientY
            : 0;
        // preserveAspectRatio="xMidYMid meet" — replicate that mapping.
        const sx = rect.width / VIEW_W;
        const sy = rect.height / VIEW_H;
        const scale = Math.min(sx, sy);
        const offX = (rect.width - VIEW_W * scale) / 2;
        const offY = (rect.height - VIEW_H * scale) / 2;
        return {
          x: (cx - rect.left - offX) / scale,
          y: (cy - rect.top - offY) / scale,
        };
      }
      SVG.addEventListener("pointerdown", (ev) => {
        const p = svgPointFromEvent(ev);
        if (p.x < 0 || p.x > VIEW_W || p.y < 0 || p.y > VIEW_H) return;
        // Translate viewport -> world by adding the current camera offset.
        state.tap = {
          x: p.x + state.cam.x,
          y: p.y + state.cam.y,
        };
      });

      // =================================================================
      // Main loop
      // =================================================================
      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        updatePlayer(dt);
        updateOthers(dt);
        updateMonitor(dt);
        updateChallenge(dt);
        updateUniversalChallenge(dt);
        render();
        flushOutMainScene();
        requestAnimationFrame(frame);
      }
      var outFrameTick = 0;
      function flushOutMainScene() {
        if (window === window.top) return;
        if (state.spectator || !state.roomStarted) return;
        outFrameTick += 1;
        if (outFrameTick % 2) return;
        if (!state.nodes.me) return;
        const me = state.me;
        try {
          window.parent.postMessage(
            {
              type: "NZ_OUT_MAIN_SCENE",
              source: "nocturne-zoo",
              payload: {
                x: me.x,
                y: me.y,
                vx: 0,
                vy: 0,
                moving: !!me.moving,
                animKey: me.moving ? "walk" : "idle",
                facing: 0,
                fx: null
              }
            },
            "*"
          );
        } catch (e) {}
      }

      // Timer ticking
      setInterval(() => {
        if (state.timer > 0) {
          state.timer -= 1;
          renderTimer();
        }
      }, 1000);

      // Random VHS glitch — fires every 4–9s, briefly flashes a horizontal slice.
      function scheduleGlitch() {
        const next = 4000 + Math.random() * 5000;
        setTimeout(() => {
          const band = document.getElementById("glitchBand");
          if (band) {
            band.classList.remove("on");
            void band.offsetWidth; // restart animation
            band.classList.add("on");
            setTimeout(() => band.classList.remove("on"), 240);
          }
          scheduleGlitch();
        }, next);
      }
      scheduleGlitch();

      // =================================================================
      // Action Challenge System + FaceMesh Detection
      // =================================================================

      const chalOverlay  = document.getElementById("challengeOverlay");
      const chalIcon     = document.getElementById("chal-icon");
      const chalLabel    = document.getElementById("chal-label");
      const chalStatus   = document.getElementById("chal-status");
      const chalBarFill  = document.getElementById("chal-bar-fill");
      const webcamVideo  = document.getElementById("webcamVideo");
      const webcamCanvas = document.getElementById("webcam-canvas");

      // Challenge state
      const challenge = {
        active: false,
        action: null,       // 'blink' | 'mouth' | 'shake'
        completed: false,
        timeLeft: 0,
        cooldown: 0,
        MAX_TIME: 8,
        shake: { dir: 0, changes: 0 },
        mouth: { openFrames: 0 },
        blink: { since: null },
      };

      const ACTION_INFO = {
        blink: { icon: "👁️", label: "5秒不眨眼！" },
        mouth: { icon: "😮", label: "张开嘴巴！"  },
        shake: { icon: "🙂", label: "摇头晃脑！"  },
      };

      function animalToAction(animal) {
        if (animal === "owl")     return "blink";
        if (animal === "lion")    return "mouth";
        if (animal === "giraffe") return "shake";
        return "shake";
      }

      function startChallenge() {
        if (challenge.cooldown > 0) return;
        challenge.active    = true;
        challenge.completed = false;
        challenge.action    = animalToAction(state.me.animal);
        challenge.timeLeft  = challenge.MAX_TIME;
        challenge.shake     = { dir: 0, changes: 0 };
        challenge.mouth     = { openFrames: 0 };
        challenge.blink     = { since: null };
        const info = ACTION_INFO[challenge.action];
        chalIcon.textContent   = info.icon;
        chalLabel.textContent  = info.label;
        chalStatus.textContent = "快做出动作！";
        chalBarFill.style.width = "100%";
        chalOverlay.className  = "active";
        addLog("⚠ 监管者注视你了——执行守则！", null, { rule: true });
      }

      function endChallenge(success) {
        if (!challenge.active) return;
        challenge.active   = false;
        challenge.cooldown = 3;
        // Release monitor back to sweep mode
        if (state.monitor.targetId === "me") {
          state.monitor.mode       = "sweep";
          state.monitor.targetId   = null;
          state.monitor.sweepTimer = 1;
        }
        if (success) {
          chalStatus.textContent = "✓ 守则完成！";
          chalOverlay.className  = "active success";
          addLog("✓ 守则完成。");
        } else {
          chalStatus.textContent = "✗ 违规！−1♥";
          chalOverlay.className  = "active fail";
          state.me.lives = Math.max(0, state.me.lives - 1);
          renderLives();
          addLog("❌ 未执行守则，扣 1 生命值。", null, { rule: true });
        }
        setTimeout(() => { chalOverlay.className = ""; }, 1400);
      }

      function updateChallenge(dt) {
        if (challenge.cooldown > 0) challenge.cooldown -= dt;
        if (!challenge.active) return;
        challenge.timeLeft -= dt;
        chalBarFill.style.width =
          Math.max(0, (challenge.timeLeft / challenge.MAX_TIME) * 100) + "%";
        if (challenge.timeLeft <= 0) endChallenge(false);
      }

      // ---------- FaceMesh landmark helpers ----------
      const L_EYE_IDX    = [33, 160, 158, 133, 153, 144];
      const R_EYE_IDX    = [362, 385, 387, 263, 373, 380];
      const EAR_CLOSED   = 0.21;
      const MAR_OPEN     = 0.40;
      const SHAKE_THRESH = 0.08;
      const BLINK_MS     = 5000;

      function lmDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

      function earVal(lm, idx) {
        const [p1, p2, p3, p4, p5, p6] = idx.map((i) => lm[i]);
        return (lmDist(p2, p6) + lmDist(p3, p5)) / (2 * lmDist(p1, p4));
      }

      function processFace(lm, now) {
        if (challenge.active && !challenge.completed)                   processMonitorChallenge(lm, now);
        if (universalChallenge.active && !universalChallenge.completed) processUniversalChallenge(lm, now);
      }

      function processMonitorChallenge(lm, now) {
        const act = challenge.action;

        if (act === "blink") {
          const ear = (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2;
          if (ear < EAR_CLOSED) {
            challenge.blink.since  = null;
            chalStatus.textContent = "眨眼了！保持睁眼…";
          } else {
            if (!challenge.blink.since) challenge.blink.since = now;
            const elapsed = now - challenge.blink.since;
            chalStatus.textContent =
              "保持睁眼 " + Math.max(0, 5 - elapsed / 1000).toFixed(1) + "s…";
            if (elapsed >= BLINK_MS) {
              challenge.completed = true;
              endChallenge(true);
            }
          }
        } else if (act === "mouth") {
          const mar =
            lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
          if (mar > MAR_OPEN) {
            challenge.mouth.openFrames++;
            chalStatus.textContent = "嘴巴张开中…";
            if (challenge.mouth.openFrames >= 8) {
              challenge.completed = true;
              endChallenge(true);
            }
          } else {
            challenge.mouth.openFrames = Math.max(
              0,
              challenge.mouth.openFrames - 1
            );
            chalStatus.textContent = "张开嘴巴！";
          }
        } else if (act === "shake") {
          const nose = lm[4], lb = lm[234], rb = lm[454];
          const cx   = (lb.x + rb.x) / 2;
          const fw   = Math.abs(rb.x - lb.x) + 1e-6;
          const nx   = (nose.x - cx) / fw;
          const cur  = nx > SHAKE_THRESH ? 1 : nx < -SHAKE_THRESH ? -1 : 0;
          if (cur !== 0 && cur !== challenge.shake.dir) {
            challenge.shake.dir = cur;
            challenge.shake.changes++;
          }
          chalStatus.textContent =
            "摇头 " + Math.floor(challenge.shake.changes / 2) + "/2…";
          if (challenge.shake.changes >= 4) {
            challenge.completed = true;
            endChallenge(true);
          }
        }
      }

      // =================================================================
      // Universal Rule Challenge System
      // =================================================================

      const uChalOverlay = document.getElementById("universalOverlay");
      const uChalIcon    = document.getElementById("uchal-icon");
      const uChalLabel   = document.getElementById("uchal-label");
      const uChalStatus  = document.getElementById("uchal-status");
      const uChalBarFill = document.getElementById("uchal-bar-fill");

      const universalChallenge = {
        active: false,
        action: null,
        completed: false,
        timeLeft: 0,
        MAX_TIME: 5,
        blink:    { frames: 0 },
        mouth:    { frames: 0 },
        headmove: { hDir: 0, hChanges: 0, vDir: 0, vChanges: 0 },
      };

      function startUniversalChallenge(rule) {
        universalChallenge.active    = true;
        universalChallenge.completed = false;
        universalChallenge.action    = rule.id;
        universalChallenge.timeLeft  = universalChallenge.MAX_TIME;
        universalChallenge.blink     = { frames: 0 };
        universalChallenge.mouth     = { frames: 0 };
        universalChallenge.headmove  = { hDir: 0, hChanges: 0, vDir: 0, vChanges: 0 };
        uChalIcon.textContent    = rule.icon;
        uChalLabel.textContent   = rule.label;
        uChalStatus.textContent  = "请执行！";
        uChalBarFill.style.width = "100%";
        uChalOverlay.className   = "active";
      }

      function endUniversalChallenge(success) {
        if (!universalChallenge.active) return;
        universalChallenge.active = false;
        if (success) {
          uChalStatus.textContent = "✓ 完成！";
          uChalOverlay.className  = "active success";
          addLog("✓ 通用规则完成。");
        } else {
          uChalStatus.textContent = "✗ 违规！−1♥";
          uChalOverlay.className  = "active fail";
          state.me.lives = Math.max(0, state.me.lives - 1);
          renderLives();
          addLog("❌ 未执行通用规则，扣 1 生命值。", null, { rule: true });
        }
        setTimeout(() => { uChalOverlay.className = ""; }, 1200);
      }

      function updateUniversalChallenge(dt) {
        if (!universalChallenge.active) return;
        universalChallenge.timeLeft -= dt;
        uChalBarFill.style.width =
          Math.max(0, (universalChallenge.timeLeft / universalChallenge.MAX_TIME) * 100) + "%";
        if (universalChallenge.timeLeft <= 0) endUniversalChallenge(false);
      }

      function processUniversalChallenge(lm) {
        const act = universalChallenge.action;

        if (act === "u_blink") {
          const ear = (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2;
          if (ear < EAR_CLOSED) {
            universalChallenge.blink.frames++;
            uChalStatus.textContent = "眨眼中…";
            if (universalChallenge.blink.frames >= 3) {
              universalChallenge.completed = true;
              endUniversalChallenge(true);
            }
          } else {
            universalChallenge.blink.frames = 0;
            uChalStatus.textContent = "请眨眼！";
          }
        } else if (act === "u_mouth") {
          const mar = lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
          if (mar > MAR_OPEN) {
            universalChallenge.mouth.frames++;
            uChalStatus.textContent = "嘴巴张开中…";
            if (universalChallenge.mouth.frames >= 8) {
              universalChallenge.completed = true;
              endUniversalChallenge(true);
            }
          } else {
            universalChallenge.mouth.frames = Math.max(0, universalChallenge.mouth.frames - 1);
            uChalStatus.textContent = "张开嘴！";
          }
        } else if (act === "u_headmove") {
          const nose = lm[4], lb = lm[234], rb = lm[454];
          // Lateral shake
          const faceCX = (lb.x + rb.x) / 2;
          const faceW  = Math.abs(rb.x - lb.x) + 1e-6;
          const nx     = (nose.x - faceCX) / faceW;
          const hCur   = nx > SHAKE_THRESH ? 1 : nx < -SHAKE_THRESH ? -1 : 0;
          if (hCur !== 0 && hCur !== universalChallenge.headmove.hDir) {
            universalChallenge.headmove.hDir = hCur;
            universalChallenge.headmove.hChanges++;
          }
          // Vertical nod
          const faceCY = (lm[10].y + lm[152].y) / 2;
          const faceH  = Math.abs(lm[10].y - lm[152].y) + 1e-6;
          const ny     = (nose.y - faceCY) / faceH;
          const vCur   = ny > 0.08 ? 1 : ny < -0.08 ? -1 : 0;
          if (vCur !== 0 && vCur !== universalChallenge.headmove.vDir) {
            universalChallenge.headmove.vDir = vCur;
            universalChallenge.headmove.vChanges++;
          }
          const total = universalChallenge.headmove.hChanges + universalChallenge.headmove.vChanges;
          uChalStatus.textContent = total > 0 ? "继续！" : "摇头或点头！";
          if (total >= 2) {
            universalChallenge.completed = true;
            endUniversalChallenge(true);
          }
        }
      }

      // ---------- FaceMesh + Camera setup ----------
      try {
        const faceMesh = new FaceMesh({
          locateFile: (f) =>
            "https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/" + f,
        });
        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        faceMesh.onResults((results) => {
          if (
            results.multiFaceLandmarks &&
            results.multiFaceLandmarks.length > 0
          ) {
            processFace(results.multiFaceLandmarks[0], performance.now());
          }
        });

        const camStream = new Camera(webcamVideo, {
          onFrame: async () => {
            await faceMesh.send({ image: webcamVideo });
          },
          width: 320,
          height: 240,
        });
        camStream.start().catch(() => {
          addLog("摄像头启动失败，动作检测不可用。");
        });
      } catch (e) {
        addLog("动作检测初始化失败：" + e.message);
      }

      // =================================================================
      // Boot
      // =================================================================
      buildScene();
      seedLog();
      renderLives();
      renderTimer();
      requestAnimationFrame(frame);

      // -----------------------------------------------------------------
      // MainSync: parent React shell (onboarding) sends role + rules here.
      // -----------------------------------------------------------------
      function applyMainSync(p) {
        if (!p || typeof p !== "object") return;
        if (state.spectator) {
          if (p.ruleText) addLog("「守则」" + String(p.ruleText), null, { rule: true });
          if (p.winText) addLog("「胜利」" + String(p.winText), null, {});
          return;
        }
        var a = p.sceneAnimal;
        if (a !== "lion" && a !== "owl" && a !== "giraffe") a = "owl";
        state.me.animal = a;
        state.lastMainSyncName =
          typeof p.playerName === "string" ? p.playerName : "";
        if (typeof p.lives === "number") {
          state.me.lives = Math.max(0, Math.min(3, Math.floor(p.lives)));
        }
        const nm = typeof p.playerName === "string" ? p.playerName : "";
        if (state.nodes.me && state.nodes.me.parentNode) {
          state.nodes.me.parentNode.removeChild(state.nodes.me);
        }
        const newMe = makeAnimalAvatar({ animal: a, isMe: true, name: nm });
        layers.me.appendChild(newMe);
        state.nodes.me = newMe;
        renderLives();
        if (p.ruleText) addLog("「守则」" + String(p.ruleText), null, { rule: true });
        if (p.winText) addLog("「胜利」" + String(p.winText), null, {});
      }
      function hash01(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++)
          h = ((h << 5) - h + s.charCodeAt(i)) | 0;
        return (Math.abs(h) % 1000) / 1000;
      }
      function applyMSView(p) {
        if (!p || typeof p !== "object") return;
        state.spectator = Boolean(p.spectator);
        if (state.spectator && state.nodes.me) {
          state.nodes.me.setAttribute("visibility", "hidden");
        } else if (state.nodes.me) {
          state.nodes.me.setAttribute("visibility", "visible");
        }
      }
      function applyNetPeers(raw) {
        if (!raw || typeof raw !== "object") return;
        var peers = raw.peers;
        if (!peers || typeof peers !== "object") return;
        var selfId = String(raw.selfId != null ? raw.selfId : state.netSelfId || "");
        var spec = state.spectator;
        for (var pid in peers) {
          if (!spec && pid === selfId) continue;
          var pr = peers[pid];
          if (!pr || typeof pr !== "object") continue;
          var row = state.others.find(function (o) { return o.id === pid; });
          if (!row) continue;
          if (pr.x != null && Number.isFinite(pr.x)) row.x = clamp(pr.x, BORDER, MAP_W - BORDER);
          if (pr.y != null && Number.isFinite(pr.y)) row.y = clamp(pr.y, BORDER, MAP_H - BORDER);
          if (pr.moving != null) row.moving = !!pr.moving;
          if (pr.animKey != null) row.animKey = String(pr.animKey).slice(0, 64);
          if (pr.facing != null) row.facing = +pr.facing;
        }
      }
      function applyRoomPlayers(raw) {
        if (!raw || typeof raw !== "object") return;
        var pl = raw.players;
        if (!Array.isArray(pl)) return;
        var selfId = raw.selfId || "";
        var selfName = String(raw.selfName || "");
        state.netSelfId = selfId;
        state.roomStarted = Boolean(raw.roomStarted);
        if (raw.spectator != null) state.spectator = Boolean(raw.spectator);
        var toRem = raw.itemsRemoved;
        if (Array.isArray(toRem) && toRem.length) {
          for (var rii = 0; rii < toRem.length; rii++) {
            removeItemByIdNoEffects(toRem[rii]);
          }
        }
        var others = pl.filter(function (q) {
          if (!q || !q.id) return false;
          if (selfId) return q.id !== selfId;
          if (selfName && q.name === selfName) return false;
          if (!selfId && !selfName && state.lastMainSyncName && q.name === state.lastMainSyncName)
            return false;
          return true;
        });
        for (var oi = 0; oi < state.others.length; oi++) {
          var op = state.others[oi];
          var onode = state.nodes.others.get(op.id);
          if (onode && onode.parentNode) onode.parentNode.removeChild(onode);
          state.nodes.others.delete(op.id);
        }
        state.others = [];
        var n = others.length;
        var wcx = MAP_W / 2;
        var wcy = MAP_H / 2;
        for (var j = 0; j < n; j++) {
          var q = others[j];
          var an = q.sceneAnimal;
          if (an !== "lion" && an !== "owl" && an !== "giraffe") an = "owl";
          var t = (2 * Math.PI * j) / Math.max(n, 1) + hash01(String(q.id)) * 0.4;
          var r = 220 + 50 * (j % 2);
          var x = wcx + Math.cos(t) * r;
          var y = wcy + Math.sin(t) * r;
          x = clamp(x, BORDER, MAP_W - BORDER);
          y = clamp(y, BORDER, MAP_H - BORDER);
          var row = {
            id: q.id,
            name: String(q.name || "…"),
            animal: an,
            x: x,
            y: y,
            vx: 0,
            vy: 0,
            moving: false,
            animKey: "idle",
            facing: 0,
            netRemote: true,
          };
          state.others.push(row);
          var g = makeAnimalAvatar({ animal: an, isMe: false, name: row.name });
          layers.others.appendChild(g);
          state.nodes.others.set(q.id, g);
        }
        if (n > 0) addLog("已同步 " + n + " 名同房间玩家", null, {});
        if (
          raw.roomStarted &&
          state.items.length === 0 &&
          (!toRem || toRem.length === 0)
        ) {
          reseedMapItems();
        }
      }
      window.addEventListener("message", function (ev) {
        var d = ev.data;
        if (!d || d.source !== "nocturne-zoo" || d.payload == null) return;
        if (d.type === "NZ_MS_VIEW") {
          applyMSView(d.payload);
        } else if (d.type === "NZ_PLAYER_SYNC") {
          applyMainSync(d.payload);
        } else if (d.type === "NZ_ROOM_PLAYERS") {
          applyRoomPlayers(d.payload);
        } else if (d.type === "NZ_MAIN_SCENE_NET") {
          applyNetPeers(d.payload);
        } else if (d.type === "NZ_MS_ITEM") {
          if (d.payload && d.payload.events) applyItemInbox(d.payload.events);
        }
      });
    </script>
  </body>
</html>

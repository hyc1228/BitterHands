<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Nocturne Zoo · Main Scene</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="player-id-labels.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #161618;
        color: #fff;
        font-family: "Patrick Hand", "Comic Sans MS", system-ui, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        /* Mobile: prevent double-tap zoom and pinch zoom from interfering
           with tap-to-move. The world SVG has its own touch-action: none
           for stricter control. */
        touch-action: manipulation;
      }

      /* ---------- Phone frame (desktop preview) ---------- */
      body {
        display: grid;
        place-items: center;
      }
      .phone-frame {
        position: relative;
        width: 100vw;
        height: 100vh;
        /* iOS Safari: 100vh includes URL bar area, leaving content cut off
           at the bottom. dvh (dynamic viewport height) shrinks/grows with
           the URL bar; svh is the smallest possible. Either is safe. */
        height: 100dvh;
        max-width: 100vw;
        background: #000;
        overflow: hidden;
      }
      @media (min-width: 600px) {
        body {
          padding: 16px;
          background: #0d0d10;
        }
        .phone-frame {
          width: min(420px, 100%);
          aspect-ratio: 9 / 19.5;
          height: auto;
          max-height: calc(100vh - 32px);
          border-radius: 42px;
          border: 10px solid #1a1a1c;
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.65),
            0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        }
      }

      .screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        background: #000;
        overflow: hidden;
      }

      /* ---------- HUD top bar ---------- */
      .hud-top {
        position: relative;
        z-index: 10;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 16px 18px 6px;
        font-family: "Caveat", cursive;
      }
      .rec {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-self: start;
      }
      .rec-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #ee3a3a;
        box-shadow: 0 0 8px rgba(238, 58, 58, 0.7);
        animation: blink 1.4s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        55% {
          opacity: 1;
        }
        60%,
        90% {
          opacity: 0.15;
        }
        100% {
          opacity: 1;
        }
      }
      .rec-text {
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 4px;
      }
      .lives {
        justify-self: center;
        display: flex;
        gap: 4px;
        font-size: 22px;
        line-height: 1;
        color: #ff5e5e;
        text-shadow: 0 0 6px rgba(255, 94, 94, 0.4);
      }
      .lives .heart-off {
        color: rgba(255, 255, 255, 0.18);
        text-shadow: none;
      }
      .timer {
        display: flex;
        align-items: center;
        gap: 6px;
        justify-self: end;
        font-size: 28px;
        font-weight: 700;
      }
      .clock-icon {
        flex: 0 0 auto;
      }

      /* ---------- World viewport ---------- */
      .world {
        flex: 1;
        position: relative;
        min-height: 0;
        overflow: hidden;
      }
      .world-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        /* Mobile: stop the browser from intercepting taps as scroll/zoom. */
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .hint {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 8px;
        text-align: center;
        font-family: "Patrick Hand", cursive;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.35);
        pointer-events: none;
        z-index: 5;
        letter-spacing: 0.5px;
      }

      /* ---------- Zoo keeper log ---------- */
      .log {
        position: relative;
        z-index: 10;
        margin: 6px 14px 14px;
        padding: 10px 16px 12px;
        background: #f3ecdb;
        color: #131313;
        border: 2.5px solid #0d0d0d;
        border-radius: 22px;
        font-family: "Patrick Hand", cursive;
        box-shadow: 3px 3px 0 #000;
        transform: rotate(-0.5deg);
        height: 142px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 0, 0, 0.4) transparent;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        background-image: radial-gradient(
            rgba(0, 0, 0, 0.04) 1px,
            transparent 1px
          ),
          repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent 22px,
            rgba(0, 0, 0, 0.06) 23px
          );
        background-size: 6px 6px, 100% 100%;
        background-attachment: local;
      }
      .log::-webkit-scrollbar {
        width: 5px;
      }
      .log::-webkit-scrollbar-track {
        background: transparent;
      }
      .log::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.35);
        border-radius: 3px;
      }
      .log h2 {
        margin: 0 0 4px;
        font-family: "Caveat", cursive;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 2px;
        position: sticky;
        top: 0;
        background: #f3ecdb;
        padding-bottom: 2px;
      }
      .log ul {
        list-style: none;
        padding: 0;
        margin: 0;
        font-size: 16px;
        line-height: 22px;
      }
      .log li {
        display: flex;
        gap: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .log li::before {
        content: "·";
        font-weight: 700;
      }
      .log .ts {
        font-weight: 700;
        flex: 0 0 auto;
      }
      .log .msg {
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .log li.rule {
        color: #c8000f;
        font-weight: 700;
        text-shadow: 0 0 0.5px #c8000f;
      }
      .log li.rule::before {
        content: "▸";
      }
      .log li.fade-in {
        animation: logIn 0.4s ease-out;
      }
      @keyframes logIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ---------- CRT / REC post-processing ---------- */
      /* The shake is on the screen wrapper so the whole picture wobbles.
         will-change + translateZ promotes the screen and the rec-fx overlay
         to their own GPU compositing layers so the transform animations
         (screenShake / roll / glitch) just do GPU compositing instead of
         repainting the full viewport each frame. */
      .screen {
        animation: screenShake 0.55s ease-in-out infinite;
        will-change: transform;
        /* translateZ omitted — screenShake animation already sets transform
           every frame; will-change alone promotes the layer. */
      }
      @keyframes screenShake {
        0%, 100% {
          transform: translate(0, 0);
        }
        20% {
          transform: translate(0.6px, -0.4px);
        }
        40% {
          transform: translate(-0.5px, 0.4px);
        }
        60% {
          transform: translate(0.4px, 0.5px);
        }
        80% {
          transform: translate(-0.4px, -0.3px);
        }
      }

      .rec-fx {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        will-change: transform;
        transform: translateZ(0);
        /* Vignette + slight green tint */
        background: radial-gradient(
            130% 95% at 50% 50%,
            transparent 38%,
            rgba(0, 0, 0, 0.45) 78%,
            rgba(0, 0, 0, 0.85) 100%
          ),
          linear-gradient(
            to bottom,
            rgba(0, 30, 10, 0.05),
            rgba(0, 30, 10, 0.02)
          );
      }
      /* Scanlines layer */
      .rec-fx::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.42) 0,
          rgba(0, 0, 0, 0.42) 1px,
          transparent 1px,
          transparent 3px
        );
        mix-blend-mode: multiply;
        opacity: 0.55;
        /* jitter animation removed — it forced a full repaint of this overlay
           every 60 ms for almost no visual gain. */
      }
      /* RGB phosphor stripes + slow rolling band (one element with two bgs) */
      .rec-fx::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            to bottom,
            transparent 0%,
            transparent 38%,
            rgba(255, 255, 255, 0.06) 45%,
            rgba(255, 255, 255, 0.10) 50%,
            rgba(255, 255, 255, 0.06) 55%,
            transparent 62%,
            transparent 100%
          ),
          repeating-linear-gradient(
            to right,
            rgba(255, 60, 60, 0.06) 0 1px,
            rgba(60, 255, 60, 0.06) 1px 2px,
            rgba(60, 60, 255, 0.06) 2px 3px
          );
        background-size: 100% 220%, auto auto;
        animation: roll 7s linear infinite;
      }
      @keyframes jitter {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(0.4px, -0.4px);
        }
      }
      @keyframes roll {
        from {
          background-position: 0 -110%, 0 0;
        }
        to {
          background-position: 0 110%, 0 0;
        }
      }

      /* Random VHS glitch slice */
      .glitch-band {
        position: absolute;
        left: -4%;
        right: -4%;
        height: 14px;
        background: rgba(255, 255, 255, 0.18);
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 51;
        opacity: 0;
      }
      .glitch-band.on {
        animation: glitchSlice 0.22s steps(4) forwards;
      }
      @keyframes glitchSlice {
        0% {
          opacity: 0.55;
          top: 22%;
          transform: translateX(-3px);
        }
        25% {
          opacity: 0.35;
          top: 64%;
          transform: translateX(5px);
        }
        50% {
          opacity: 0.5;
          top: 41%;
          transform: translateX(-7px);
        }
        75% {
          opacity: 0.25;
          top: 78%;
          transform: translateX(3px);
        }
        100% {
          opacity: 0;
          top: 90%;
          transform: translateX(0);
        }
      }

      /* Item disappear animation (for heart pickup, alarm pickup) */
      .item-fade {
        animation: itemFade 0.42s ease-out forwards;
      }
      @keyframes itemFade {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(2.2);
        }
      }
      .heart-gain {
        animation: heartGain 0.6s ease-out forwards;
      }
      @keyframes heartGain {
        0% {
          transform: scale(1);
          color: #ff5e5e;
        }
        50% {
          transform: scale(1.4);
          color: #ffffff;
          text-shadow: 0 0 14px #ff7a7a;
        }
        100% {
          transform: scale(1);
          color: #ff5e5e;
        }
      }

      /* SVG entity helpers */
      .entity {
        cursor: default;
        /* Promote each entity to its own GPU compositing layer so the
           feTurbulence/feDisplacement filters baked into the asset SVGs
           (and our #rough/#meRing wrappers) are rasterized once and then
           just GPU-translated each frame, instead of being re-rendered. */
        will-change: transform;
      }
      .flashlight-cone,
      .flashlight-torch {
        will-change: transform;
      }
      /* Fence layer: hint a GPU compositing layer so the SVG (with its
         feTurbulence/displacement filter) is rasterized ONCE and the
         resulting bitmap is reused every frame. No recomputed noise. */
      #fenceLayer {
        will-change: transform;
      }
      .leg {
        transform-box: fill-box;
        transform-origin: top center;
      }
      .walking .leg-l {
        animation: legL 0.36s ease-in-out infinite;
      }
      .walking .leg-r {
        animation: legR 0.36s ease-in-out infinite;
      }
      @keyframes legL {
        0%,
        100% {
          transform: rotate(-12deg);
        }
        50% {
          transform: rotate(12deg);
        }
      }
      @keyframes legR {
        0%,
        100% {
          transform: rotate(12deg);
        }
        50% {
          transform: rotate(-12deg);
        }
      }
      /* Live2D-style placeholder blink. Real face detection will override
         this by setting transform on the .eye groups directly. */
      .animal .eye {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: blinkLoop 4.5s ease-in-out infinite;
      }
      @keyframes blinkLoop {
        0%, 95%, 100% {
          transform: scaleY(1);
        }
        97% {
          transform: scaleY(0.05);
        }
      }

      /* Open / closed eye state: when the .eye group has class .closed
         the sclera+pupil hide and a blink lash SVG appears in their
         place — driven by isEyeClosed() in driveLive2D. */
      .animal .eye .eye-blink-img { display: none; }
      .animal .eye.closed .eye-open-part { display: none; }
      .animal .eye.closed .eye-blink-img { display: block; }

      /* Mouth — bbox-centered so face detection can scaleY it for open/close.
         A subtle idle "breathing" animation makes it feel alive until real
         mouth tracking is wired in. */
      .animal .mouth {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: mouthIdle 5.5s ease-in-out infinite;
      }
      /* Beak: don't scale the wrapper (the diamond would breathe weirdly).
         Each half has its own translateY animation so the closed diamond
         "clicks" briefly into an open beak as a placeholder. */
      .animal .mouth.beak {
        animation: none;
      }
      .animal .beak-upper,
      .animal .beak-lower {
        transform-box: fill-box;
      }
      .animal .beak-upper {
        animation: beakUpperIdle 5.5s ease-in-out infinite;
      }
      .animal .beak-lower {
        animation: beakLowerIdle 5.5s ease-in-out infinite;
      }
      @keyframes beakUpperIdle {
        0%, 88%, 100% { transform: translateY(0); }
        93%           { transform: translateY(-2px); }
      }
      @keyframes beakLowerIdle {
        0%, 88%, 100% { transform: translateY(0); }
        93%           { transform: translateY(2px); }
      }
      @keyframes mouthIdle {
        0%, 88%, 100% {
          transform: scaleY(1);
        }
        93% {
          transform: scaleY(1.6);
        }
      }

      /* Head pose carrier. Face detection rotates (.bob) for shake and
         translates Y for nod. transform-origin: 50% 50% with fill-box
         pivots the rotation around the body's bbox center, which is
         approximately the avatar's head center. */
      .animal .bob {
        transform-box: fill-box;
        transform-origin: 50% 50%;
      }

      /* Owl wing flap. Each wing pivots at the edge of its bbox that
         touches the body, so flapping rotates the tip up/down without
         dragging the wing across the body. */
      .owl-wing {
        transform-box: fill-box;
      }
      .wing-r {
        transform-origin: 0% 50%; /* left edge of bbox = body side */
      }
      .wing-l {
        transform-origin: 100% 50%; /* right edge of bbox = body side */
      }
      .walking .wing-r,
      .walking .wing-l {
        animation: wingFlap 0.32s ease-in-out infinite;
      }
      @keyframes wingFlap {
        0%,
        100% {
          transform: rotate(-14deg);
        }
        50% {
          transform: rotate(22deg);
        }
      }

      /* ZooKeeper eye states.
           default     → sweep eyes visible (white sclera + small red pupil)
           .locked     → glowing red eyes visible, sweep hidden, body shakes */
      .zookeeper .zk-eye-locked { display: none; }
      .zookeeper.locked .zk-eye-sweep { display: none; }
      .zookeeper.locked .zk-eye-locked { display: block; }
      .zookeeper.locked .zk-body {
        animation: zkShake 0.16s ease-in-out infinite;
      }
      @keyframes zkShake {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-3px); }
      }
      .alarm-shake {
        animation: shake 0.4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes shake {
        0%,
        100% {
          transform: rotate(-6deg);
        }
        50% {
          transform: rotate(6deg);
        }
      }
      .heart-pulse {
        transform-box: fill-box;
        transform-origin: center;
        animation: heartPulse 1.4s ease-in-out infinite;
      }
      @keyframes heartPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.12);
        }
      }
      /*
       * NOTE: do NOT set `transform-box`/`transform-origin` on the cone or
       * torch groups. The flashlight uses the SVG `transform` attribute
       * (`translate(monX monY) rotate(angle)`), and those CSS properties
       * would silently shift the rotation pivot to the element's bounding
       * box corner, making the beam spin around the wrong point.
       */
      .me-ring {
        animation: meRing 2.2s ease-in-out infinite;
      }
      @keyframes meRing {
        0%,
        100% {
          opacity: 0.85;
        }
        50% {
          opacity: 1;
        }
      }

      /* ---------- Action prompt bars ----------
         Two slim rounded bars instead of centered modals so they don't
         block the player's view of the world.

           .action-bar-top    — monitor challenge (when the flashlight
                                lands on you and you have to perform an
                                action like "don't blink for 5s").
           .action-bar-bottom — universal rule that everyone in the room
                                must follow simultaneously.

         Visuals:
           - light purple bg (#BAB4DA), heavy black "doodle" drop shadow
           - a fill rect on the left whose width = remaining time / max,
             coloured RED while active and GREEN once you pass.
           - on success the bar snaps to full green and a ✓ badge slides
             in at the right edge. */
      .action-bar {
        display: none;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: min(94%, 340px);
        height: 38px;
        background: #bab4da;
        border-radius: 22px;
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.78);
        overflow: hidden;
        z-index: 22;
        pointer-events: none;
        font-family: "Caveat", cursive;
      }
      .action-bar.active {
        display: block;
      }
      .action-bar-top {
        top: 64px;
      }
      .action-bar-bottom {
        bottom: 178px;
      }

      .action-bar .bar-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 100%;
        background: #970000;
        transition: width 0.12s linear, background 0.25s ease-out;
      }
      .action-bar.success .bar-fill {
        background: #009717;
      }
      .action-bar.fail .bar-fill {
        background: #970000;
        opacity: 0.55;
      }

      .action-bar .bar-content {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        height: 100%;
        padding: 0 14px;
        gap: 6px;
        font-weight: 700;
        font-size: 17px;
        color: #0a0a0a;
        letter-spacing: 0.6px;
        white-space: nowrap;
        overflow: hidden;
      }
      .action-bar .bar-warn {
        font-size: 16px;
        flex: 0 0 auto;
      }
      .action-bar .bar-label {
        flex: 0 0 auto;
        font-family: "Caveat", cursive;
        font-weight: 700;
      }
      .action-bar .bar-status {
        flex: 1 1 auto;
        min-width: 0;
        font-family: "Patrick Hand", cursive;
        font-weight: 400;
        font-size: 13.5px;
        color: #1a1a1a;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .action-bar .bar-emoji {
        flex: 0 0 auto;
        font-size: 17px;
        margin-left: auto;
      }
      .action-bar.success .bar-emoji {
        opacity: 0;
      }

      /* Pass / fail badge — slides in on success, replaces the action emoji. */
      .action-bar .bar-check {
        display: none;
        position: absolute;
        right: 4px;
        top: 50%;
        transform: translateY(-50%) scale(0.4);
        z-index: 3;
        font-size: 26px;
        line-height: 1;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .action-bar.success .bar-check {
        display: block;
        transform: translateY(-50%) scale(1);
      }

      /* ---------- Death / spectator overlay ---------- */
      /* Full-screen flash shown briefly on death, then shrinks to badge */
      #deathOverlay {
        display: none;
        position: absolute;
        inset: 0;
        z-index: 40;
        background: rgba(0, 0, 0, 0.82);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        pointer-events: none;
        transition: opacity 0.6s ease;
      }
      #deathOverlay.active { display: flex; opacity: 1; }
      #deathOverlay.fading { opacity: 0; }
      #deathOverlay .death-icon { font-size: 3rem; }
      #deathOverlay .death-title {
        font-family: "Caveat", cursive;
        font-size: 2rem;
        font-weight: 700;
        color: #ff4444;
        letter-spacing: 2px;
      }
      #deathOverlay .death-sub {
        font-size: 0.82rem;
        color: #888;
        font-family: "Patrick Hand", cursive;
        letter-spacing: 1px;
      }
      /* Small corner badge that persists after the overlay fades */
      #spectatorBadge {
        display: none;
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 38;
        background: rgba(0,0,0,0.72);
        border: 1.5px solid #ff4444;
        border-radius: 20px;
        padding: 3px 12px;
        font-size: 0.72rem;
        color: #ff6666;
        font-family: "Patrick Hand", cursive;
        letter-spacing: 1px;
        pointer-events: none;
      }
      #spectatorBadge.active { display: block; }

      /* ---------- Virtual joystick (touch-only) ---------- */
      .joystick {
        position: absolute;
        left: 18px;
        bottom: 200px; /* sit above the zoo keeper log */
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.10);
        border: 2px solid rgba(255, 255, 255, 0.35);
        z-index: 30;
        touch-action: none;
        display: none;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }
      .joystick-handle {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 48px;
        height: 48px;
        margin: -24px 0 0 -24px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.55);
        pointer-events: none;
        transition: background 0.15s;
      }
      .joystick.active .joystick-handle {
        background: rgba(92, 201, 255, 0.78);
      }
      /* Show on touch devices (no hover, coarse pointer = phone/tablet). */
      @media (hover: none) and (pointer: coarse) {
        .joystick { display: block; }
      }

      /* Floating language toggle — click to flip zh ↔ en. The parent
         React app's NZ_PLAYER_SYNC.lang still wins when it arrives. */
      .lang-toggle {
        position: absolute;
        top: 56px;
        right: 14px;
        z-index: 28;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        border: 1.5px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
        padding: 3px 10px;
        font-family: "Patrick Hand", cursive;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        pointer-events: auto;
        user-select: none;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }
      .lang-toggle:active { transform: scale(0.94); }

      /* ---------- Self-cam preview (bottom-right, local-only) ---------- */
      /* Same <video> element that feeds FaceMesh, just made visible in a
         circular frame. Mirrored so the player sees a natural mirror view.
         object-fit: cover crops the video to fill the circle without
         letterboxing. */
      .cam-preview {
        position: absolute;
        right: 12px;
        /* Sit JUST ABOVE the Zoo Keeper Log card so the two never overlap.
           The log is fixed-height ~142 px + 14 px bottom margin, so 168 px
           up from the bottom edge clears it. */
        bottom: 168px;
        width: 76px;
        height: 76px;
        border-radius: 50%;
        object-fit: cover;
        border: 2.5px solid #ffffff;
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.78);
        background: #1a1a1a;
        z-index: 28;
        pointer-events: none;
        transform: scaleX(-1); /* mirror like a real selfie cam */
      }

      /* ---------- OB / spectator overrides ----------
         When the parent React app sends `NZ_MS_VIEW.spectator = true` we toggle
         `body.is-spectator` (see applyMSView). All UI elements that only make
         sense for the actual player are hidden here from one place — easier than
         touching each spot in JS. */
      body.is-spectator .lives,
      body.is-spectator .joystick,
      body.is-spectator .cam-preview,
      body.is-spectator #challengeOverlay,
      body.is-spectator #universalOverlay,
      body.is-spectator .hint,
      body.is-spectator .alert-overlay {
        display: none !important;
      }

      /* ---------- Alert vignette (red glow when a rule is active) ----------
         Inner box-shadow creates a glow around the screen edges only —
         center stays fully transparent so the cam preview, joystick and
         challenge bars remain crisp. The keyframe pulses the shadow's
         spread/intensity for urgency. */
      .alert-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 60;
        opacity: 0;
        box-shadow: inset 0 0 50px 10px rgba(255, 0, 0, 0.45);
        transition: opacity 0.25s ease;
        will-change: opacity, box-shadow;
      }
      .alert-overlay.active {
        opacity: 1;
        animation: alertPulse 0.8s ease-in-out infinite;
      }
      @keyframes alertPulse {
        0%, 100% {
          box-shadow: inset 0 0 50px 10px rgba(255, 0, 0, 0.40);
        }
        50% {
          box-shadow: inset 0 0 95px 20px rgba(255, 0, 0, 0.78);
        }
      }
    </style>
  </head>
  <body>
    <div class="phone-frame">
      <div class="screen">

            >
              <circle cx="12" cy="13" r="8.2" />

              <path d="M9.5 2.5h5" />

            <span id="timer">02:43</span>
          </div>
        </header>

        <main class="world" id="world">
          <svg
            class="world-svg"
            viewBox="0 0 300 500"
            preserveAspectRatio="xMidYMid meet"
            id="worldSvg"
          >
            <defs>
              <filter
                id="rough"
                x="-10%"
                y="-10%"
                width="120%"
                height="120%"
              >
                <feTurbulence
                  type="fractalNoise"
                  baseFrequency="0.045"
                  numOctaves="2"
                  seed="5"
                />
                <feDisplacementMap in="SourceGraphic" scale="1.6" />
              </filter>
              <filter
                id="rough2"
                x="-10%"
                y="-10%"
                width="120%"
                height="120%"
              >
                <feTurbulence
                  type="fractalNoise"
                  baseFrequency="0.07"
                  numOctaves="2"
                  seed="11"
                />
                <feDisplacementMap in="SourceGraphic" scale="2.4" />
              </filter>
              <filter
                id="redGlow"
                x="-80%"
                y="-80%"
                width="260%"
                height="260%"
              >
                <feGaussianBlur stdDeviation="2.4" />
              </filter>
              <!-- Outlines "me"'s silhouette in soft blue without changing any
                   body colors. Works by dilating SourceAlpha by ~3 px, filling
                   that with blue, and drawing the original body on top so the
                   blue is only visible at the silhouette edge. -->
              <filter
                id="meRing"
                x="-15%"
                y="-15%"
                width="130%"
                height="130%"
              >
                <feMorphology
                  operator="dilate"
                  radius="3"
                  in="SourceAlpha"
                  result="dilated"
                />
                <feFlood flood-color="#5cc9ff" result="blue" />
                <feComposite
                  in="blue"
                  in2="dilated"
                  operator="in"
                  result="ring"
                />
                <feMerge>
                  <feMergeNode in="ring" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
              <!-- Tiled grass background -->
              <pattern
                id="grassTile"
                width="200"
                height="200"
                patternUnits="userSpaceOnUse"

                  x="0"
                  y="0"
                  width="200"
                  height="200"
                  preserveAspectRatio="none"

              </pattern>
              <!-- (fenceTileH pattern removed — fence is now rendered as
                   individual <image> tiles in buildScene to avoid an iOS
                   Safari bug where PNG-in-SVG-pattern garbles into
                   "?" / letter-like artifacts.) -->
            </defs>

            <g id="cameraGroup">
              <!-- Background grass covers the entire map -->
              <rect

                y="0"

              <g id="othersLayer"></g>

        </main>

        <footer class="log">

        <!-- Webcam: hidden input for FaceMesh -->

        <video

        <!-- Red alert vignette — pulses around the screen edge while a

        <!-- Language toggle — manual override for zh ↔ en. -->

        <!-- Monitor challenge bar (top): when flashlight lands on you. -->

          statusKeepEyesOpenS: (s) => `保持睁眼 ${s}s…`,
          statusBlinked:       "眨眼了！保持睁眼…",
          statusMouthHolding:  "嘴巴张开中…",
          statusMouthOpenCmd:  "张开嘴巴！",
          statusShakeProgress: (n) => `摇头 ${n}/2…`,
          statusUniGo:         "请执行！",
          statusBlinking:      "眨眼中…",
          statusBlinkPlease:   "请眨眼！",
          statusHeadKeep:      "继续！",
          statusHeadDo:        "摇头或点头！",
          statusSuccess:       "完成！",
          statusFail:          "违规！−1♥",

          logRuleDone:    "✓ 守则完成。",
          logRuleFail:    "❌ 未执行守则，扣 1 生命值。",
          logUniDone:     "✓ 通用规则完成。",
          logUniFail:     "❌ 未执行通用规则，扣 1 生命值。",
          logAlarmRing:   "闹铃响了…它转过头来。",
          logRulePrefix:  "「守则」",
          logWinPrefix:   "「胜利」",
          logRosterSync:  (n) => `已同步 ${n} 名同房间玩家`,
          logSpotLight:   (name) => `手电筒照到 ${name}…`,
          logDeath:       "💀 生命值归零，进入观战模式。",

          logUniMouthAnnounce: "通用规则：请张嘴。",

          flavor: [
            "它喜欢看你慌张的样子。",
            "园区广播：请保持你的动物姿势。",
            "LEO 的脚步停得太突然了。",
            "有什么东西在你身后写下笔记。",
            "MIA 的甩脖动作不够大。",

            { t: "00:08", m: "白狮子每分钟必须低吼。", rule: true },
            { t: "00:23", m: "园区广播：请保持你的动物姿势。" },

      };

      let currentLang = "en";
      const _urlLang = new URLSearchParams(location.search).get("lang");
      if (_urlLang === "en" || _urlLang === "zh") currentLang = _urlLang;

      function t(key, ...args) {
        const dict = STRINGS[currentLang] || STRINGS.en;
        const v = dict[key];
        if (typeof v === "function") return v(...args);
        if (typeof v === "string") return v;
        const en = STRINGS.en[key];
        if (typeof en === "function") return en(...args);
        if (typeof en === "string") return en;
        return key;
      }
      function tArr(key) {
        const dict = STRINGS[currentLang] || STRINGS.en;
        if (Array.isArray(dict[key])) return dict[key];
        return Array.isArray(STRINGS.en[key]) ? STRINGS.en[key] : [];
      }
      function setLang(lang) {
        if (lang !== "en" && lang !== "zh") return;
        if (lang === currentLang) return;
        currentLang = lang;
        // Re-render the persistent visible labels that don't redraw on
        // their own. Challenge bars, log entries, etc. are dynamic and
        // pick up the new lang on next event.
        const hintEl = document.querySelector(".hint");
        if (hintEl) hintEl.textContent = t("hint");
        // Static HUD labels: chal/uchal idle text, death overlay, spectator badge.
        const setText = (id, txt) => {
          const el = document.getElementById(id);
          if (el) el.textContent = txt;
        };
        setText("chal-label", t("challengeRuleHeader"));
        setText("chal-status", t("chalStatusInitial"));
        setText("uchal-label", t("challengeUniHeader"));
        setText("uchal-status", t("uchalStatusInitial"));
        const dt = document.querySelector("#deathOverlay .death-title");
        if (dt) dt.textContent = t("deathTitle");
        const ds = document.querySelector("#deathOverlay .death-sub");
        if (ds) ds.textContent = t("deathSub");
        setText("spectatorBadge", t("spectatorBadge"));
        // Toggle button shows the OTHER language as a hint of what
        // clicking it will do.
        const langBtn = document.getElementById("langToggle");
        if (langBtn) langBtn.textContent = currentLang === "zh" ? "EN" : "中";
      }

      const VIEW_W = 300;
      const VIEW_H = 500;
      const MAP_W = 1080;
      const MAP_H = 1500;
      // Legacy aliases (kept so existing maths reads naturally inside callers)
      const W = VIEW_W;
      const H = VIEW_H;
      const SVG = document.getElementById("worldSvg");
      const cameraGroup = document.getElementById("cameraGroup");

      const layers = {
        cone: document.getElementById("coneLayer"),
        torch: document.getElementById("torchLayer"),
        fence: document.getElementById("fenceLayer"),
        items: document.getElementById("itemsLayer"),
        others: document.getElementById("othersLayer"),
        monitor: document.getElementById("monitorLayer"),
        me: document.getElementById("meLayer"),
      };

      // =================================================================
      // SVG entity templates (returns DOM elements)
      // =================================================================
      const SVGNS = "http://www.w3.org/2000/svg";
      function el(name, attrs = {}, children = []) {
        const node = document.createElementNS(SVGNS, name);
        for (const [k, v] of Object.entries(attrs)) {
          if (v == null) continue;
          node.setAttribute(k, v);
        }
        for (const c of children) if (c) node.appendChild(c);
        return node;
      }

      // Per-animal avatar:
      //   - body outline comes from the SVG file ("Owl body.svg" / "lion.svg" /
      // Per-animal layout. Body comes from the SVG file; eyes and mouth are
      // generated procedurally so face detection can drive them later
      // (blink → eye scaleY=0; mouth open → mouth scaleY>1). Lion and
      // giraffe also get procedural stick legs that swing while walking;
      // the owl uses two flapping wings on the sides instead of legs.
      const ANIMAL_SPEC = {
        owl: {
          body: "Owl body.svg",
          bodyW: 80,
          bodyH: 96,
          // The body SVG was re-exported with a drop shadow, so its viewBox
          // gained ~28 px of padding on the right/bottom. assetShift
          // compensates by translating the silhouette group so the content
          // center lands back at (0, 0) — keeps eyes/mouth in alignment.
          assetShift: { x: 1.66, y: 1.67 },
          eyes: {
            l: { cx: -13, cy: -10, scleraR: 9, pupilR: 6 },
            r: { cx:  13, cy: -10, scleraR: 9, pupilR: 6 },
            sclera: "#ffffff",
            pupil:  "#cf1313",
            pupilInward: 1.5,  // cute cross-eye: pupils nudge toward nose
          },
          // Owl beak — two triangles meeting in the middle so closed they
          // form a vertical diamond ◊. Driver pushes the upper triangle up
          // and the lower one down to open the beak like a real bird.
          mouth: { shape: "beak", cx: 0, cy: 4, rx: 4, ry: 5 },
          nameY: -56,
          wing: { attach: 40, w: 36, h: 30, anchorY: -10 },
        },
        lion: {
          body: "lion.svg",
          bodyW: 110,
          bodyH: 112,
          assetShift: { x: 1.69, y: 1.47 },
          eyes: {
            l: { cx: -15, cy: -4, scleraR: 8.5, pupilR: 5.5 },
            r: { cx:  15, cy: -4, scleraR: 8.5, pupilR: 5.5 },
            sclera: "#ffffff",
            pupil:  "#cf1313",
            pupilInward: 1.5,
          },
          // Mouth pushed well below the SVG's central black oval (which the
          // user reads as the nose) so it stops covering the nose area.
          mouth: { cx: 0, cy: 22, rx: 10, ry: 5 },
          legs: { y: 48, spread: 14 },
          nameY: -64,
        },
        giraffe: {
          body: "giraffe.svg",
          bodyW: 60,
          bodyH: 120,
          assetShift: { x: 0.32, y: 1.47 },
          eyes: {
            l: { cx: -7, cy: -32, scleraR: 6.5, pupilR: 5 },
            r: { cx:  7, cy: -32, scleraR: 6.5, pupilR: 5 },
            sclera: "#ffffff",
            pupil:  "#cf1313",
            pupilInward: 1,
          },
          mouth: { cx: 0, cy: -17, rx: 6, ry: 4.5 },
          legs: { y: 55, spread: 10 },
          nameY: -68,
        },
      };

      function makeAnimalAvatar({ animal = "lion", isMe = false, name = "" }) {
        const spec = ANIMAL_SPEC[animal] || ANIMAL_SPEC.lion;

        const root = el("g", { class: `entity animal ${animal}` });
        const inner = el("g", { class: "bob" });

        // ---- Silhouette group: body image + wings (owl) OR legs (others). --
        // The whole group gets the meRing filter when isMe, so the blue
        // outline traces the union of body + wings/legs as a single
        // silhouette without recoloring any of the body's interior pixels.
        // assetShift compensates for SVG drop-shadow padding so the body's
        // visible content lines up with the procedural eyes/mouth at (0, 0).
        const silAttrs = {};
        if (isMe) silAttrs.filter = "url(#meRing)";
        const aS = spec.assetShift;
        if (aS && (aS.x || aS.y)) {
          silAttrs.transform = `translate(${aS.x || 0} ${aS.y || 0})`;
        }
        const sil = el("g", silAttrs);

        // Body image
        sil.appendChild(
          el("image", {
            href: spec.body,
            x: -spec.bodyW / 2,
            y: -spec.bodyH / 2,
            width: spec.bodyW,
            height: spec.bodyH,
            preserveAspectRatio: "xMidYMid meet",
          })
        );

        if (animal === "owl") {
          // Two stub wings on the sides. See earlier turn for the
          // image-flip logic: each wing's image rect stays at x=0..w in its
          // inner group so the bbox-relative rotation pivot lines up with
          // the body-side edge of each wing.
          const w = spec.wing.w;
          const h = spec.wing.h;
          const ay = spec.wing.anchorY ?? 0;

          // LEFT wing — natural orientation (tip already points leftward)
          const wLG = el("g", {
            transform: `translate(${-spec.wing.attach} ${ay})`,
          });
          const wL = el("g", { class: "owl-wing wing-l" });
          wL.appendChild(
            el("image", {
              href: "owl wing.svg",
              x: -w,
              y: -h / 2,
              width: w,
              height: h,
              preserveAspectRatio: "xMidYMid meet",
            })
          );
          wLG.appendChild(wL);
          sil.appendChild(wLG);

          // RIGHT wing — image content flipped in place so tip points right
          const wRG = el("g", {
            transform: `translate(${spec.wing.attach} ${ay})`,
          });
          const wR = el("g", { class: "owl-wing wing-r" });
          wR.appendChild(
            el("image", {
              href: "owl wing.svg",
              x: 0,
              y: -h / 2,
              width: w,
              height: h,
              preserveAspectRatio: "xMidYMid meet",
              transform: `translate(${w} 0) scale(-1 1)`,
            })
          );
          wRG.appendChild(wR);
          sil.appendChild(wRG);
        } else if (spec.legs) {
          // Procedural stick legs that swing via CSS .walking .leg-{l,r}.
          const ly = spec.legs.y;
          const lx = spec.legs.spread;
          sil.appendChild(
            el("path", {
              d: `M${-lx} ${ly} L${-lx - 2} ${ly + 18} L${-lx - 6} ${ly + 19}`,
              fill: "none",
              stroke: "#ffffff",
              "stroke-width": 3.6,
              "stroke-linecap": "round",
              class: "leg leg-l",
            })
          );
          sil.appendChild(
            el("path", {
              d: `M${lx} ${ly} L${lx + 2} ${ly + 18} L${lx + 6} ${ly + 19}`,
              fill: "none",
              stroke: "#ffffff",
              "stroke-width": 3.6,
              "stroke-linecap": "round",
              class: "leg leg-r",
            })
          );
        }

        inner.appendChild(sil);

        // ---- Procedural mouth (animatable). ---------------------------
        //   shape: "ellipse" (default) → <ellipse>, animated via scaleY
        //   shape: "triangle"          → single inverted <polygon>
        //   shape: "beak"              → TWO triangles meeting at (cx, cy);
        //                                upper / lower translate apart to
        //                                open like a bird mandible
        if (spec.mouth) {
          const m = spec.mouth;
          const isBeak = m.shape === "beak";
          const mouthG = el("g", {
            class: "mouth" + (isBeak ? " beak" : ""),
          });
          if (isBeak) {
            // Upper triangle: tip at top (cx, cy-ry), base at middle
            const upper = el("polygon", {
              points:
                `${m.cx},${m.cy - m.ry} ` +
                `${m.cx - m.rx},${m.cy} ` +
                `${m.cx + m.rx},${m.cy}`,
              fill: "#0a0a0a",
              class: "beak-upper",
            });
            // Lower triangle: base at middle, tip at bottom (cx, cy+ry)
            const lower = el("polygon", {
              points:
                `${m.cx - m.rx},${m.cy} ` +
                `${m.cx + m.rx},${m.cy} ` +
                `${m.cx},${m.cy + m.ry}`,
              fill: "#0a0a0a",
              class: "beak-lower",
            });
            mouthG.append(upper, lower);
          } else if (m.shape === "triangle") {
            mouthG.appendChild(
              el("polygon", {
                points:
                  `${m.cx - m.rx},${m.cy - m.ry} ` +
                  `${m.cx + m.rx},${m.cy - m.ry} ` +
                  `${m.cx},${m.cy + m.ry}`,
                fill: "#0a0a0a",
              })
            );
          } else {
            mouthG.appendChild(
              el("ellipse", {
                cx: m.cx,
                cy: m.cy,
                rx: m.rx,
                ry: m.ry,
                fill: "#0a0a0a",
              })
            );
          }
          inner.appendChild(mouthG);
        }

        // ---- Procedural eyes -------------------------------------------
        // Wrapped per-eye in a <g class="eye"> so blink animation can scaleY
        // them independently. Pupils are exposed via root._pupil{L,R} so face
        // detection can later move them to follow gaze.
        if (spec.eyes) {
          const e = spec.eyes;
          // Cross-eye nudge: pupils shift toward face center for a cuter
          // look. e.pupilInward is the amount in display units; sign flips
          // per eye so left pupil shifts right, right pupil shifts left.
          const inward = e.pupilInward || 0;
          const pupilDxL = e.l.cx < 0 ?  inward : -inward;
          const pupilDxR = e.r.cx < 0 ?  inward : -inward;

          // Closed-eye SVG. blink_left.svg (126×120) has its lash
          // convergence at the right side; we use it as-is for eye-l and
          // mirror it horizontally for eye-r.
          const BLINK_W_RATIO = 2.6;
          const BLINK_ASPECT = 120 / 126;

          // ---- LEFT eye ---------------------------------------------
          const eyeL = el("g", { class: "eye eye-l" });
          // Open-state circles (sclera + pupil)
          eyeL.appendChild(
            el("circle", {
              cx: e.l.cx, cy: e.l.cy, r: e.l.scleraR,
              fill: e.sclera,
              class: "eye-open-part",
            })
          );
          const pupilL = el("circle", {
            cx: e.l.cx + pupilDxL, cy: e.l.cy, r: e.l.pupilR,
            fill: e.pupil,
            class: "eye-open-part",
          });
          eyeL.appendChild(pupilL);
          // Closed-state image (blink lashes), hidden by default
          const blinkLW = e.l.scleraR * BLINK_W_RATIO;
          const blinkLH = blinkLW * BLINK_ASPECT;
          eyeL.appendChild(
            el("image", {
              href: "blink_left.svg",
              x: e.l.cx - blinkLW / 2,
              y: e.l.cy - blinkLH / 2,
              width: blinkLW,
              height: blinkLH,
              preserveAspectRatio: "xMidYMid meet",
              class: "eye-blink-img",
            })
          );
          inner.appendChild(eyeL);

          // ---- RIGHT eye --------------------------------------------
          const eyeR = el("g", { class: "eye eye-r" });
          eyeR.appendChild(
            el("circle", {
              cx: e.r.cx, cy: e.r.cy, r: e.r.scleraR,
              fill: e.sclera,
              class: "eye-open-part",
            })
          );
          const pupilR = el("circle", {
            cx: e.r.cx + pupilDxR, cy: e.r.cy, r: e.r.pupilR,
            fill: e.pupil,
            class: "eye-open-part",
          });
          eyeR.appendChild(pupilR);
          // Mirrored blink image: same SVG, flipped in place via
          // translate+scale(-1) so the lashes face the other way.
          const blinkRW = e.r.scleraR * BLINK_W_RATIO;
          const blinkRH = blinkRW * BLINK_ASPECT;
          const blinkRX = e.r.cx - blinkRW / 2;
          const blinkRY = e.r.cy - blinkRH / 2;
          eyeR.appendChild(
            el("image", {
              href: "blink_left.svg",
              x: blinkRX,
              y: blinkRY,
              width: blinkRW,
              height: blinkRH,
              preserveAspectRatio: "xMidYMid meet",
              class: "eye-blink-img",
              transform: `translate(${2 * blinkRX + blinkRW} 0) scale(-1 1)`,
            })
          );
          inner.appendChild(eyeR);

          root._pupilL = pupilL;
          root._pupilR = pupilR;
          root._eyeL = e.l;
          root._eyeR = e.r;
        }

        // Name tag (above body)
        if (name) {
          const nameEl = el("text", {
            x: 0,
            y: spec.nameY,
            "text-anchor": "middle",
            "font-family": "Patrick Hand, cursive",
            "font-size": 13,
            fill: "rgba(255,255,255,0.7)",
            "letter-spacing": 1,
          });
          nameEl.textContent = name;
          inner.appendChild(nameEl);
        }

        root.appendChild(inner);
        return root;
      }

      // ZooKeeper (the monitor) — black bunny silhouette with red outline +
      // red mouth + red nose, all from ZooKeeper.svg. We add only the EYES
      // procedurally: a soft red glow halo, a solid red eye, and a small
      // white pupil that gets translated each frame to track the target.
      function makeMonitor() {
        const root = el("g", { class: "entity zookeeper" });

        const W = 90;
        const H = 124;
        const eyeY = 12;     // moved a touch lower per design feedback
        const eyeX = 15;
        const eyeR = 8;
        const sweepPupilR  = 4;    // red pupil (sweep / "calm" mode)
        const lockedPupilR = 2.5;  // white pupil (locked / "alert" mode)
        const SHIFT_X = 1.91;      // SVG drop-shadow compensation
        const SHIFT_Y = 1.88;

        // Inner wrapper carries the up/down shake when monitor is locked
        // on a target. The OUTER root carries the SVG translate(monX monY)
        // from render(); this inner group only takes the CSS-animation
        // transform so they don't fight.
        const inner = el("g", { class: "zk-body" });

        inner.appendChild(
          el("image", {
            href: "ZooKeeper.svg",
            x: -W / 2 + SHIFT_X,
            y: -H / 2 + SHIFT_Y,
            width: W,
            height: H,
            preserveAspectRatio: "xMidYMid meet",
          })
        );

        // ---- Sweep eyes (default): white sclera + small red pupil --------
        // Looks like the other animals' eyes — soft and unthreatening.
        const sweepEyes = el("g", { class: "zk-eye-sweep" });
        sweepEyes.appendChild(el("circle", { cx: -eyeX, cy: eyeY, r: eyeR, fill: "#ffffff" }));
        sweepEyes.appendChild(el("circle", { cx:  eyeX, cy: eyeY, r: eyeR, fill: "#ffffff" }));
        const sweepPupilL = el("circle", { cx: -eyeX, cy: eyeY, r: sweepPupilR, fill: "#cf1313" });
        const sweepPupilR2 = el("circle", { cx:  eyeX, cy: eyeY, r: sweepPupilR, fill: "#cf1313" });
        sweepEyes.append(sweepPupilL, sweepPupilR2);
        inner.appendChild(sweepEyes);

        // ---- Locked eyes (alert): glowing red + small white pupil --------
        // Shown only when monitor is locked on a target (CSS toggles).
        const lockedEyes = el("g", { class: "zk-eye-locked" });
        lockedEyes.appendChild(
          el("circle", {
            cx: -eyeX, cy: eyeY, r: eyeR + 2,
            fill: "#ff2a2a", filter: "url(#redGlow)", opacity: 0.85,
          })
        );
        lockedEyes.appendChild(
          el("circle", {
            cx: eyeX, cy: eyeY, r: eyeR + 2,
            fill: "#ff2a2a", filter: "url(#redGlow)", opacity: 0.85,
          })
        );
        lockedEyes.appendChild(el("circle", { cx: -eyeX, cy: eyeY, r: eyeR, fill: "#ff2a2a" }));
        lockedEyes.appendChild(el("circle", { cx:  eyeX, cy: eyeY, r: eyeR, fill: "#ff2a2a" }));
        const lockedPupilL = el("circle", { cx: -eyeX, cy: eyeY, r: lockedPupilR, fill: "#fff" });
        const lockedPupilR_node = el("circle", { cx:  eyeX, cy: eyeY, r: lockedPupilR, fill: "#fff" });
        lockedEyes.append(lockedPupilL, lockedPupilR_node);
        inner.appendChild(lockedEyes);

        root.appendChild(inner);

        // Expose all four pupils so render() can keep them in sync with the
        // current aim angle even while the corresponding eye group is hidden
        // (so when modes flip, pupils are already in the right spot).
        root._sweepPupilL  = sweepPupilL;
        root._sweepPupilR  = sweepPupilR2;
        root._lockedPupilL = lockedPupilL;
        root._lockedPupilR = lockedPupilR_node;
        root._eyeX = eyeX;
        root._eyeY = eyeY;
        return root;
      }

      // Heart pickup — uses heart.svg
      function makeHeart() {
        const root = el("g", { class: "entity heart" });
        const inner = el("g", { class: "heart-pulse" });
        const W = 38;
        const H = 36;
        inner.appendChild(
          el("image", {
            href: "heart.svg",
            x: -W / 2,
            y: -H / 2,
            width: W,
            height: H,
            preserveAspectRatio: "xMidYMid meet",
          })
        );
        root.appendChild(inner);
        return root;
      }

      // Alarm clock pickup — uses ring.svg
      function makeAlarm() {
        const root = el("g", { class: "entity alarm" });
        const inner = el("g", { class: "alarm-shake" });
        const W = 38;
        const H = 38;
        inner.appendChild(
          el("image", {
            href: "ring.svg",
            x: -W / 2,
            y: -H / 2,
            width: W,
            height: H,
            preserveAspectRatio: "xMidYMid meet",
          })
        );
        root.appendChild(inner);
        return root;
      }

      // The flashlight is split into TWO groups that share the same world
      // transform (translate to monitor center + rotate to target):
      //
      //   - cone group  : drawn BEHIND items/monitor so it lights the scene
      //                   without covering player avatars in front of it.
      //   - torch group : drawn ABOVE the monitor body so the handle visibly
      //                   extends out of the body — looks like it's holding it.
      //
      // Local x-axis points along the beam direction; rotation around (0,0)
      // is applied in render().
      // Cone uses light range.svg.
      // The natural SVG has its APEX at (2656.64, 1878.53) — i.e. on the RIGHT
      // edge of the file, vertically centered — and the curved wide end on the
      // left. We render the image inside a small rect, then flip it
      // horizontally IN PLACE (translate(2*x + w 0) scale(-1 1) on the image
      // element) so the apex appears at the LEFT edge of the rendered rect.
      // Then we position that rect so its left edge sits at x = APEX_X (the
      // flashlight's lens position) and the cone fans rightward from there.
      const CONE_W = 260;
      const CONE_H = 340;
      const APEX_X = 64;     // cone apex x (= flashlight lens x)
      function makeCone() {
        const root = el("g", { class: "flashlight-cone" });
        root.appendChild(
          el("image", {
            href: "light range.svg",
            x: APEX_X,
            y: -CONE_H / 2,
            width: CONE_W,
            height: CONE_H,
            preserveAspectRatio: "xMidYMid meet",
            transform: `translate(${2 * APEX_X + CONE_W} 0) scale(-1 1)`,
            opacity: 0.78,
          })
        );
        return root;
      }

      // Torch uses flashlight.svg.
      // The natural SVG has the yellow LENS on the LEFT side and the round
      // handle extending to the RIGHT. We flip horizontally in place so the
      // lens sits on the RIGHT edge of the rendered rect, lining up with the
      // cone's apex at APEX_X.
      const TORCH_W = 60;
      const TORCH_H = 38;
      const TORCH_X = APEX_X - TORCH_W;  // so lens (right edge) lands at APEX_X
      function makeTorch() {
        const root = el("g", { class: "flashlight-torch" });
        root.appendChild(
          el("image", {
            href: "flashlight.svg",
            x: TORCH_X,
            y: -TORCH_H / 2,
            width: TORCH_W,
            height: TORCH_H,
            preserveAspectRatio: "xMidYMid meet",
            transform: `translate(${2 * TORCH_X + TORCH_W} 0) scale(-1 1)`,
          })
        );
        return root;
      }

      // =================================================================
      // State
      //
      // Map size = 1500 x 2100. Player spawns near the middle. Other players,
      // monitor and items are scattered across the map so the player has to
      // walk to find them.
      // =================================================================
      const cx = MAP_W / 2;
      const cy = MAP_H / 2;
      const state = {
        me: {
          x: cx,
          y: cy,
          vx: 0,
          vy: 0,
          color: "#5cc9ff",
          lives: 3,
          dead: false,
          moving: false,
          // Random animal each session for solo testing. When real peers
          // join via PartyKit they bring their own assignment.
          animal: ((arr) => arr[Math.floor(Math.random() * arr.length)])([
            "owl",
            "lion",
            "giraffe",
          ]),
        },
        lastMainSyncName: "",
        /** OB: hide local avatar, camera follows everyone. */
        spectator: false,
        /** Main map view for pure spectator: centroid | follow one id | free pan. */
        obCamMode: "centroid",
        obFollowId: null,
        obFreeTarget: { x: cx, y: cy },
        roomStarted: false,
        netSelfId: "",
        _pickupReq: typeof Set !== "undefined" ? new Set() : null,
        // Default NPCs — visible when testing solo (no PartyKit peers).
        // applyRoomPlayers() wipes this list when real peers arrive.
        others: [
          { id: "_local_p1", name: "MIA", animal: "lion",    x: cx - 240, y: cy - 280, vx: 0, vy: 0, moving: false },
          { id: "_local_p2", name: "LEO", animal: "giraffe", x: cx + 260, y: cy + 180, vx: 0, vy: 0, moving: false },
          { id: "_local_p3", name: "ZOE", animal: "owl",     x: cx - 280, y: cy + 320, vx: 0, vy: 0, moving: false },
        ],
        monitor: {
          x: cx + 130,
          y: cy - 170,
          aimAngle: Math.PI,
          mode: "sweep",    // 'sweep' | 'locked'
          sweepDir: 1,
          sweepTimer: 2,
          targetId: null,
          lockTimer: 0,
          retargetIn: 0,
          lured: null,
          patrolTarget: null,
          patrolTimer: 0,
          moving: false,
        },
        items: [
          { id: "h1", type: "heart", x: cx - 80, y: cy - 340 },
          { id: "h2", type: "heart", x: cx - 320, y: cy - 60 },
          { id: "h3", type: "heart", x: cx + 270, y: cy + 380 },
          { id: "a1", type: "alarm", x: cx + 140, y: cy + 40 },
          { id: "a2", type: "alarm", x: cx - 200, y: cy + 220 },
          { id: "a3", type: "alarm", x: cx + 320, y: cy - 260 },
        ],
        keys: { up: false, down: false, left: false, right: false },
        joyX: 0,    // virtual joystick analog input, -1..1
        joyY: 0,
        tap: null, // world coordinates
        timer: 2 * 60 + 43,
        cam: { x: 0, y: 0 },
        nodes: {
          me: null,
          monitor: null,
          cone: null,
          torch: null,
          others: new Map(),
          items: new Map(),
        },
      };

      function defaultItemsLayout() {
        const cxi = MAP_W / 2;
        const cyi = MAP_H / 2;
        return [
          { id: "h1", type: "heart", x: cxi - 80, y: cyi - 340 },
          { id: "h2", type: "heart", x: cxi - 320, y: cyi - 60 },
          { id: "h3", type: "heart", x: cxi + 270, y: cyi + 380 },
          { id: "a1", type: "alarm", x: cxi + 140, y: cyi + 40 },
          { id: "a2", type: "alarm", x: cxi - 200, y: cyi + 220 },
          { id: "a3", type: "alarm", x: cxi + 320, y: cyi - 260 },
        ];
      }
      function reseedMapItems() {
        state.items = defaultItemsLayout();
        state.nodes.items.clear();
        if (state._pickupReq) state._pickupReq.clear();
        while (layers.items.firstChild) {
          layers.items.removeChild(layers.items.firstChild);
        }
        for (const it of state.items) {
          const node = it.type === "heart" ? makeHeart() : makeAlarm();
          node.dataset.id = it.id;
          layers.items.appendChild(node);
          state.nodes.items.set(it.id, node);
        }
      }

      // =================================================================
      // Build initial scene
      // =================================================================
      function buildScene() {
        // ---- Fence around the perimeter --------------------------------
        // Individual <image> tiles referencing fenceTile.svg.
        //
        // History note: an earlier version of fenceTile.svg was a PNG with
        // an .svg extension, which iOS Safari mis-parsed (showed as
        // garbled "?" / letter tiles). It's now a real SVG, so this works
        // everywhere. We tile manually rather than via <pattern> because
        // a few iOS versions still glitch on PNG-via-pattern fills, and
        // raw <image> tiles render identically across every browser.
        //
        // The fenceTile SVG carries a baked-in feTurbulence/displacement
        // filter for the doodle "rough wood" look. That filter runs once
        // when the browser rasterizes the SVG at the displayed size — the
        // resulting bitmap is cached and reused every frame, so the noise
        // is locked in and does NOT recompute per frame. will-change on
        // .fence-layer (CSS) further nails the layer to GPU memory.
        const FH = 92;
        const FW = 140;
        // Tiles overlap by this much so the tiny transparent margin in
        // each fenceTile.svg doesn't leave a visible seam between adjacent
        // tiles. STEP is the spacing between successive tile origins.
        const TILE_OVERLAP = 18;
        const STEP = FW - TILE_OVERLAP;

        function placeFenceRow(parent, startX, endX, y) {
          for (let x = startX; x < endX; x += STEP) {
            parent.appendChild(
              el("image", {
                href: "fenceTile.svg",
                x,
                y,
                width: FW,
                height: FH,
                preserveAspectRatio: "none",
              })
            );
          }
        }

        // Top + bottom edges SKIP the FH × FH corner squares, so we don't
        // double up horizontal+vertical tiles at the corners. The vertical
        // sides own the corners.
        placeFenceRow(layers.fence, FH, MAP_W - FH, 0);
        placeFenceRow(layers.fence, FH, MAP_W - FH, MAP_H - FH);

        // Left + right sides cover full height including corners. Drawn
        // AFTER the horizontals so they sit on top at any seam.
        const leftG = el("g", { transform: `translate(${FH} 0) rotate(90)` });
        placeFenceRow(leftG, 0, MAP_H, 0);
        layers.fence.appendChild(leftG);
        const rightG = el("g", { transform: `translate(${MAP_W} 0) rotate(90)` });
        placeFenceRow(rightG, 0, MAP_H, 0);
        layers.fence.appendChild(rightG);

        // ---- Cone (drawn behind everything except background) ----------
        const cone = makeCone();
        layers.cone.appendChild(cone);
        state.nodes.cone = cone;

        // ---- Items -----------------------------------------------------
        for (const it of state.items) {
          const node = it.type === "heart" ? makeHeart() : makeAlarm();
          node.dataset.id = it.id;
          layers.items.appendChild(node);
          state.nodes.items.set(it.id, node);
        }

        // ---- Other players --------------------------------------------
        for (const p of state.others) {
          const node = makeAnimalAvatar({
            animal: p.animal,
            isMe: false,
            name: p.name,
          });
          layers.others.appendChild(node);
          state.nodes.others.set(p.id, node);
        }

        // ---- Monitor ---------------------------------------------------
        const mon = makeMonitor();
        layers.monitor.appendChild(mon);
        state.nodes.monitor = mon;

        // ---- Torch (rendered ABOVE monitor body so it looks held) -----
        const torch = makeTorch();
        layers.torch.appendChild(torch);
        state.nodes.torch = torch;

        // ---- Me --------------------------------------------------------
        const me = makeAnimalAvatar({
          animal: state.me.animal,
          isMe: true,
        });
        layers.me.appendChild(me);
        state.nodes.me = me;
      }

      // =================================================================
      // Render (set transforms each frame)
      // =================================================================
      function getSpectatorTargetXY() {
        const oth = state.others;
        if (state.obCamMode === "free") {
          return { x: state.obFreeTarget.x, y: state.obFreeTarget.y };
        }
        if (state.obCamMode === "follow" && state.obFollowId) {
          const row = oth.find(function (o) {
            return o.id === state.obFollowId;
          });
          if (row) return { x: row.x, y: row.y };
        }
        if (oth.length === 0) {
          return { x: MAP_W / 2, y: MAP_H / 2 };
        }
        var sx = 0,
          sy = 0;
        for (var i = 0; i < oth.length; i++) {
          sx += oth[i].x;
          sy += oth[i].y;
        }
        return { x: sx / oth.length, y: sy / oth.length };
      }

      function updateCamera() {
        let camX, camY;
        if (state.spectator) {
          const t = getSpectatorTargetXY();
          camX = t.x - VIEW_W / 2;
          camY = t.y - VIEW_H / 2;
        } else {
          camX = state.me.x - VIEW_W / 2;
          camY = state.me.y - VIEW_H / 2;
        }
        camX = clamp(camX, 0, Math.max(0, MAP_W - VIEW_W));
        camY = clamp(camY, 0, Math.max(0, MAP_H - VIEW_H));
        state.cam.x = camX;
        state.cam.y = camY;
        cameraGroup.setAttribute("transform", `translate(${-camX} ${-camY})`);
      }

      const alertOverlay = document.getElementById("alertOverlay");

      // ---- Sound manager -------------------------------------------------
      // One Audio object per effect, replayed by resetting currentTime to 0.
      // Browsers may block autoplay before any user interaction, but every
      // SFX trigger here happens after the player has moved / clicked, so
      // by then audio is unlocked. We swallow the play() promise rejection
      // silently to avoid console noise.
      const SOUND_FILES = {
        alarm:      "../resource/microsammy-clock-alarm-8761.mp3",
        healthGain: "../resource/addHealth.wav",
        healthLoss: "../resource/minusHealth.wav",
      };
      const sounds = {};
      for (const [name, src] of Object.entries(SOUND_FILES)) {
        const a = new Audio(src);
        a.preload = "auto";
        a.volume = 0.7;
        sounds[name] = a;
      }
      function playSound(name) {
        const s = sounds[name];
        if (!s) return;
        try {
          s.currentTime = 0;
          const p = s.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        } catch (_) {}
      }

      // ---- Background music (loop) -----------------------------------
      // Starts when the room transitions to `started` (player has just been
      // brought into the live scene). Loops until the game ends or the
      // page unloads. Volume kept low so SFX + Monitor PA stay readable.
      const bgm = new Audio("../resource/midnight-gate-rules.mp3");
      bgm.loop = true;
      bgm.preload = "auto";
      bgm.volume = 0.35;
      bgm.setAttribute("playsinline", "");
      bgm.setAttribute("webkit-playsinline", "");
      let bgmStarted = false;
      let bgmGestureBound = false;
      function startBgm() {
        if (bgmStarted) return;
        try {
          const p = bgm.play();
          if (p && typeof p.then === "function") {
            p.then(() => {
              bgmStarted = true;
            }).catch(() => {
              // Mobile autoplay can reject the first attempt — retry on the next
              // user gesture inside the iframe (any tap/key counts).
              bindBgmUnlockOnce();
            });
          } else {
            bgmStarted = true;
          }
        } catch (_) {
          bindBgmUnlockOnce();
        }
      }
      function bindBgmUnlockOnce() {
        if (bgmGestureBound) return;
        bgmGestureBound = true;
        const evts = ["pointerdown", "touchstart", "click", "keydown"];
        const fire = () => {
          for (const e of evts) window.removeEventListener(e, fire);
          bgmGestureBound = false;
          startBgm();
        };
        for (const e of evts) window.addEventListener(e, fire, { passive: true, once: true });
      }
      function stopBgm() {
        try { bgm.pause(); } catch (_) { /* ignore */ }
        bgmStarted = false;
      }

      // Alarm: play a short window of the file (it's longer than we need)
      // and ease the volume to 0 in the final stretch so it doesn't just
      // cut off abruptly.
      function playAlarmSound() {
        const s = sounds.alarm;
        if (!s) return;
        // Cancel any fade timer left over from a previous trigger so the
        // new playback isn't immediately silenced.
        if (s._fadeTimer) {
          clearInterval(s._fadeTimer);
          s._fadeTimer = null;
        }
        const startVol = 0.7;
        try {
          s.currentTime = 0;
          s.volume = startVol;
          const p = s.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        } catch (_) {
          return;
        }
        const TOTAL_MS = 1400;   // overall ring duration
        const FADE_MS  = 700;    // last N ms fade volume linearly to 0
        const TICK_MS  = 40;
        const FADE_START = TOTAL_MS - FADE_MS;
        let elapsed = 0;
        s._fadeTimer = setInterval(() => {
          elapsed += TICK_MS;
          if (elapsed >= TOTAL_MS) {
            clearInterval(s._fadeTimer);
            s._fadeTimer = null;
            try { s.pause(); s.currentTime = 0; } catch (_) {}
            s.volume = startVol; // restore for next trigger
            return;
          }
          if (elapsed >= FADE_START) {
            const t = (elapsed - FADE_START) / FADE_MS;
            s.volume = startVol * Math.max(0, 1 - t);
          }
        }, TICK_MS);
      }

      function render() {
        updateCamera();

        // Red alert vignette: pulses while ANY rule challenge is in progress.
        if (alertOverlay) {
          const inAlert =
            (challenge.active && !challenge.completed) ||
            (universalChallenge.active && !universalChallenge.completed);
          alertOverlay.classList.toggle("active", inAlert);
        }

        // items
        for (const it of state.items) {
          const node = state.nodes.items.get(it.id);
          if (!node) continue;
          node.setAttribute("transform", `translate(${it.x} ${it.y})`);
        }
        // others
        for (const p of state.others) {
          const node = state.nodes.others.get(p.id);
          if (!node) continue;
          node.setAttribute("transform", `translate(${p.x} ${p.y})`);
          const ak =
            p.animKey != null && p.animKey !== ""
              ? p.animKey
              : p.moving
                ? "walk"
                : "idle";
          node.setAttribute("data-anim", ak);
          node.classList.toggle("walking", p.moving || ak === "walk");
        }
        // monitor body stays upright (no rotation) — only flashlight rotates.
        state.nodes.monitor.setAttribute(
          "transform",
          `translate(${state.monitor.x} ${state.monitor.y})`
        );
        state.nodes.monitor.classList.toggle("walking", state.monitor.moving);
        // me (not in pure spectator / OB)
        if (!state.spectator && state.nodes.me) {
          state.nodes.me.setAttribute(
            "transform",
            `translate(${state.me.x} ${state.me.y})`
          );
          const mak = state.me.moving ? "walk" : "idle";
          state.nodes.me.setAttribute("data-anim", mak);
          state.nodes.me.classList.toggle("walking", state.me.moving);
        }

        // Cone + torch share the same world transform: they rotate around
        // the monitor's center and always point along the aim angle.
        const angDeg = (state.monitor.aimAngle * 180) / Math.PI;
        const tf = `translate(${state.monitor.x} ${state.monitor.y}) rotate(${angDeg})`;
        if (state.nodes.cone) state.nodes.cone.setAttribute("transform", tf);
        if (state.nodes.torch) state.nodes.torch.setAttribute("transform", tf);

        // Pupils: shift inside the eye toward the current target. Update
        // BOTH the sweep pupils (red on white) and the locked pupils
        // (white on red) so when the monitor flips between modes the
        // visible pupil is already in the right spot.
        const ux = Math.cos(state.monitor.aimAngle);
        const uy = Math.sin(state.monitor.aimAngle);
        const PUPIL_OFFSET = 2.6;
        const m = state.nodes.monitor;
        if (m) {
          const lcx = -m._eyeX + ux * PUPIL_OFFSET;
          const rcx =  m._eyeX + ux * PUPIL_OFFSET;
          const cy  =  m._eyeY + uy * PUPIL_OFFSET;
          for (const p of [m._sweepPupilL, m._lockedPupilL]) {
            if (p) { p.setAttribute("cx", lcx); p.setAttribute("cy", cy); }
          }
          for (const p of [m._sweepPupilR, m._lockedPupilR]) {
            if (p) { p.setAttribute("cx", rcx); p.setAttribute("cy", cy); }
          }
          // Toggle "locked" appearance (red glowing eyes + body shake)
          // based on the monitor's current AI mode.
          m.classList.toggle("locked", state.monitor.mode === "locked");
        }
      }

      // =================================================================
      // Update (movement / monitor AI)
      // =================================================================
      const SPEED = 110; // units per second
      const MON_SPEED = 110;
      // Fence thickness — entities must stay inside this border.
      const BORDER = 110;

      function updatePlayer(dt) {
        if (state.spectator) {
          // dead spectator: WASD / joystick pans the free camera
          if (state.me.dead && state.obCamMode === "free") {
            let dx = 0, dy = 0;
            const joyMag = Math.hypot(state.joyX, state.joyY);
            if (joyMag > 0.05) { dx = state.joyX; dy = state.joyY; }
            else {
              if (state.keys.up)    dy -= 1;
              if (state.keys.down)  dy += 1;
              if (state.keys.left)  dx -= 1;
              if (state.keys.right) dx += 1;
              const len = Math.hypot(dx, dy);
              if (len > 1) { dx /= len; dy /= len; }
            }
            if (dx || dy) {
              state.obFreeTarget.x = clamp(state.obFreeTarget.x + dx * SPEED * dt, BORDER, MAP_W - BORDER);
              state.obFreeTarget.y = clamp(state.obFreeTarget.y + dy * SPEED * dt, BORDER, MAP_H - BORDER);
            }
          }
          return;
        }
        const me = state.me;
        let dx = 0,
          dy = 0;

        // 1) Virtual joystick (touch). Analog input — magnitude controls
        //    how fast we move, so a small push = slow walk.
        const joyMag = Math.hypot(state.joyX, state.joyY);
        if (joyMag > 0.05) {
          dx = state.joyX;
          dy = state.joyY;
          state.tap = null;
        } else {
          // 2) Keyboard (desktop)
          if (state.keys.up) dy -= 1;
          if (state.keys.down) dy += 1;
          if (state.keys.left) dx -= 1;
          if (state.keys.right) dx += 1;

          // 3) Tap-to-move (fallback for desktop click)
          if (!dx && !dy && state.tap) {
            const ddx = state.tap.x - me.x;
            const ddy = state.tap.y - me.y;
            const d = Math.hypot(ddx, ddy);
            if (d < 4) {
              state.tap = null;
            } else {
              dx = ddx / d;
              dy = ddy / d;
            }
          } else if (dx || dy) {
            state.tap = null;
          }
        }

        // Normalize to unit length so diagonal isn't faster than cardinal.
        // Joystick analog already gives <=1, so we only normalize when
        // magnitude exceeds 1.
        const len = Math.hypot(dx, dy);
        if (len > 1) {
          dx /= len;
          dy /= len;
        }
        me.moving = dx !== 0 || dy !== 0;
        if (me.moving) {
          me.x = clamp(me.x + dx * SPEED * dt, BORDER, MAP_W - BORDER);
          me.y = clamp(me.y + dy * SPEED * dt, BORDER, MAP_H - BORDER);
        }

        // Pickup: solo / pre-start = local; after room started = server authority
        for (let i = state.items.length - 1; i >= 0; i--) {
          const it = state.items[i];
          if (Math.hypot(it.x - me.x, it.y - me.y) < 32) {
            if (state.roomStarted) {
              tryRequestItemPickup(it);
            } else {
              pickupLocal(it, i);
            }
          }
        }
      }

      function stripItemNode(it, idx) {
        const node = state.nodes.items.get(it.id);
        if (node) {
          const inner = node.firstElementChild;
          if (inner) {
            inner.classList.remove("heart-pulse", "alarm-shake");
            inner.classList.add("item-fade");
          }
          setTimeout(() => node.remove(), 460);
        }
        state.nodes.items.delete(it.id);
        state.items.splice(idx, 1);
        if (state._pickupReq) state._pickupReq.delete(it.id);
      }

      function tryRequestItemPickup(it) {
        if (!state._pickupReq) return;
        if (state._pickupReq.has(it.id)) return;
        if (it.type === "heart" && state.me.lives >= 3) return;
        state._pickupReq.add(it.id);
        try {
          if (window !== window.top) {
            window.parent.postMessage(
              {
                type: "NZ_OUT_ITEM_PICKUP",
                source: "nocturne-zoo",
                payload: { itemId: it.id },
              },
              "*"
            );
          } else {
            state._pickupReq.delete(it.id);
          }
        } catch (err) {
          state._pickupReq.delete(it.id);
        }
      }

      function pickupLocal(it, idx) {
        if (it.type === "heart") {
          if (state.me.lives >= 3) return;
          state.me.lives += 1;
          renderLives();
          flashHeartGain();
          playSound("healthGain");
        } else if (it.type === "alarm") {
          addLog(t("logAlarmRing"));
          playAlarmSound();
          if (challenge.active) endChallenge(false);
          state.monitor.mode = "sweep";
          state.monitor.targetId = null;
          state.monitor.lured = { x: it.x, y: it.y };
          state.monitor.retargetIn = 4;
        }

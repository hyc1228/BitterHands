        stripItemNode(it, idx);
      }

      function applyItemTakenEvent(e) {
        if (!e || !e.itemId) return;
        const idx = state.items.findIndex((x) => x.id === e.itemId);
        if (idx < 0) return;
        const it = state.items[idx];
        if (e.itemType === "heart" && e.byPlayerId === state.netSelfId) {
          if (state.me.lives < 3) {
            state.me.lives += 1;
            renderLives();
            flashHeartGain();
            playSound("healthGain");
          }
        } else if (e.itemType === "alarm") {
          addLog(t("logAlarmRing"));
          playAlarmSound();
          if (challenge.active) endChallenge(false);
          state.monitor.mode = "sweep";
          state.monitor.targetId = null;
          if (e.alarmLured) {
            state.monitor.lured = { x: e.alarmLured.x, y: e.alarmLured.y };
          } else {
            state.monitor.lured = { x: it.x, y: it.y };
          }
          state.monitor.retargetIn = 4;
        }
        stripItemNode(it, idx);
      }

      function removeItemByIdNoEffects(id) {
        const idx = state.items.findIndex((x) => x.id === id);
        if (idx < 0) return;
        stripItemNode(state.items[idx], idx);
      }

      function applyItemInbox(evts) {
        if (!Array.isArray(evts)) return;
        for (var ii = 0; ii < evts.length; ii++) {
          var ev = evts[ii];
          if (!ev || !ev.kind) continue;
          if (ev.kind === "taken") {
            applyItemTakenEvent(ev.data);
          } else if (ev.kind === "resync" && ev.removedItemIds) {
            for (var j = 0; j < ev.removedItemIds.length; j++) {
              removeItemByIdNoEffects(ev.removedItemIds[j]);
            }
          }
        }
      }

      function flashHeartGain() {
        const root = document.getElementById("lives");
        // Flash the rightmost filled heart
        const filled = [...root.children].filter(
          (c) => !c.classList.contains("heart-off")
        );
        const target = filled[filled.length - 1];
        if (!target) return;
        target.classList.remove("heart-gain");
        // force reflow to restart animation
        void target.offsetWidth;
        target.classList.add("heart-gain");
      }

      function updateOthers(dt) {
        // gentle wandering for visual life (within map bounds)
        for (const p of state.others) {
          if (p.netRemote) continue;
          if (Math.random() < 0.012) {
            p.vx = (Math.random() - 0.5) * 1.6;
            p.vy = (Math.random() - 0.5) * 1.6;
            p.moveTimer = 0.6 + Math.random() * 1.4;
          }
          if (p.moveTimer && p.moveTimer > 0) {
            p.x = clamp(p.x + p.vx * 36 * dt, BORDER, MAP_W - BORDER);
            p.y = clamp(p.y + p.vy * 36 * dt, BORDER, MAP_H - BORDER);
            p.moveTimer -= dt;
            p.moving = true;
          } else {
            p.moving = false;
          }
        }
      }

      // Returns true if (playerX, playerY) falls inside the flashlight cone.
      // Cone half-angle ~22 deg, max reach 300 map units.
      function isInCone(monX, monY, aimAngle, playerX, playerY) {
        const dx   = playerX - monX;
        const dy   = playerY - monY;
        const dist = Math.hypot(dx, dy);
        if (dist < 50 || dist > 300) return false;
        return Math.abs(wrapAngle(Math.atan2(dy, dx) - aimAngle)) < 0.50;
      }

      function updateMonitor(dt) {
        const m = state.monitor;

        // --- Alarm lure: point toward lure position, then resume sweep ---
        if (m.lured) {
          const desired = Math.atan2(m.lured.y - m.y, m.lured.x - m.x);
          m.aimAngle += clamp(wrapAngle(desired - m.aimAngle), -4 * dt, 4 * dt);
          m.retargetIn -= dt;
          if (m.retargetIn <= 0) {
            m.lured = null;
            m.mode  = "sweep";
            m.sweepTimer = 1;
          }
          return;
        }

        if (m.mode === "sweep") {
          // Rotate flashlight back and forth
          m.aimAngle  += m.sweepDir * 1.0 * dt;
          m.sweepTimer -= dt;
          if (m.sweepTimer <= 0) {
            m.sweepTimer = 2 + Math.random() * 3;
            if (Math.random() < 0.6) m.sweepDir *= -1;
          }
          // Patrol: walk toward a random waypoint, pick a new one when close
          if (!m.patrolTarget || m.patrolTimer <= 0 ||
              Math.hypot(m.patrolTarget.x - m.x, m.patrolTarget.y - m.y) < 60) {
            m.patrolTimer = 3 + Math.random() * 5;
            m.patrolTarget = {
              x: BORDER + Math.random() * (MAP_W - 2 * BORDER),
              y: BORDER + Math.random() * (MAP_H - 2 * BORDER),
            };
          }
          m.patrolTimer -= dt;
          const pdx = m.patrolTarget.x - m.x;
          const pdy = m.patrolTarget.y - m.y;
          const pd  = Math.hypot(pdx, pdy);
          m.moving  = pd > 10;
          if (m.moving) {
            m.x = clamp(m.x + (pdx / pd) * MON_SPEED * 0.55 * dt, BORDER, MAP_W - BORDER);
            m.y = clamp(m.y + (pdy / pd) * MON_SPEED * 0.55 * dt, BORDER, MAP_H - BORDER);
          }

          // Check which players are inside the cone
          const allPlayers = [
            { id: "me", x: state.me.x, y: state.me.y },
            ...state.others.map((p) => ({ id: p.id, x: p.x, y: p.y })),
          ];
          const inCone = allPlayers.filter((p) =>
            isInCone(m.x, m.y, m.aimAngle, p.x, p.y)
          );
          // Don't re-target "me" while challenge is on cooldown
          const eligible = inCone.filter(
            (p) => !(p.id === "me" && challenge.cooldown > 0)
          );
          if (eligible.length > 0) {
            const pick = eligible[Math.floor(Math.random() * eligible.length)];
            m.targetId  = pick.id;
            m.mode      = "locked";
            m.lockTimer = challenge.MAX_TIME; // lock lasts as long as the challenge window
            if (pick.id === "me") {
              startChallenge();
            } else {
              const name = state.others.find((p) => p.id === pick.id)?.name ?? pick.id;
              addLog(t("logSpotLight", name));
            }
          }
        } else if (m.mode === "locked") {
          // Count down lock duration; release when expired
          m.lockTimer -= dt;
          if (m.lockTimer <= 0) {
            if (challenge.active && m.targetId === "me") endChallenge(false);
            m.mode       = "sweep";
            m.targetId   = null;
            m.sweepTimer = 1;
            return;
          }
          // Track locked target until challenge resolves
          const target =
            m.targetId === "me"
              ? state.me
              : state.others.find((p) => p.id === m.targetId);
          if (!target) { m.mode = "sweep"; m.sweepTimer = 1; return; }

          const desired = Math.atan2(target.y - m.y, target.x - m.x);
          m.aimAngle += clamp(wrapAngle(desired - m.aimAngle), -8 * dt, 8 * dt);

          // Stalker behaviour: keep a comfortable gap. Full speed when
          // far, smoothly slow down as we approach the comfort distance
          // so we don't bump into the player, then hold position. The
          // flashlight cone reaches ~260 px so 150 still lights them up.
          const dx   = target.x - m.x;
          const dy   = target.y - m.y;
          const dist = Math.hypot(dx, dy);
          const COMFORT  = 150;  // closest the monitor will get
          const RAMP     = 70;   // ease-in band above COMFORT
          m.moving = dist > COMFORT;
          if (m.moving) {
            const speedFactor = Math.min(1, (dist - COMFORT) / RAMP);
            m.x += (dx / dist) * MON_SPEED * speedFactor * dt;
            m.y += (dy / dist) * MON_SPEED * speedFactor * dt;
          }
          m.x = clamp(m.x, BORDER, MAP_W - BORDER);
          m.y = clamp(m.y, BORDER, MAP_H - BORDER);
        }
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }
      function wrapAngle(a) {
        while (a > Math.PI) a -= 2 * Math.PI;
        while (a < -Math.PI) a += 2 * Math.PI;
        return a;
      }

      // =================================================================
      // HUD
      // =================================================================
      function renderLives() {
        const root = document.getElementById("lives");
        // OB / spectator: the player has no character → no hearts. Same for dead players.
        if (state.spectator || state.me.dead) { root.innerHTML = ""; return; }
        root.innerHTML = "";
        for (let i = 0; i < 3; i++) {
          const sp = document.createElement("span");
          sp.textContent = "♥";
          if (i >= state.me.lives) sp.className = "heart-off";
          root.appendChild(sp);
        }
      }

      function handleDeath() {
        if (state.me.dead) return;
        state.me.dead = true;
        state.spectator = true;
        // switch to free-pan camera starting at player's last position
        state.obCamMode = "free";
        state.obFreeTarget.x = state.me.x;
        state.obFreeTarget.y = state.me.y;
        if (state.nodes.me) state.nodes.me.setAttribute("visibility", "hidden");
        challenge.active = false;
        challenge.completed = false;
        chalOverlay.className = "action-bar action-bar-top";
        universalChallenge.active = false;
        universalChallenge.completed = false;
        uChalOverlay.className = "action-bar action-bar-bottom";
        renderLives();
        addLog(t("logDeath"));
        // Flash the full overlay for 2.5s, then fade out and show small badge
        const overlay = document.getElementById("deathOverlay");
        const badge   = document.getElementById("spectatorBadge");
        overlay.className = "active";
        setTimeout(() => {
          overlay.classList.add("fading");
          overlay.addEventListener("transitionend", () => {
            overlay.className = "";
            badge.className   = "active";
          }, { once: true });
        }, 2500);
      }

      function renderTimer() {
        const m = Math.floor(state.timer / 60);
        const s = state.timer % 60;
        document.getElementById("timer").textContent =
          String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
      }

      // =================================================================
      // Zoo keeper log
      // =================================================================
      // Seed log entries pulled from STRINGS so they switch language.
      const logList = document.getElementById("logList");
      const logBox = document.querySelector(".log");
      function fmtNow() {
        const elapsed = 4 * 60 - state.timer;
        const m = Math.floor(Math.max(0, elapsed) / 60);
        const s = Math.max(0, elapsed) % 60;
        return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
      }
      function addLog(message, ts, opts = {}) {
        const li = document.createElement("li");
        li.className = "fade-in";
        if (opts.rule) li.classList.add("rule");
        const t = document.createElement("span");
        t.className = "ts";
        t.textContent = ts || fmtNow();
        const m = document.createElement("span");
        m.className = "msg";
        m.textContent = message;
        li.append(t, m);
        logList.prepend(li);
        // Auto-scroll to top so newest is visible
        if (logBox) logBox.scrollTop = 0;
      }
      function seedLog() {
        const seeds = tArr("seedLogs");
        // Append in reverse so the freshest sits on top.
        for (let i = seeds.length - 1; i >= 0; i--) {
          const e = seeds[i];
          addLog(e.m, e.t, { rule: e.rule });
        }
      }

      // Random AI commentary (placeholder for Claude output) — pulled from
      // the localized flavor[] each tick so language flips immediately.
      function tickFlavor() {
        if (Math.random() < 0.55) {
          const lines = tArr("flavor");
          if (lines.length > 0) {
            addLog(lines[Math.floor(Math.random() * lines.length)]);
          }
        }
      }
      setInterval(tickFlavor, 6500);

      // Periodic new-rule announcements (red, distinct from flavor)
      const UNIVERSAL_RULES = [
        { id: "u_blink",    icon: "👁️", labelKey: "universalBlinkLabel", logKey: "logUniBlinkAnnounce" },
        { id: "u_mouth",    icon: "😮", labelKey: "universalMouthLabel", logKey: "logUniMouthAnnounce" },
        { id: "u_headmove", icon: "🙂", labelKey: "universalHeadLabel",  logKey: "logUniHeadAnnounce"  },
      ];
      function triggerUniversalRule() {
        if (universalChallenge.active || state.me.dead) return;
        const rule = UNIVERSAL_RULES[Math.floor(Math.random() * UNIVERSAL_RULES.length)];
        addLog(t(rule.logKey), null, { rule: true });
        startUniversalChallenge(rule);
      }
      setInterval(triggerUniversalRule, 15000);

      // =================================================================
      // Input
      // =================================================================
      const KEYMAP = {
        w: "up",
        ArrowUp: "up",
        s: "down",
        ArrowDown: "down",
        a: "left",
        ArrowLeft: "left",
        d: "right",
        ArrowRight: "right",
      };
      window.addEventListener("keydown", (e) => {
        const k = KEYMAP[e.key];
        if (k) {
          state.keys[k] = true;
          e.preventDefault();
        }
      });
      window.addEventListener("keyup", (e) => {
        const k = KEYMAP[e.key];
        if (k) state.keys[k] = false;
      });

      // ---------- Virtual joystick (touch) ----------
      // Drag the inner handle within the outer ring; magnitude maps to
      // analog walk speed (0..1). Releases zero out velocity instantly.
      const joystickEl = document.getElementById("joystick");
      const joystickHandleEl = document.getElementById("joystickHandle");
      const JOY_LIMIT = 35; // max handle offset in px
      let joyPointerId = null;
      function joyMove(ev) {
        if (ev.pointerId !== joyPointerId) return;
        const r = joystickEl.getBoundingClientRect();
        const cxp = r.left + r.width / 2;
        const cyp = r.top + r.height / 2;
        let hx = ev.clientX - cxp;
        let hy = ev.clientY - cyp;
        const d = Math.hypot(hx, hy);
        if (d > JOY_LIMIT) {
          hx = (hx / d) * JOY_LIMIT;
          hy = (hy / d) * JOY_LIMIT;
        }
        joystickHandleEl.style.transform = `translate(${hx}px, ${hy}px)`;
        state.joyX = hx / JOY_LIMIT;
        state.joyY = hy / JOY_LIMIT;
      }
      function joyEnd(ev) {
        if (ev.pointerId !== joyPointerId) return;
        try {
          joystickEl.releasePointerCapture(ev.pointerId);
        } catch (e) {}
        joyPointerId = null;
        joystickEl.classList.remove("active");
        joystickHandleEl.style.transform = "translate(0px, 0px)";
        state.joyX = 0;
        state.joyY = 0;
      }
      if (joystickEl && joystickHandleEl) {
        joystickEl.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          joyPointerId = ev.pointerId;
          joystickEl.setPointerCapture(ev.pointerId);
          joystickEl.classList.add("active");
          joyMove(ev);
        });
        joystickEl.addEventListener("pointermove", joyMove);
        joystickEl.addEventListener("pointerup", joyEnd);
        joystickEl.addEventListener("pointercancel", joyEnd);
      }

      // Tap-to-move: convert pointer position → SVG viewport → world coords
      // (world = viewport + camera offset).
      function svgPointFromEvent(ev) {
        const rect = SVG.getBoundingClientRect();
        const cx =
          ev.clientX != null
            ? ev.clientX
            : ev.touches && ev.touches[0]
            ? ev.touches[0].clientX
            : 0;
        const cy =
          ev.clientY != null
            ? ev.clientY
            : ev.touches && ev.touches[0]
            ? ev.touches[0].clientY
            : 0;
        // preserveAspectRatio="xMidYMid meet" — replicate that mapping.
        const sx = rect.width / VIEW_W;
        const sy = rect.height / VIEW_H;
        const scale = Math.min(sx, sy);
        const offX = (rect.width - VIEW_W * scale) / 2;
        const offY = (rect.height - VIEW_H * scale) / 2;
        return {
          x: (cx - rect.left - offX) / scale,
          y: (cy - rect.top - offY) / scale,
        };
      }
      var obDrag = null;
      function svgClientScale() {
        const rect = SVG.getBoundingClientRect();
        const sx = rect.width / VIEW_W;
        const sy = rect.height / VIEW_H;
        return Math.min(sx, sy);
      }
      function obPointerDown(ev) {
        if (!state.spectator || state.obCamMode !== "free") return false;
        const p = svgPointFromEvent(ev);
        if (p.x < 0 || p.x > VIEW_W || p.y < 0 || p.y > VIEW_H) return false;
        obDrag = {
          lastX: ev.clientX,
          lastY: ev.clientY,
          scale: svgClientScale(),
        };
        try {
          SVG.setPointerCapture(ev.pointerId);
        } catch (e) {}
        ev.preventDefault();
        return true;
      }
      function obPointerMove(ev) {
        if (!obDrag) return;
        const dcx = ev.clientX - obDrag.lastX;
        const dcy = ev.clientY - obDrag.lastY;
        const sc = obDrag.scale || svgClientScale();
        state.obFreeTarget.x = clamp(
          state.obFreeTarget.x - dcx / sc,
          BORDER,
          MAP_W - BORDER
        );
        state.obFreeTarget.y = clamp(
          state.obFreeTarget.y - dcy / sc,
          BORDER,
          MAP_H - BORDER
        );
        obDrag.lastX = ev.clientX;
        obDrag.lastY = ev.clientY;
      }
      function obPointerUp(ev) {
        if (obDrag) {
          obDrag = null;
          try {
            SVG.releasePointerCapture(ev.pointerId);
          } catch (e) {}
        }
      }
      SVG.addEventListener("pointerdown", (ev) => {
        if (obPointerDown(ev)) return;
        if (state.spectator) return;
        const p = svgPointFromEvent(ev);
        if (p.x < 0 || p.x > VIEW_W || p.y < 0 || p.y > VIEW_H) return;
        // Translate viewport -> world by adding the current camera offset.
        state.tap = {
          x: p.x + state.cam.x,
          y: p.y + state.cam.y,
        };
      });
      SVG.addEventListener("pointermove", obPointerMove);
      SVG.addEventListener("pointerup", obPointerUp);
      SVG.addEventListener("pointercancel", obPointerUp);

      // =================================================================
      // Main loop
      // =================================================================
      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        updatePlayer(dt);
        updateOthers(dt);
        updateMonitor(dt);
        updateChallenge(dt);
        updateUniversalChallenge(dt);
        render();
        flushOutMainScene();
        requestAnimationFrame(frame);
      }
      var outFrameTick = 0;
      function flushOutMainScene() {
        if (window === window.top) return;
        if (state.spectator || !state.roomStarted) return;
        outFrameTick += 1;
        if (outFrameTick % 2) return;
        if (!state.nodes.me) return;
        const me = state.me;
        try {
          window.parent.postMessage(
            {
              type: "NZ_OUT_MAIN_SCENE",
              source: "nocturne-zoo",
              payload: {
                x: me.x,
                y: me.y,
                vx: 0,
                vy: 0,
                moving: !!me.moving,
                animKey: me.moving ? "walk" : "idle",
                facing: 0,
                fx: null
              }
            },
            "*"
          );
        } catch (e) {}
      }

      // Timer ticking
      setInterval(() => {
        if (state.timer > 0) {
          state.timer -= 1;
          renderTimer();
          if (state.timer === 0) {
            // Game just ended — stop the looping BGM. Per-event Monitor PA + SFX
            // can still play (they're separate audio elements).
            stopBgm();
          }
        }
      }, 1000);

      // Random VHS glitch — fires every 4–9s, briefly flashes a horizontal slice.
      function scheduleGlitch() {
        const next = 4000 + Math.random() * 5000;
        setTimeout(() => {
          const band = document.getElementById("glitchBand");
          if (band) {
            band.classList.remove("on");
            void band.offsetWidth; // restart animation
            band.classList.add("on");
            setTimeout(() => band.classList.remove("on"), 240);
          }
          scheduleGlitch();
        }, next);
      }
      scheduleGlitch();

      // =================================================================
      // Action Challenge System + FaceMesh Detection
      // =================================================================

      const chalOverlay  = document.getElementById("challengeOverlay");
      const chalIcon     = document.getElementById("chal-icon");
      const chalLabel    = document.getElementById("chal-label");
      const chalStatus   = document.getElementById("chal-status");
      const chalBarFill  = document.getElementById("chal-bar-fill");
      const webcamVideo  = document.getElementById("webcamVideo");
      const webcamCanvas = document.getElementById("webcam-canvas");

      // Challenge state
      const challenge = {
        active: false,
        action: null,       // 'blink' | 'mouth' | 'shake'
        completed: false,
        timeLeft: 0,
        cooldown: 0,
        MAX_TIME: 8,
        shake: { dir: 0, changes: 0 },
        mouth: { openFrames: 0 },
        blink: { since: null },
      };

      // Animal → action map. Labels resolved via t() at startChallenge time
      // so a mid-game language switch picks up the new copy.
      const ACTION_INFO = {
        blink: { icon: "👁️", labelKey: "actionBlinkLabel" },
        mouth: { icon: "😮", labelKey: "actionMouthLabel" },
        shake: { icon: "🙂", labelKey: "actionShakeLabel" },
      };

      function animalToAction(animal) {
        if (animal === "owl")     return "blink";
        if (animal === "lion")    return "mouth";
        if (animal === "giraffe") return "shake";
        return "shake";
      }

      function startChallenge() {
        // OB / pure spectator has no avatar — the challenge bar is meaningless and confusing.
        if (state.spectator) return;
        if (challenge.cooldown > 0 || state.me.dead) return;
        challenge.active    = true;
        challenge.completed = false;
        challenge.action    = animalToAction(state.me.animal);
        challenge.timeLeft  = challenge.MAX_TIME;
        challenge.shake     = { dir: 0, changes: 0 };
        challenge.mouth     = { openFrames: 0 };
        challenge.blink     = { since: null };
        const info = ACTION_INFO[challenge.action];
        chalIcon.textContent   = info.icon;
        chalLabel.textContent  = t(info.labelKey);
        chalStatus.textContent = t("statusGoNow");
        chalBarFill.style.width = "100%";
        chalOverlay.className  = "action-bar action-bar-top active";
        addLog(t("logMonitorAlert"), null, { rule: true });
      }

      function reportViolation() {
        try {
          if (window !== window.top) {
            window.parent.postMessage(
              { type: "NZ_OUT_VIOLATION", source: "nocturne-zoo", payload: {} },
              "*"
            );
          }
        } catch (e) {}
      }

      function endChallenge(success) {
        if (!challenge.active) return;
        challenge.active   = false;
        challenge.cooldown = 3;
        // Release monitor back to sweep mode
        if (state.monitor.targetId === "me") {
          state.monitor.mode       = "sweep";
          state.monitor.targetId   = null;
          state.monitor.sweepTimer = 1;
        }
        if (success) {
          chalStatus.textContent = t("statusSuccess");
          chalBarFill.style.width = "100%"; // green snaps full
          chalOverlay.className  = "action-bar action-bar-top active success";
          addLog(t("logRuleDone"));
        } else {
          chalStatus.textContent = t("statusFail");
          chalOverlay.className  = "action-bar action-bar-top active fail";
          reportViolation();
          state.me.lives = Math.max(0, state.me.lives - 1);
          renderLives();
          playSound("healthLoss");
          addLog(t("logRuleFail"), null, { rule: true });
          if (state.me.lives <= 0) { setTimeout(handleDeath, 1400); }
        }
        setTimeout(() => {
          chalOverlay.className = "action-bar action-bar-top";
        }, 1400);
      }

      function updateChallenge(dt) {
        if (challenge.cooldown > 0) challenge.cooldown -= dt;
        if (!challenge.active) return;
        challenge.timeLeft -= dt;
        chalBarFill.style.width =
          Math.max(0, (challenge.timeLeft / challenge.MAX_TIME) * 100) + "%";
        if (challenge.timeLeft <= 0) endChallenge(false);
      }

      // ---------- FaceMesh landmark helpers ----------
      const L_EYE_IDX    = [33, 160, 158, 133, 153, 144];
      const R_EYE_IDX    = [362, 385, 387, 263, 373, 380];
      const EAR_CLOSED   = 0.25;
      const MAR_OPEN     = 0.40;
      const SHAKE_THRESH = 0.08;
      const BLINK_MS     = 3000;

      function lmDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

      function earVal(lm, idx) {
        const [p1, p2, p3, p4, p5, p6] = idx.map((i) => lm[i]);
        return (lmDist(p2, p6) + lmDist(p3, p5)) / (2 * lmDist(p1, p4));
      }

      // ============================================================
      // BLINK / EYE-OPEN DETECTION TUNING
      // ============================================================
      // All knobs in one place. If detection feels wrong, change a number
      // here, refresh, retest. Each knob's effect is described inline.
      //
      // The system has 4 stages:
      //   1. Each frame compute raw EAR (eye aspect ratio) for L and R.
      //   2. Smooth (moving avg) to kill MediaPipe single-frame jitter.
      //   3. Feed the smoothed avg into a per-user "open eye" baseline
      //      (rolling 80th percentile).
      //   4. Eye is "closed" when smoothed EAR < baseline × closedRatio.
      const BLINK_TUNING = {
        // --- Smoothing -----------------------------------------------
        // Bigger = less jitter but more lag. 2 = one extra frame of lag,
        // basically imperceptible. Try 3 if blinks still flicker on/off.
        smoothWindow: 2,

        // --- Baseline ("what does this user's open eye look like") ---
        // Rolling buffer of recent EAR samples used to learn the user's
        // own open-eye reference. ~30 fps × 1.5 s ≈ 45 samples.
        baselineMaxSamples: 45,
        // Samples below this are discarded so real blinks don't drag the
        // baseline down. Lower it (e.g. 0.10) only if a user's open-eye
        // EAR is genuinely below 0.12 (very narrow eyes + bad angle).
        baselineFilterFloor: 0.12,
        // Use the 80th percentile of recent samples as the "open" EAR.
        // Higher (e.g. 0.9) = more conservative open reference, makes
        // blink threshold higher (easier to trigger).
        baselinePercentile: 0.80,
        // Min samples needed before the baseline kicks in. While below
        // this we use `fallbackThreshold` instead.
        baselineMinSamples: 8,

        // --- Closed-eye decision (the main sensitivity knob) ---------
        // Eye is "closed" when SMOOTHED ear < baseline × this ratio.
        //   0.85 = very sensitive (lots of false-positive blinks)
        //   0.75 = current default — reliably catches mobile blinks
        //   0.65 = strict (misses some real blinks on phone cams)
        closedRatio: 0.75,
        // Used only before the baseline calibrates (first ~0.3 s of
        // detection). Forgiving fallback so brand-new sessions work.
        fallbackThreshold: 0.19,

        // --- Avatar eye visual mapping (Live2D-style scaleY) ---------
        // Where on the EAR scale the avatar's eye is "fully closed" /
        // "fully open" for animation purposes. Independent from the
        // challenge detection above.
        avatarClosedRatio: 0.40,   // ear < baseline*0.40 → eye flat
        avatarOpenRatio:   1.00,   // ear ≥ baseline      → eye round

        // --- u_blink (universal "please blink") ---------------------
        // How many consecutive smoothed-closed frames count as one
        // blink event. 2 = a quick selfie blink registers. Increase to
        // 3 if false positives reappear.
        uBlinkFramesNeeded: 2,
      };

      // ---------- Implementation ----------
      // 1) Smoothing (kills MediaPipe ±0.03 frame jitter)
      const earSmoothBuf = [];
      function smoothedEar(rawEar) {
        if (!Number.isFinite(rawEar)) return rawEar;
        earSmoothBuf.push(rawEar);
        if (earSmoothBuf.length > BLINK_TUNING.smoothWindow) {
          earSmoothBuf.shift();
        }
        let sum = 0;
        for (const v of earSmoothBuf) sum += v;
        return sum / earSmoothBuf.length;
      }

      // 2) Adaptive baseline
      const earBaseline = { samples: [], value: null };
      function recordEar(ear) {
        if (!Number.isFinite(ear) || ear < BLINK_TUNING.baselineFilterFloor) return;
        earBaseline.samples.push(ear);
        if (earBaseline.samples.length > BLINK_TUNING.baselineMaxSamples) {
          earBaseline.samples.shift();
        }
        if (earBaseline.samples.length >= BLINK_TUNING.baselineMinSamples) {
          const sorted = earBaseline.samples.slice().sort((a, b) => a - b);
          const idx = Math.floor(sorted.length * BLINK_TUNING.baselinePercentile);
          earBaseline.value = sorted[idx];
        }
      }

      // 3) Decisions
      function isEyeClosed(ear) {
        if (!earBaseline.value) return ear < BLINK_TUNING.fallbackThreshold;
        return ear < earBaseline.value * BLINK_TUNING.closedRatio;
      }
      function eyeOpenness(ear) {
        const baseline = earBaseline.value || 0.25;
        const closedAt = baseline * BLINK_TUNING.avatarClosedRatio;
        const openAt   = baseline * BLINK_TUNING.avatarOpenRatio;
        return Math.max(
          0.05,
          Math.min(1, (ear - closedAt) / (openAt - closedAt))
        );
      }

      // Live2D mapping. Translates EAR / MAR / head pose into transforms on
      // my avatar's SVG groups, so the animal blinks, opens its mouth, and
      // shakes / nods in sync with the player's face.
      //
      //   EAR    ~0.10 (closed) → ~0.30 (wide open)        → eye scaleY 0..1
      //   MAR    ~0.05 (closed) → ~0.60 (jaw dropped)      → mouth scaleY 1..3
      //   nx     -0.5 (head turned left)  → +0.5 (right)   → body rotate ±deg
      //   ny     -0.5 (chin up)           → +0.5 (chin down) → body translateY ±px
      const LIVE2D_EAR_CLOSED = 0.10;
      const LIVE2D_EAR_OPEN   = 0.30;
      const LIVE2D_MAR_CLOSED = 0.05;
      const LIVE2D_MAR_OPEN   = 0.60;
      const LIVE2D_MOUTH_MAX  = 3.0;
      const LIVE2D_BEAK_MAX   = 4;     // px each half travels apart when wide open
      const LIVE2D_SHAKE_GAIN = 70;    // nx → degrees of rotation
      const LIVE2D_SHAKE_MAX  = 25;    // clamp ±deg
      const LIVE2D_NOD_GAIN   = 36;    // ny → px translateY
      const LIVE2D_NOD_MAX    = 12;    // clamp ±px

      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const clampSym = (v, lim) => Math.max(-lim, Math.min(lim, v));

      function driveLive2D(lm) {
        const me = state.nodes.me;
        if (!me) return;

        // 1) Eye openness 0..1 from EAR (per eye), normalised against the
        //    user's own baseline so phone-camera EAR variations don't
        //    leave the avatar's eyes always half-shut.
        const earL = earVal(lm, L_EYE_IDX);
        const earR = earVal(lm, R_EYE_IDX);
        const openL = eyeOpenness(earL);
        const openR = eyeOpenness(earR);

        // 2) Mouth openness 0..1 from MAR
        const mar = lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
        const mouthOpen = clamp01(
          (mar - LIVE2D_MAR_CLOSED) / (LIVE2D_MAR_OPEN - LIVE2D_MAR_CLOSED)
        );
        const mouthScale = 1 + mouthOpen * (LIVE2D_MOUTH_MAX - 1);

        // 3) Head pose. Nose offset / face span gives a normalized
        //    -0.5..0.5 reading per axis.
        const nose = lm[4];
        const lb   = lm[234];
        const rb   = lm[454];
        const fcx  = (lb.x + rb.x) / 2;
        const fw   = Math.abs(rb.x - lb.x) + 1e-6;
        const nx   = (nose.x - fcx) / fw;

        const top = lm[10];
        const bot = lm[152];
        const fcy = (top.y + bot.y) / 2;
        const fh  = Math.abs(top.y - bot.y) + 1e-6;
        const ny  = (nose.y - fcy) / fh;

        // Cam preview is mirrored (CSS scaleX(-1)), but MediaPipe sees the
        // RAW camera frame. Negate both axes so the avatar mirrors the
        // user the way they SEE themselves on screen — tilt left → tilt
        // left, chin down → head down.
        const headRot = clampSym(-nx * LIVE2D_SHAKE_GAIN, LIVE2D_SHAKE_MAX);
        const headDy  = clampSym(-ny * LIVE2D_NOD_GAIN,  LIVE2D_NOD_MAX);

        // 4) Apply. Webcam is mirrored: MediaPipe L_EYE = user's physical
        //    right, R_EYE = user's physical left, so we swap the eye
        //    targets to keep the avatar matching the player.
        const eyeLEl  = me.querySelector(".eye-l");
        const eyeREl  = me.querySelector(".eye-r");
        const mouthEl = me.querySelector(".mouth");
        const beakU   = me.querySelector(".beak-upper");
        const beakL   = me.querySelector(".beak-lower");
        const bobEl   = me.querySelector(".bob");

        // Mirror swap: avatar's eye-l shows what the user SEES on the
        // left side of their (mirrored) cam preview, which is anatomically
        // their right eye = MediaPipe's earR.
        const closedAvatarL = isEyeClosed(earR);
        const closedAvatarR = isEyeClosed(earL);
        if (eyeLEl) {
          eyeLEl.style.animation = "none";
          eyeLEl.classList.toggle("closed", closedAvatarL);
          // Partial scaleY for not-fully-closed states; cleared when the
          // SVG lash overlay takes over so it isn't squished too.
          eyeLEl.style.transform = closedAvatarL ? "" : `scaleY(${openR})`;
        }
        if (eyeREl) {
          eyeREl.style.animation = "none";
          eyeREl.classList.toggle("closed", closedAvatarR);
          eyeREl.style.transform = closedAvatarR ? "" : `scaleY(${openL})`;
        }

        // Mouth: beak (two triangles) gets translate; ellipse / triangle
        // gets scaleY.
        if (beakU && beakL) {
          const off = mouthOpen * LIVE2D_BEAK_MAX;
          beakU.style.animation = "none";
          beakL.style.animation = "none";
          beakU.style.transform = `translateY(${-off}px)`;
          beakL.style.transform = `translateY(${off}px)`;
          // Make sure the wrapper isn't animating either (it shouldn't be
          // for shape:beak, but defensive in case spec changed at runtime).
          if (mouthEl) mouthEl.style.animation = "none";
        } else if (mouthEl) {
          mouthEl.style.animation = "none";
          mouthEl.style.transform = `scaleY(${mouthScale})`;
        }

        // Head pose: rotate (shake) + translate Y (nod) on the inner .bob.
        // Order matters: rotate first (around bbox center), then translate.
        if (bobEl) {
          bobEl.style.transform =
            `translateY(${headDy}px) rotate(${headRot}deg)`;
        }
      }

      function processFace(lm, now) {
        // Feed the adaptive EAR baseline first so every downstream
        // consumer (avatar mapping + challenges) uses the latest value.
        const avgEar = (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2;
        recordEar(avgEar);

        driveLive2D(lm);
        if (challenge.active && !challenge.completed)                   processMonitorChallenge(lm, now);
        if (universalChallenge.active && !universalChallenge.completed) processUniversalChallenge(lm, now);
      }

      function processMonitorChallenge(lm, now) {
        const act = challenge.action;

        if (act === "blink") {
          const ear = smoothedEar(
            (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2
          );
          if (isEyeClosed(ear)) {
            challenge.blink.since  = null;
            chalStatus.textContent = t("statusBlinked");
          } else {
            if (!challenge.blink.since) challenge.blink.since = now;
            const elapsed = now - challenge.blink.since;
            chalStatus.textContent = t(
              "statusKeepEyesOpenS",
              Math.max(0, 3 - elapsed / 1000).toFixed(1)
            );
            if (elapsed >= BLINK_MS) {
              challenge.completed = true;
              endChallenge(true);
            }
          }
        } else if (act === "mouth") {
          const mar =
            lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
          if (mar > MAR_OPEN) {
            challenge.mouth.openFrames++;
            chalStatus.textContent = t("statusMouthHolding");
            if (challenge.mouth.openFrames >= 8) {
              challenge.completed = true;
              endChallenge(true);
            }
          } else {
            challenge.mouth.openFrames = Math.max(
              0,
              challenge.mouth.openFrames - 1
            );
            chalStatus.textContent = t("statusMouthOpenCmd");
          }
        } else if (act === "shake") {
          const nose = lm[4], lb = lm[234], rb = lm[454];
          const cx   = (lb.x + rb.x) / 2;
          const fw   = Math.abs(rb.x - lb.x) + 1e-6;
          const nx   = (nose.x - cx) / fw;
          const cur  = nx > SHAKE_THRESH ? 1 : nx < -SHAKE_THRESH ? -1 : 0;
          if (cur !== 0 && cur !== challenge.shake.dir) {
            challenge.shake.dir = cur;
            challenge.shake.changes++;
          }
          chalStatus.textContent = t(
            "statusShakeProgress",
            Math.floor(challenge.shake.changes / 2)
          );
          if (challenge.shake.changes >= 4) {
            challenge.completed = true;
            endChallenge(true);
          }
        }
      }

      // =================================================================
      // Universal Rule Challenge System
      // =================================================================

      const uChalOverlay = document.getElementById("universalOverlay");
      const uChalIcon    = document.getElementById("uchal-icon");
      const uChalLabel   = document.getElementById("uchal-label");
      const uChalStatus  = document.getElementById("uchal-status");
      const uChalBarFill = document.getElementById("uchal-bar-fill");

      const universalChallenge = {
        active: false,
        action: null,
        completed: false,
        timeLeft: 0,
        MAX_TIME: 5,
        blink:    { frames: 0 },
        mouth:    { frames: 0 },
        headmove: { hDir: 0, hChanges: 0, vDir: 0, vChanges: 0 },
      };

      function startUniversalChallenge(rule) {
        if (state.spectator) return;
        universalChallenge.active    = true;
        universalChallenge.completed = false;
        universalChallenge.action    = rule.id;
        universalChallenge.timeLeft  = universalChallenge.MAX_TIME;
        universalChallenge.blink     = { frames: 0 };
        universalChallenge.mouth     = { frames: 0 };
        universalChallenge.headmove  = { hDir: 0, hChanges: 0, vDir: 0, vChanges: 0 };
        uChalIcon.textContent    = rule.icon;
        uChalLabel.textContent   = t(rule.labelKey);
        uChalStatus.textContent  = t("statusUniGo");
        uChalBarFill.style.width = "100%";
        uChalOverlay.className   = "action-bar action-bar-bottom active";
      }

      function endUniversalChallenge(success) {
        if (!universalChallenge.active) return;
        universalChallenge.active = false;
        if (success) {
          uChalStatus.textContent = t("statusSuccess");
          uChalBarFill.style.width = "100%";
          uChalOverlay.className  = "action-bar action-bar-bottom active success";
          addLog(t("logUniDone"));
        } else {
          uChalStatus.textContent = t("statusFail");
          uChalOverlay.className  = "action-bar action-bar-bottom active fail";
          reportViolation();
          state.me.lives = Math.max(0, state.me.lives - 1);
          renderLives();
          playSound("healthLoss");
          addLog(t("logUniFail"), null, { rule: true });
          if (state.me.lives <= 0) { setTimeout(handleDeath, 1200); }
        }
        setTimeout(() => {
          uChalOverlay.className = "action-bar action-bar-bottom";
        }, 1200);
      }

      function updateUniversalChallenge(dt) {
        if (!universalChallenge.active) return;
        universalChallenge.timeLeft -= dt;
        uChalBarFill.style.width =
          Math.max(0, (universalChallenge.timeLeft / universalChallenge.MAX_TIME) * 100) + "%";
        if (universalChallenge.timeLeft <= 0) endUniversalChallenge(false);
      }

      function processUniversalChallenge(lm) {
        const act = universalChallenge.action;

        if (act === "u_blink") {
          const ear = smoothedEar(
            (earVal(lm, L_EYE_IDX) + earVal(lm, R_EYE_IDX)) / 2
          );
          if (isEyeClosed(ear)) {
            universalChallenge.blink.frames++;
            uChalStatus.textContent = t("statusBlinking");
            if (universalChallenge.blink.frames >= BLINK_TUNING.uBlinkFramesNeeded) {
              universalChallenge.completed = true;
              endUniversalChallenge(true);
            }
          } else {
            universalChallenge.blink.frames = 0;
            uChalStatus.textContent = t("statusBlinkPlease");
          }
        } else if (act === "u_mouth") {
          const mar = lmDist(lm[13], lm[14]) / (lmDist(lm[61], lm[291]) + 1e-6);
          if (mar > MAR_OPEN) {
            universalChallenge.mouth.frames++;
            uChalStatus.textContent = t("statusMouthHolding");
            if (universalChallenge.mouth.frames >= 8) {
              universalChallenge.completed = true;
              endUniversalChallenge(true);
            }
          } else {
            universalChallenge.mouth.frames = Math.max(0, universalChallenge.mouth.frames - 1);
            uChalStatus.textContent = t("statusMouthOpenCmd");
          }
        } else if (act === "u_headmove") {
          const nose = lm[4], lb = lm[234], rb = lm[454];
          // Lateral shake
          const faceCX = (lb.x + rb.x) / 2;
          const faceW  = Math.abs(rb.x - lb.x) + 1e-6;
          const nx     = (nose.x - faceCX) / faceW;
          const hCur   = nx > SHAKE_THRESH ? 1 : nx < -SHAKE_THRESH ? -1 : 0;
          if (hCur !== 0 && hCur !== universalChallenge.headmove.hDir) {
            universalChallenge.headmove.hDir = hCur;
            universalChallenge.headmove.hChanges++;
          }
          // Vertical nod
          const faceCY = (lm[10].y + lm[152].y) / 2;
          const faceH  = Math.abs(lm[10].y - lm[152].y) + 1e-6;
          const ny     = (nose.y - faceCY) / faceH;
          const vCur   = ny > 0.08 ? 1 : ny < -0.08 ? -1 : 0;
          if (vCur !== 0 && vCur !== universalChallenge.headmove.vDir) {
            universalChallenge.headmove.vDir = vCur;
            universalChallenge.headmove.vChanges++;
          }
          const total = universalChallenge.headmove.hChanges + universalChallenge.headmove.vChanges;
          uChalStatus.textContent = total > 0 ? t("statusHeadKeep") : t("statusHeadDo");
          if (total >= 2) {
            universalChallenge.completed = true;
            endUniversalChallenge(true);
          }
        }
      }

      // ---------- FaceMesh + Camera setup ----------
      try {
        const faceMesh = new FaceMesh({
          locateFile: (f) =>
            "https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/" + f,
        });
        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        faceMesh.onResults((results) => {
          if (
            results.multiFaceLandmarks &&
            results.multiFaceLandmarks.length > 0
          ) {
            processFace(results.multiFaceLandmarks[0], performance.now());
          }
        });

        const camStream = new Camera(webcamVideo, {
          onFrame: async () => {
            await faceMesh.send({ image: webcamVideo });
          },
          width: 320,
          height: 240,
        });
        camStream.start().catch(() => {
          addLog(t("camInitFailed"));
        });
      } catch (e) {
        addLog(t("camDetectError", e.message));
      }

      // =================================================================
      // Boot
      // =================================================================
      buildScene();
      seedLog();
      renderLives();
      renderTimer();
      // Initial render of localized static UI.
      const _initialHint = document.getElementById("moveHint");
      if (_initialHint) _initialHint.textContent = t("hint");
      const _initialLangBtn = document.getElementById("langToggle");
      if (_initialLangBtn) {
        // When this scene is embedded inside the React SPA (window.top !== window),
        // the parent shell's <LangDock /> already provides a language toggle and is
        // the single source of truth (NZ_PLAYER_SYNC.lang). Hide the in-iframe button
        // there to avoid two toggles getting out of sync. Standalone tests still see it.
        const _embedded = window.top !== window;
        if (_embedded) {
          _initialLangBtn.style.display = "none";
        } else {
          _initialLangBtn.textContent = currentLang === "zh" ? "EN" : "中";
          _initialLangBtn.addEventListener("click", () => {
            setLang(currentLang === "zh" ? "en" : "zh");
          });
        }
      }
      requestAnimationFrame(frame);

      // -----------------------------------------------------------------
      // MainSync: parent React shell (onboarding) sends role + rules here.
      // -----------------------------------------------------------------
      function applyMainSync(p) {
        if (!p || typeof p !== "object") return;
        // Adopt the parent app's UI language as soon as it tells us.
        if (typeof p.lang === "string") setLang(p.lang);
        if (state.spectator) {
          if (p.ruleText) addLog(t("logRulePrefix") + String(p.ruleText), null, { rule: true });
          if (p.winText) addLog(t("logWinPrefix") + String(p.winText), null, {});
          return;
        }
        var a = p.sceneAnimal;
        if (a !== "lion" && a !== "owl" && a !== "giraffe") a = "owl";
        state.me.animal = a;
        state.lastMainSyncName =
          typeof p.playerName === "string" ? p.playerName : "";
        if (typeof p.lives === "number") {
          state.me.lives = Math.max(0, Math.min(3, Math.floor(p.lives)));
        }
        // Server-authoritative death: if the snapshot says we're out (lives 0
        // or alive=false), enter spectator mode even if the local rule-fail
        // path didn't fire (e.g. rejoin, snapshot-driven death, or any future
        // server-side mechanism).
        const serverDead =
          (typeof p.alive === "boolean" && p.alive === false) ||
          state.me.lives <= 0;
        if (serverDead && !state.me.dead) {
          handleDeath();
          if (p.ruleText) addLog(t("logRulePrefix") + String(p.ruleText), null, { rule: true });
          if (p.winText) addLog(t("logWinPrefix") + String(p.winText), null, {});
          return;
        }
        const nm = typeof p.playerName === "string" ? p.playerName : "";
        if (state.nodes.me && state.nodes.me.parentNode) {
          state.nodes.me.parentNode.removeChild(state.nodes.me);
        }
        const newMe = makeAnimalAvatar({ animal: a, isMe: true, name: nm });
        // Already-dead players (e.g. snapshot fired handleDeath in a previous
        // pass) must not have their avatar reappear when the snapshot churns.
        if (state.me.dead) newMe.setAttribute("visibility", "hidden");
        layers.me.appendChild(newMe);
        state.nodes.me = newMe;
        renderLives();
        if (p.ruleText) addLog(t("logRulePrefix") + String(p.ruleText), null, { rule: true });
        if (p.winText) addLog(t("logWinPrefix") + String(p.winText), null, {});
      }
      function hash01(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++)
          h = ((h << 5) - h + s.charCodeAt(i)) | 0;
        return (Math.abs(h) % 1000) / 1000;
      }
      function applyMSView(p) {
        if (!p || typeof p !== "object") return;
        state.spectator = Boolean(p.spectator);
        if (state.spectator && state.nodes.me) {
          state.nodes.me.setAttribute("visibility", "hidden");
        } else if (state.nodes.me) {
          state.nodes.me.setAttribute("visibility", "visible");
        }
        // One body class to drive ALL the OB-only / spectator-only CSS rules. Easier than
        // chasing every UI element individually (hearts, joystick, cam preview, alert flash,
        // challenge bars, hint…). Also clears any leftover challenge bar state that was
        // active right before the role flipped.
        if (typeof document !== "undefined" && document.body) {
          document.body.classList.toggle("is-spectator", state.spectator);
        }
        if (state.spectator) {
          challenge.active = false;
          challenge.completed = false;
          if (typeof chalOverlay !== "undefined" && chalOverlay) {
            chalOverlay.className = "action-bar action-bar-top";
          }
          universalChallenge.active = false;
          universalChallenge.completed = false;
          if (typeof uChalOverlay !== "undefined" && uChalOverlay) {
            uChalOverlay.className = "action-bar action-bar-bottom";
          }
          if (alertOverlay) alertOverlay.classList.remove("active");
          // Hearts container should be empty for OB so it doesn't read as "OB has 3 lives".
          renderLives();
        }
      }
      function applyObCamera(p) {
        if (!p || typeof p !== "object" || !state.spectator) return;
        if (p.initFromCurrent) {
          var c = getSpectatorTargetXY();
          state.obFreeTarget.x = c.x;
          state.obFreeTarget.y = c.y;
        }
        if (p.mode === "centroid" || p.mode === "follow" || p.mode === "free") {
          state.obCamMode = p.mode;
        }
        if (p.followPlayerId !== undefined) {
          state.obFollowId = p.followPlayerId ? String(p.followPlayerId) : null;
        }
        if (
          p.freeCenter &&
          typeof p.freeCenter.x === "number" &&
          Number.isFinite(p.freeCenter.x) &&
          typeof p.freeCenter.y === "number" &&
          Number.isFinite(p.freeCenter.y)
        ) {
          state.obFreeTarget.x = clamp(p.freeCenter.x, BORDER, MAP_W - BORDER);
          state.obFreeTarget.y = clamp(p.freeCenter.y, BORDER, MAP_H - BORDER);
        }
      }
      function applyNetPeers(raw) {
        if (!raw || typeof raw !== "object") return;
        var peers = raw.peers;
        if (!peers || typeof peers !== "object") return;
        var selfId = String(raw.selfId != null ? raw.selfId : state.netSelfId || "");
        var spec = state.spectator;
        for (var pid in peers) {
          if (!spec && pid === selfId) continue;
          var pr = peers[pid];
          if (!pr || typeof pr !== "object") continue;
          var row = state.others.find(function (o) { return o.id === pid; });
          if (!row) continue;
          if (pr.x != null && Number.isFinite(pr.x)) row.x = clamp(pr.x, BORDER, MAP_W - BORDER);
          if (pr.y != null && Number.isFinite(pr.y)) row.y = clamp(pr.y, BORDER, MAP_H - BORDER);
          if (pr.moving != null) row.moving = !!pr.moving;
          if (pr.animKey != null) row.animKey = String(pr.animKey).slice(0, 64);
          if (pr.facing != null) row.facing = +pr.facing;
        }
      }
      function applyRoomPlayers(raw) {
        if (!raw || typeof raw !== "object") return;
        var pl = raw.players;
        if (!Array.isArray(pl)) return;
        var selfId = raw.selfId || "";
        var selfName = String(raw.selfName || "");
        state.netSelfId = selfId;
        var wasStarted = state.roomStarted;
        state.roomStarted = Boolean(raw.roomStarted);
        // BGM kicks in the moment the room flips to "started" (player has just entered the
        // live scene). Looping handled by the audio element; stops on timer-end below.
        if (state.roomStarted && !wasStarted) startBgm();
        if (raw.spectator != null) state.spectator = Boolean(raw.spectator);
        var toRem = raw.itemsRemoved;
        if (Array.isArray(toRem) && toRem.length) {
          for (var rii = 0; rii < toRem.length; rii++) {
            removeItemByIdNoEffects(toRem[rii]);
          }
        }
        var others = pl.filter(function (q) {
          if (!q || !q.id) return false;
          if (selfId) return q.id !== selfId;
          if (selfName && q.name === selfName) return false;
          if (!selfId && !selfName && state.lastMainSyncName && q.name === state.lastMainSyncName)
            return false;
          return true;
        });
        for (var oi = 0; oi < state.others.length; oi++) {
          var op = state.others[oi];
          var onode = state.nodes.others.get(op.id);
          if (onode && onode.parentNode) onode.parentNode.removeChild(onode);
          state.nodes.others.delete(op.id);
        }
        state.others = [];
        var n = others.length;
        var wcx = MAP_W / 2;
        var wcy = MAP_H / 2;
        for (var j = 0; j < n; j++) {
          var q = others[j];
          var an = q.sceneAnimal;
          if (an !== "lion" && an !== "owl" && an !== "giraffe") an = "owl";
          var t = (2 * Math.PI * j) / Math.max(n, 1) + hash01(String(q.id)) * 0.4;
          var r = 220 + 50 * (j % 2);
          var x = wcx + Math.cos(t) * r;
          var y = wcy + Math.sin(t) * r;
          x = clamp(x, BORDER, MAP_W - BORDER);
          y = clamp(y, BORDER, MAP_H - BORDER);
          var row = {
            id: q.id,
            name: String(q.name || "…"),
            animal: an,
            x: x,
            y: y,
            vx: 0,
            vy: 0,
            moving: false,
            animKey: "idle",
            facing: 0,
            netRemote: true,
          };
          state.others.push(row);
          var g = makeAnimalAvatar({ animal: an, isMe: false, name: row.name });
          layers.others.appendChild(g);
          state.nodes.others.set(q.id, g);
        }
        if (n > 0) addLog(t("logRosterSync", n), null, {});
        if (
          raw.roomStarted &&
          state.items.length === 0 &&
          (!toRem || toRem.length === 0)
        ) {
          reseedMapItems();
        }
      }
      window.addEventListener("message", function (ev) {
        var d = ev.data;
        if (!d || d.source !== "nocturne-zoo" || d.payload == null) return;
        if (d.type === "NZ_MS_VIEW") {
          applyMSView(d.payload);
        } else if (d.type === "NZ_PLAYER_SYNC") {
          applyMainSync(d.payload);
        } else if (d.type === "NZ_ROOM_PLAYERS") {
          applyRoomPlayers(d.payload);
        } else if (d.type === "NZ_MAIN_SCENE_NET") {
          applyNetPeers(d.payload);
        } else if (d.type === "NZ_MS_ITEM") {
          if (d.payload && d.payload.events) applyItemInbox(d.payload.events);
        } else if (d.type === "NZ_OB_CAMERA") {
          applyObCamera(d.payload);
        }
      });
    </script>
  </body>
</html>

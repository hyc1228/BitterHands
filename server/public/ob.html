<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nocturne Zoo · OB</title>
    <style>
      :root {
        color-scheme: dark;
        --bgTop: #2d77ff;
        --bgMid: #1a53d6;
        --bgBottom: #0b1a3a;
        --panel: rgba(9, 16, 34, 0.72);
        --text: #f6fbff;
        --muted: rgba(246, 251, 255, 0.72);
        --border: rgba(255, 255, 255, 0.16);
        --shadow: rgba(0, 0, 0, 0.45);
        --accent: #ffb100;
        --accent2: #39e6c0;
        --danger: #ff3b30;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: radial-gradient(1100px 720px at 50% 30%, rgba(120, 220, 255, 0.45), transparent 62%),
          radial-gradient(900px 540px at 90% 18%, rgba(57, 230, 192, 0.18), transparent 70%),
          linear-gradient(180deg, var(--bgTop), var(--bgMid) 48%, var(--bgBottom));
        color: var(--text);
        font-family: ui-rounded, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.22;
        background-image: radial-gradient(rgba(255, 255, 255, 0.35) 1px, transparent 1px);
        background-size: 18px 18px;
        mix-blend-mode: overlay;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(900px 600px at 50% 110%, rgba(0, 0, 0, 0.65), transparent 60%);
      }
      .wrap {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .top {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.15);
        backdrop-filter: blur(8px);
      }
      .title {
        display: grid;
        gap: 4px;
      }
      .title h1 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0.2px;
      }
      .sub {
        color: var(--muted);
        font-size: 12px;
      }
      .pill {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #6b7280;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
      }
      .dot.ok {
        background: #22c55e;
      }
      .dot.bad {
        background: #ef4444;
      }
      input,
      select,
      button {
        border-radius: 16px;
        border: 2px solid rgba(255, 255, 255, 0.18);
        background: linear-gradient(180deg, rgba(8, 12, 24, 0.45), rgba(8, 12, 24, 0.28));
        color: var(--text);
        padding: 10px 10px;
        outline: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      button {
        cursor: pointer;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.06));
        box-shadow: 0 10px 0 rgba(0, 0, 0, 0.35), 0 18px 26px rgba(0, 0, 0, 0.35);
        transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      }
      button:active {
        transform: translateY(6px);
        box-shadow:
          0 4px 0 rgba(0, 0, 0, 0.35),
          0 10px 20px rgba(0, 0, 0, 0.25);
      }
      .main {
        display: grid;
        grid-template-columns: 520px 1fr;
        gap: 12px;
        padding: 12px;
      }
      .main.game {
        grid-template-columns: 1fr 360px;
      }
      .card {
        background: linear-gradient(180deg, rgba(18, 34, 70, 0.78), rgba(10, 18, 40, 0.78));
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-radius: 22px;
        padding: 14px;
        backdrop-filter: blur(8px);
        box-shadow: 0 18px 40px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.14);
        min-height: 0;
      }
      .players {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        align-content: start;
      }
      .player {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .name {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 600;
      }
      .meta {
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
      }
      .badge {
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
      }
      .log {
        height: 100%;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.45;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .map {
        height: 100%;
        min-height: 0;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent),
          radial-gradient(900px 700px at 20% 30%, rgba(139, 92, 246, 0.14), transparent),
          radial-gradient(800px 500px at 80% 20%, rgba(20, 184, 166, 0.12), transparent);
        position: relative;
        overflow: hidden;
      }
      .map::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 64px 64px;
        opacity: 0.35;
        pointer-events: none;
      }
      .mapHud {
        position: absolute;
        left: 14px;
        top: 14px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
        display: grid;
        gap: 4px;
        max-width: min(520px, calc(100% - 28px));
      }
      .mapTitle {
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .mapSub {
        font-size: 12px;
        color: var(--muted);
      }
      .cams {
        display: grid;
        gap: 10px;
        align-content: start;
        height: 100%;
        overflow: auto;
      }
      .camCard {
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
      }
      .camMeta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px 8px;
        font-size: 12px;
        color: var(--muted);
        align-items: center;
      }
      .camName {
        color: var(--text);
        font-weight: 700;
        font-size: 13px;
      }
      .camImg {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
        background: rgba(0, 0, 0, 0.35);
      }
      .statusRow {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }
      .statusItem {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      .k {
        color: var(--muted);
        font-size: 12px;
      }
      .v {
        font-size: 12px;
      }
      @media (max-width: 1024px) {
        .main {
          grid-template-columns: 1fr;
        }
        .players {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="title">
          <h1>Nocturne Zoo · OB</h1>
          <div class="sub" id="subtitle">横屏展示用观察者页面（不参与游戏）。URL 可带 `?room=xxx`。</div>
        </div>

        <div class="controls">
          <select id="lang">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
          <div class="pill" style="opacity:.8"><span id="langDebug"></span></div>
          <input id="roomId" placeholder="room" style="width: 180px" />
          <button id="btnConnect">Connect</button>
          <div class="pill">
            <span class="dot" id="connDot"></span>
            <span id="connText">Disconnected</span>
          </div>
        </div>
      </div>

      <div class="main">
        <div class="card" id="leftPanel">
          <div id="lobbyWrap">
            <div class="statusRow">
              <div class="statusItem">
                <div class="k" id="kLobby">大厅服务器</div>
                <div class="v" id="lobbyStatus">-</div>
              </div>
              <div class="statusItem">
                <div class="k" id="kRoom">房间状态</div>
                <div class="v" id="roomStatus">-</div>
              </div>
            </div>

            <div style="display:flex; align-items:end; justify-content:space-between; gap:10px">
              <div style="font-weight:700" id="playersTitle">Players</div>
              <div class="meta"><span class="badge" id="roomBadge">room: -</span></div>
            </div>
            <div style="height:12px"></div>
            <div class="players" id="players"></div>
          </div>

          <div id="mapWrap" style="display:none; height:100%; min-height:0">
            <div class="map" id="map">
              <div class="mapHud">
                <div class="mapTitle" id="mapTitle">大地图（横屏观战）</div>
                <div class="mapSub" id="mapSub">游戏进行中 · 右侧为玩家摄像头</div>
              </div>
            </div>
          </div>
        </div>

        <div id="rightPanel" class="card">
          <div id="panelHeader" style="display:flex; align-items:end; justify-content:space-between; gap:10px">
            <div style="font-weight:700" id="eventsTitle">Events</div>
            <button id="btnClear" style="max-width:120px">Clear</button>
          </div>
          <div style="height:12px"></div>
          <div id="eventsWrap" class="log"></div>
          <div id="camsWrap" style="display:none; height:100%; min-height:0">
            <div class="cams" id="cams"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const eventsWrap = $("eventsWrap");
      const playersEl = $("players");
      const connDot = $("connDot");
      const connText = $("connText");
      const langSel = $("lang");
      const mainEl = document.querySelector(".main");
      const lobbyStatusEl = $("lobbyStatus");
      const roomStatusEl = $("roomStatus");
      const rightPanelEl = $("rightPanel");
      const leftPanelEl = $("leftPanel");
      const lobbyWrapEl = $("lobbyWrap");
      const mapWrapEl = $("mapWrap");
      const camsWrapEl = $("camsWrap");
      const camsEl = $("cams");
      const mapSubEl = $("mapSub");

      const I18N = {
        zh: {
          title: "Nocturne Zoo · OB",
          subtitle: "横屏展示用观察者页面（不参与游戏）。URL 可带 `?room=xxx`。",
          phRoom: "房间号",
          playersTitle: "玩家",
          eventsTitle: "事件",
          mapTitle: "大地图（横屏观战）",
          mapSub: "游戏进行中 · 右侧为玩家摄像头",
          lobbyServer: "大厅服务器",
          roomServer: "房间状态",
          connected: "已连接",
          disconnected: "未连接",
          connect: "连接",
          clear: "清空",
          sys_PLAYER_SUBMITTED_PHOTO: ({ name }) => `${name} 已提交照片`,
          sys_PLAYER_ENTERED_ZONE: ({ name, animal, emoji }) => `${name} 已进入 ${emoji || ""} 区域`,
          sys_GIRAFFE_PURIFIED: ({ name }) => `${name} 的感染似乎被“净化”了（累计违规 3 次）`,
          sys_PLAYER_LEFT: ({ name }) => `${name} 离开了房间`
        },
        en: {
          title: "Nocturne Zoo · OB",
          subtitle: "Observer page for landscape display (does not play). Use `?room=xxx`.",
          phRoom: "Room",
          playersTitle: "Players",
          eventsTitle: "Events",
          mapTitle: "World map (OB)",
          mapSub: "Game in progress · player cameras on the right",
          lobbyServer: "Lobby server",
          roomServer: "Room",
          connected: "Connected",
          disconnected: "Disconnected",
          connect: "Connect",
          clear: "Clear",
          sys_PLAYER_SUBMITTED_PHOTO: ({ name }) => `${name} submitted a photo`,
          sys_PLAYER_ENTERED_ZONE: ({ name, animal, emoji }) => `${name} entered ${emoji || ""} zone`,
          sys_GIRAFFE_PURIFIED: ({ name }) => `${name} seems “purified” (3 violations)`,
          sys_PLAYER_LEFT: ({ name }) => `${name} left the room`
        }
      };

      function getLang() {
        return langSel.value === "en" ? "en" : "zh";
      }

      function animalEmoji(animal) {
        if (animal === "白狮子") return "🦁";
        if (animal === "猫头鹰") return "🦉";
        if (animal === "长颈鹿") return "🦒";
        return "❓";
      }

      function log(line) {
        const ts = new Date().toLocaleTimeString();
        eventsWrap.textContent = `[${ts}] ${line}\n` + eventsWrap.textContent;
      }

      function setConnected(yes, details = "") {
        connDot.className = "dot " + (yes ? "ok" : "bad");
        connText.textContent = yes
          ? `${I18N[getLang()].connected} ${details}`
          : I18N[getLang()].disconnected;
      }

      function renderPlayers(players = []) {
        playersEl.innerHTML = "";
        for (const p of players) {
          const div = document.createElement("div");
          div.className = "player";
          const left = document.createElement("div");
          left.className = "name";
          left.innerHTML = `<span style="font-size:18px">${animalEmoji(p.animal)}</span><span>${p.name}</span>`;
          const right = document.createElement("div");
          right.className = "meta";
          const entered = p.animal ? "entered" : "lobby";
          right.innerHTML = `<span class="badge">${entered}</span><span class="badge">♥ ${p.lives}</span><span class="badge">V ${p.violations}</span>`;
          div.appendChild(left);
          div.appendChild(right);
          playersEl.appendChild(div);
        }
      }

      function partyUrl(roomId) {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        return `${proto}://${location.host}/party/${encodeURIComponent(roomId)}`;
      }

      let ws = null;
      let currentRoom = null;
      let lastSnapshot = null;
      const camCardsByPlayerId = new Map();

      function setMode(started) {
        if (!mainEl) return;
        if (started) {
          mainEl.classList.add("game");
          // In game mode: map fills left, cams on right.
          lobbyWrapEl.style.display = "none";
          mapWrapEl.style.display = "";
          camsWrapEl.style.display = "";
          $("panelHeader").style.display = "none";
          eventsWrap.style.display = "none";
          rightPanelEl.style.padding = "14px";
        } else {
          mainEl.classList.remove("game");
          lobbyWrapEl.style.display = "";
          mapWrapEl.style.display = "none";
          camsWrapEl.style.display = "none";
          $("panelHeader").style.display = "";
          eventsWrap.style.display = "";
        }
      }

      function upsertCamCard({ playerId, playerName, dataUrl, ts }) {
        if (!playerId) return;
        let card = camCardsByPlayerId.get(playerId);
        if (!card) {
          const wrap = document.createElement("div");
          wrap.className = "camCard";
          const meta = document.createElement("div");
          meta.className = "camMeta";
          const name = document.createElement("div");
          name.className = "camName";
          name.textContent = playerName || playerId.slice(0, 6);
          const time = document.createElement("div");
          time.className = "badge";
          time.textContent = "-";
          meta.appendChild(name);
          meta.appendChild(time);
          const img = document.createElement("img");
          img.className = "camImg";
          img.alt = "camera";
          img.decoding = "async";
          img.loading = "lazy";
          wrap.appendChild(meta);
          wrap.appendChild(img);
          camsEl.appendChild(wrap);
          card = { wrap, name, time, img };
          camCardsByPlayerId.set(playerId, card);
        }
        if (playerName) card.name.textContent = playerName;
        if (typeof dataUrl === "string" && dataUrl.startsWith("data:image/")) card.img.src = dataUrl;
        if (typeof ts === "number") card.time.textContent = new Date(ts).toLocaleTimeString();
      }

      async function pollLobbyHealth() {
        try {
          const r = await fetch("/health", { cache: "no-store" });
          lobbyStatusEl.textContent = r.ok ? "ok" : `bad (${r.status})`;
        } catch {
          lobbyStatusEl.textContent = "offline";
        }
      }

      function connect() {
        const roomId = $("roomId").value.trim() || "test-room";
        currentRoom = roomId;
        $("roomBadge").textContent = `room: ${roomId}`;
        if (ws) ws.close();
        ws = new WebSocket(partyUrl(roomId));

        ws.addEventListener("open", () => {
          setConnected(true, `(${roomId})`);
          log(`WS open → ${partyUrl(roomId)}`);
          // Observer does not join as player.
        });
        ws.addEventListener("close", () => {
          setConnected(false);
          log("WS close");
        });
        ws.addEventListener("error", () => {
          setConnected(false);
          log("WS error");
        });
        ws.addEventListener("message", (ev) => {
          let msg = null;
          try {
            msg = JSON.parse(ev.data);
          } catch {
            return;
          }
          const { type, data } = msg;
          if (type === "room_snapshot") {
            lastSnapshot = data;
            renderPlayers(data.players || []);
            roomStatusEl.textContent = data.started ? "started" : "lobby";
            setMode(!!data.started);
            return;
          }
          if (type === "camera_frame") {
            upsertCamCard(data || {});
            return;
          }
          if (type === "system") {
            if (data?.code) {
              const fn = I18N[getLang()]["sys_" + data.code] || I18N.zh["sys_" + data.code];
              if (typeof fn === "function") log(`system: ${fn(data.params || {})}`);
              else log(`system: ${data.message || data.code}`);
            } else {
              log(`system: ${data.message}`);
            }
            return;
          }
          if (type === "chat") {
            log(`chat: ${data.playerName}: ${data.text}`);
            return;
          }
          if (type === "violation_narrative") {
            log(`narrative: ${data.text}`);
            return;
          }
          if (type === "game_started") {
            log(`game_started: ${Math.round((data.durationMs || 0) / 1000)}s`);
            roomStatusEl.textContent = "started";
            setMode(true);
            return;
          }
          if (type === "game_ended") {
            log(`game_ended`);
            roomStatusEl.textContent = "ended";
            return;
          }
        });
      }

      $("btnConnect").addEventListener("click", connect);
      $("btnClear").addEventListener("click", () => (eventsWrap.textContent = ""));
      langSel.addEventListener("change", () => {
        $("btnConnect").textContent = I18N[getLang()].connect;
        $("btnClear").textContent = I18N[getLang()].clear;
        document.title = I18N[getLang()].title;
        document.querySelector("h1").textContent = I18N[getLang()].title;
        $("subtitle").textContent = I18N[getLang()].subtitle;
        $("roomId").placeholder = I18N[getLang()].phRoom;
        $("playersTitle").textContent = I18N[getLang()].playersTitle;
        $("eventsTitle").textContent = I18N[getLang()].eventsTitle;
        $("kLobby").textContent = I18N[getLang()].lobbyServer;
        $("kRoom").textContent = I18N[getLang()].roomServer;
        $("mapTitle").textContent = I18N[getLang()].mapTitle;
        mapSubEl.textContent = I18N[getLang()].mapSub;
        $("langDebug").textContent = `lang=${getLang()}`;
        setConnected(ws && ws.readyState === WebSocket.OPEN, currentRoom ? `(${currentRoom})` : "");
      });

      // init
      $("btnConnect").textContent = I18N[getLang()].connect;
      $("btnClear").textContent = I18N[getLang()].clear;
      document.title = I18N[getLang()].title;
      $("subtitle").textContent = I18N[getLang()].subtitle;
      $("roomId").placeholder = I18N[getLang()].phRoom;
      $("playersTitle").textContent = I18N[getLang()].playersTitle;
      $("eventsTitle").textContent = I18N[getLang()].eventsTitle;
      $("kLobby").textContent = I18N[getLang()].lobbyServer;
      $("kRoom").textContent = I18N[getLang()].roomServer;
      $("mapTitle").textContent = I18N[getLang()].mapTitle;
      mapSubEl.textContent = I18N[getLang()].mapSub;
      try {
        const qs = new URLSearchParams(location.search);
        const forced = qs.get("lang");
        const saved = localStorage.getItem("nz_lang");
        const next =
          forced === "en" || forced === "zh" ? forced : saved === "en" || saved === "zh" ? saved : null;
        if (next) langSel.value = next;
      } catch {}
      langSel.addEventListener("change", () => {
        try {
          localStorage.setItem("nz_lang", langSel.value);
        } catch {}
      });
      $("langDebug").textContent = `lang=${getLang()}`;
      const params = new URLSearchParams(location.search);
      $("roomId").value = params.get("room") || "test-room";
      setConnected(false);
      lobbyStatusEl.textContent = "-";
      roomStatusEl.textContent = "-";
      setMode(false);
      pollLobbyHealth();
      setInterval(pollLobbyHealth, 2000);
      connect();
    </script>
  </body>
</html>

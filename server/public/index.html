<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <!-- Avoid long-lived cached HTML (CF can cache index.html) so new JS/CSS hashes load after deploy. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Nocturne Zoo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Latin display + body come from Google Fonts (Permanent Marker for
      headings, Patrick Hand for casual labels). CJK is now driven entirely
      by OS-native fonts (PingFang SC / Microsoft YaHei) with Noto Sans SC
      as a Google Fonts fallback (loaded from globals.css via @import).
      The previous Smiley Sans preload (jsDelivr) is gone — Smiley Sans
      was only available as oblique, which made every Chinese heading
      look italicised, and jsDelivr is slow / blocked in mainland China.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&display=swap"
    />
    <!--
      Belt-and-braces cache buster.  We've never registered a service worker
      from the app, but earlier prototypes (and some browser-installed page
      tools — Microsoft Edge "PWA" mode, mobile WeChat in-app browser) keep
      pinning a stale SW that intercepts asset requests and serves an old
      JS bundle.  When that happens the new server's split GAME_ENDED
      protocol meets the old client renderer and the ceremony renders to a
      black mask.  This block runs unconditionally on every page load and
      unregisters anything we find, then clears Cache Storage too so the
      next reload picks up the fresh `index-*.js` hash from the network.
      Idempotent + cheap (no-op when there's nothing to clean up).
    -->
    <script>
      (function nocturneClearStaleCaches() {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations &&
              navigator.serviceWorker
                .getRegistrations()
                .then(function (regs) {
                  regs.forEach(function (r) {
                    try { r.unregister(); } catch (e) {}
                  });
                })
                .catch(function () {});
          }
          if ("caches" in window && typeof caches.keys === "function") {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) {
                try { caches.delete(k); } catch (e) {}
              });
            }).catch(function () {});
          }
        } catch (e) { /* ignore — best-effort */ }
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-Crtjxcry.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BekmxzkN.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
